name: release

# タグ v* を push すると、Windows の native(ax_helper=win-helper.cc / node-pty)を
# Electron ABI でビルドし、electron-builder で NSIS インストーラ + zip(x64/arm64)を作り、
# GitHub Release(draft)へ添付する。macOS 版は手元ビルド(npm run dist)で同 Release へ追加する。
#
# workflow_dispatch(tag 空)で起動するとビルド検証のみ(Release へは上げない)。

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (例 v1.7.0)。空ならビルド検証のみで Release へは上げない'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  win:
    # windows-latest は VS18(プレビュー)を積み node-gyp が認識できないため 2022 に固定。
    # arm64 は x64 ランナー上でクロスコンパイル(amd64_arm64)する。
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps (skip native build)
        run: npm install --ignore-scripts

      - name: Resolve Electron version
        id: ev
        shell: bash
        run: echo "v=$(node -p "require('electron/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          # x64 はネイティブ、arm64 は x64 ホストからのクロス(amd64_arm64)
          arch: ${{ matrix.arch == 'arm64' && 'amd64_arm64' || 'x64' }}

      - name: Build ax_helper (win-helper.cc) for Electron ABI
        shell: bash
        run: |
          npx node-gyp rebuild \
            --runtime=electron \
            --target=${{ steps.ev.outputs.v }} \
            --dist-url=https://electronjs.org/headers \
            --arch=${{ matrix.arch }} \
            --msvs_version=2022

      - name: Rebuild node-pty for Electron ABI
        run: npx --yes @electron/rebuild --force --only node-pty --arch ${{ matrix.arch }}

      # npmRebuild:false なので electron-builder は native を再ビルドせず、上で作った
      # build/Release/ax_helper.node と node-pty(pty.node)をそのままパッケージする。
      - name: Package with electron-builder
        shell: bash
        run: npx electron-builder --win --${{ matrix.arch }} --publish never

      - name: List dist
        shell: bash
        run: ls -la dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: win-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.zip

  release:
    needs: [win]
    # タグ push、または dispatch で tag を明示したときだけ Release を作る。
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create / update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: true
          fail_on_unmatched_files: true
          files: artifacts/**/*
