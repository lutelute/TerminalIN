    const strip = document.createElement('div');
    strip.className = 'grid-dots-strip';
    const dotsRow = document.createElement('div');
    dotsRow.className = 'grid-dots-row';
    const dotRowH = document.body.classList.contains('compact') ? 14 : 22;
    dotsRow.style.gridTemplateColumns = `repeat(${gridCols}, 1fr)`;
    dotsRow.style.gridTemplateRows    = `repeat(${gridRows}, ${dotRowH}px)`;

    const dotCells = gpSlotLayout
      ? [...gpSlotLayout].sort((a,b) => a.row!==b.row ? a.row-b.row : a.col-b.col)
      : Array.from({length: totalSlots}, (_,i) => ({ id:i, col:i%gridCols, row:Math.floor(i/gridCols), colSpan:1, rowSpan:1 }));

    for (const cell of dotCells) {
      const i = cell.id;
      const dot = document.createElement('div');
      dot.className = 'grid-dot';
      dot.dataset.slot = i;
      dot.style.gridColumn = `${cell.col+1} / span ${cell.colSpan}`;
      dot.style.gridRow    = `${cell.row+1} / span ${cell.rowSpan}`;

      const entry = slotEntries.get(i);
      if (entry && entry.type === 'pty') {
        dot.classList.add('filled-pty');
        dot.textContent = 'P';
        dot.title = `Slot ${i + 1}: Terminal (pty) — drag to swap`;
        dot.draggable = true;
      } else if (entry && entry.type === 'ext') {
        dot.classList.add('filled-ext');
        const live = externalWindows.find(w => w.windowNumber === entry.wn);
        const app = (live && live.app) || entry.info.app || '';
        if (isFinderApp(app)) {
          dot.classList.add('filled-ext-finder');
        } else {
          // アプリ固有カラーをインラインで上書き
          const cs = appColorStyle(getAppColor(app));
          if (cs) {
            dot.style.background = cs.bg;
            dot.style.borderColor = cs.text.replace('0.9)', '0.5)');
            dot.style.color = cs.text;
          }
        }
        if (entry.wn === frontmostWindowNumber && frontmostWindowNumber > 0) dot.classList.add('focused');
        const rawTitle = (live && live.title) || entry.info.title || '';
        const firstChar = rawTitle.trim().charAt(0).toUpperCase() || (isFinderApp(app) ? 'F' : 'T');
        dot.textContent = firstChar;
        dot.title = `Slot ${i + 1}: ${rawTitle || app} — drag to swap`;
        dot.draggable = true;
      } else {
        dot.textContent = '\u25a1';
        dot.title = `Slot ${i + 1}: Empty — drop here to move`;
      }
      dot.addEventListener('dragstart', (e) => {
        if (!dot.draggable) return;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(i));
        dot.classList.add('dragging');
      });
      dot.addEventListener('dragend', () => dot.classList.remove('dragging'));
      dot.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; dot.classList.add('drag-over'); });
      dot.addEventListener('dragleave', () => dot.classList.remove('drag-over'));
      dot.addEventListener('drop', (e) => {
        e.preventDefault(); dot.classList.remove('drag-over');
        const src = Number(e.dataTransfer.getData('text/plain'));
        if (!Number.isFinite(src) || src === i) return;
        swapSlotsLocally(src, i); render();
        ipcRenderer.invoke('swap-grid-slots', { src, dst: i });
      });
      dotsRow.appendChild(dot);
    }
    strip.appendChild(dotsRow);
    const countPill = document.createElement('span');
    countPill.className = 'grid-count-pill';
    countPill.textContent = `${slotEntries.size}/${totalSlots}`;
    strip.appendChild(countPill);
    _gridSection.appendChild(strip);
  }

  // slot cards — 縦リスト（配置はdots-stripが担当）
  const slotCells = gpSlotLayout
    ? [...gpSlotLayout].sort((a,b) => a.row!==b.row ? a.row-b.row : a.col-b.col)
    : Array.from({length: gridCols*gridRows}, (_,k) => ({
        id: k, col: k%gridCols, row: Math.floor(k/gridCols), colSpan: 1, rowSpan: 1
      }));

  for (const cell of slotCells) {
    const { id: slotId, colSpan, rowSpan } = cell;
    const entry = slotEntries.get(slotId);
    const isSpanned = colSpan > 1 || rowSpan > 1;
    const card = document.createElement('div');
    card.className = 'ext-item slot-card';
    card.dataset.slot = slotId;
    if (entry) {
      applyStateStyle(card, entry.wn, slotId, entry.info && entry.info.title, 5, 0.09);  // 濃さ=深刻度
    }

    const slotBadge = document.createElement('span');
    slotBadge.className = 'slot-badge';
    slotBadge.textContent = String(slotId + 1);
    card.appendChild(slotBadge);

    if (isSpanned) {
      const sb = document.createElement('span');
      sb.className = 'slot-span-badge';
      sb.textContent = colSpan > 1 && rowSpan > 1
        ? `${colSpan}×${rowSpan}` : colSpan > 1 ? `横×${colSpan}` : `縦×${rowSpan}`;
      card.appendChild(sb);
    }

    if (!entry) {
      card.classList.add('empty-slot');
      const titleSpan = document.createElement('span');
      titleSpan.className = 'ext-title';
      titleSpan.textContent = '空き';
      card.appendChild(titleSpan);
      const snapBtn = document.createElement('button');
      snapBtn.className = 'ext-btn snap snap-here-btn';
      snapBtn.textContent = 'Snap';
      snapBtn.title = 'フロントモストウィンドウをここにスナップ';
      snapBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const frontWin = externalWindows.find(w => w.windowNumber === frontmostWindowNumber);
        if (frontWin && !snappedExternals.has(frontWin.windowNumber)) snapExternal(frontWin, slotId);
      });
      card.appendChild(snapBtn);
      _gridSection.appendChild(card);
      continue;
    }

    if (entry.type === 'ext' && entry.wn === frontmostWindowNumber && frontmostWindowNumber > 0) {
      card.classList.add('focused');
    }
    if (entry.type === 'pty') {
      const gridBadge = document.createElement('span');
      gridBadge.className = 'card-badge badge-grid';
      gridBadge.textContent = 'GRID';
      card.appendChild(gridBadge);
      const titleSpan = document.createElement('span');
      titleSpan.className = 'ext-title';
      titleSpan.textContent = `Terminal #${slotId + 1}`;
      card.appendChild(titleSpan);
      card.insertAdjacentHTML('beforeend', statePillHtmlPty(slotId, false));  // Claude 状態バッジ
      const closeBtn = document.createElement('span');
      closeBtn.className = 'card-close';
      closeBtn.textContent = '×';
      closeBtn.addEventListener('click', (e) => { e.stopPropagation(); removeGridTerminal(slotId); });
      card.appendChild(closeBtn);
    } else {
      const { wn, info } = entry;
      let t = info.title || '';
      if (t.length > 32) t = t.substring(0, 29) + '...';
      const live = externalWindows.find(w => w.windowNumber === wn);
      const appForBadge = live ? live.app : (info.app || '');
      card.insertAdjacentHTML('beforeend', appBadgeHtml(appForBadge));
      const titleSpan = document.createElement('span');
      titleSpan.className = 'ext-title';
      titleSpan.textContent = t;
      card.appendChild(titleSpan);
      card.insertAdjacentHTML('beforeend', statePillHtml(wn, false));  // Claude 状態バッジ
      card.style.cursor = 'grab';
      card.title = 'Click: locate & raise | Drag: swap slot';
      card.addEventListener('click', (e) => {
        if (card._draggingNow) return;
        if (e.target.classList.contains('ext-btn') || e.target.classList.contains('slot-badge')) return;
        frontmostWindowNumber = wn;
        render();
        const liveNow = externalWindows.find(w => w.windowNumber === wn);
        ipcRenderer.invoke('wobble-window', {
          windowNumber: wn,
          pid: liveNow ? liveNow.pid : undefined,
          app: liveNow ? liveNow.app : undefined,
          title: liveNow ? liveNow.title : (info.title || ''),
        });
      });
      const btn = document.createElement('button');
      btn.className = 'ext-btn release';
      btn.textContent = 'Release';
      btn.addEventListener('click', (e) => { e.stopPropagation(); unsnapExternal(wn); });
      card.appendChild(btn);
    }

    // drag-to-swap
    card.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      if (e.target.closest('.ext-btn, .card-close, .slot-badge')) return;
      const srcSlot = slotId;
      const startX = e.clientX, startY = e.clientY;
      let dragging = false, dstCard = null;
      const clearOver = () => document.querySelectorAll('.slot-card.drag-over').forEach(c => c.classList.remove('drag-over'));
      const onMove = (ev) => {
        if (!dragging) {
          if (Math.abs(ev.clientX - startX) < 4 && Math.abs(ev.clientY - startY) < 4) return;
          dragging = true; card.classList.add('dragging'); card._draggingNow = true;
        }
        const tc = document.elementFromPoint(ev.clientX, ev.clientY)?.closest('.slot-card');
        clearOver();
        if (tc && tc !== card) { tc.classList.add('drag-over'); dstCard = tc; }
        else dstCard = null;
      };
      const onUp = () => {
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
        clearOver(); card.classList.remove('dragging');
        if (dragging && dstCard) {
          const dstSlot = Number(dstCard.dataset.slot);
          if (Number.isFinite(dstSlot) && dstSlot !== srcSlot) {
            swapSlotsLocally(srcSlot, dstSlot); render();
            ipcRenderer.invoke('swap-grid-slots', { src: srcSlot, dst: dstSlot });
          }
        }
        setTimeout(() => { card._draggingNow = false; }, 0);
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });

    _gridSection.appendChild(card);
  }

  if (gridCount < gridCols * gridRows) {
    const addGrid = document.createElement('div');
    addGrid.className = 'add-btn grid-add';
    addGrid.textContent = '+ Term';
    addGrid.title = '+Term — グリッドターミナルを新規追加';
    addGrid.addEventListener('click', addGridTerminal);
    _gridSection.appendChild(addGrid);
  }

  if (snappedExternals.size > 1) {
    const releaseAll = document.createElement('div');
    releaseAll.className = 'release-all-btn';
    releaseAll.textContent = 'Release All';
    releaseAll.addEventListener('click', async () => {
      for (const wn of [...snappedExternals.keys()]) await unsnapExternal(wn);
    });
    _gridSection.appendChild(releaseAll);
  }

  // ━━ AVAILABLE section (B案: Segmented Tabs) ━━
  const available = externalWindows.filter(w => !snappedExternals.has(w.windowNumber));
  _availSection.innerHTML = '';
  if (available.length > 0) {
    const availableTerminal = available.filter(w => isTerminalApp(w.app));
    const availableFinder = available.filter(w => isFinderApp(w.app));
    const availableApps = available.filter(w => !isTerminalApp(w.app) && !isFinderApp(w.app) && !isTiNApp(w.app));
    // TiN Grid overlay と slot terminal は除外、sidebar のみ
    const availableTiN = available.filter(w =>
      isTiNApp(w.app) && !/ Grid$/.test(w.title) && !/\[\d+\]$/.test(w.title)
    );
    // 自己 pseudo-entry を先頭に追加 (HERE 表示)
    if (wsName) {
      availableTiN.unshift({
        windowNumber: -999,
        app: 'TiN',
        title: `TiN \u2014 ${wsName}`,
        pid: -1,
        _self: true,
      });
    }

    // タブバー
    const tabsBar = document.createElement('div');
    tabsBar.className = 'avail-tabs';
    const makeTab = (key, label, count, aiFilter) => {
      const tab = document.createElement('div');
      tab.className = `avail-tab ${key}${activeAvailTab === key ? ' active' : ''}`;
      const labelSpan = document.createElement('span');
      labelSpan.textContent = label;
      const countSpan = document.createElement('span');
      countSpan.className = 'tab-count';
      countSpan.textContent = String(count);
      tab.appendChild(labelSpan);
      tab.appendChild(countSpan);
      if (aiFilter) {
        const ai = document.createElement('span');
        ai.className = 'tab-ai';
        ai.textContent = 'AI';
        ai.title = 'Auto-snap this category';
        ai.addEventListener('click', (e) => {
          e.stopPropagation();
          ipcRenderer.send('trigger-auto-snap', { filter: aiFilter });
        });
        tab.appendChild(ai);
      }
      tab.addEventListener('click', () => {
        if (activeAvailTab === key) return;
        activeAvailTab = key;
        render();
      });
      return tab;
    };
    tabsBar.appendChild(makeTab('term', 'Terminal', availableTerminal.length, 'terminal'));
    tabsBar.appendChild(makeTab('finder', 'Finder', availableFinder.length, 'finder'));
    tabsBar.appendChild(makeTab('apps', 'Apps', availableApps.length, null));
    tabsBar.appendChild(makeTab('tin', 'TiN', availableTiN.length, null));
    _availSection.appendChild(tabsBar);

    // search input (render 跨ぎで input 要素を保持 → focus/値維持)
    const searchWrap = document.createElement('div');
    searchWrap.className = 'avail-search';
    if (!_availSearchInput) {
      _availSearchInput = document.createElement('input');
      _availSearchInput.type = 'text';
      _availSearchInput.spellcheck = false;
      _availSearchInput.addEventListener('input', (e) => {
        availSearchText = e.target.value;
        updateAvailList();
      });
      _availSearchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && availSearchText) {
          _availSearchInput.value = '';
          availSearchText = '';
          updateAvailList();
        }
      });
    }
    _availSearchInput.placeholder = activeAvailTab === 'term'
      ? 'Filter terminals...'
      : activeAvailTab === 'finder'
        ? 'Filter finder windows...'
        : activeAvailTab === 'apps'
          ? 'Filter apps...'
          : 'Filter workspaces...';
    if (_availSearchInput.value !== availSearchText) _availSearchInput.value = availSearchText;
    searchWrap.appendChild(_availSearchInput);
    _availSection.appendChild(searchWrap);

    // list
    const list = document.createElement('div');
    list.className = 'avail-list';
    list.setAttribute('data-avail-list', '1');
    _availSection.appendChild(list);
    populateAvailList(list, availableTerminal, availableFinder, availableApps, availableTiN);
  }

  // ━━ SIDEBAR TERMINALS section (xterm containers are preserved across renders) ━━
  _sideSection.innerHTML = '';
  const sideTitle = document.createElement('div');
  sideTitle.className = 'section-title section-title-clickable';
  sideTitle.innerHTML = `<span class="section-toggle">${sidebarCollapsed ? '\u25b8' : '\u25be'}</span> CONSOLE (${embeddedTerms.length})`;
  sideTitle.addEventListener('click', () => { sidebarCollapsed = !sidebarCollapsed; render(); });
  _sideSection.appendChild(sideTitle);

  if (!sidebarCollapsed) {
    embeddedTerms.forEach((s, i) => {
      const card = document.createElement('div');
      card.className = `term-card${s.expanded ? ' expanded' : ''}`;
      const header = document.createElement('div');
      header.className = 'card-header';
      header.innerHTML = `<span class="card-badge badge-pty">PTY</span><span class="card-title">${escHtml(s.title)}</span><span class="card-close">\u00d7</span>`;
      header.querySelector('.card-title').addEventListener('click', () => toggleExpand(i));
      header.querySelector('.card-close').addEventListener('click', (e) => { e.stopPropagation(); removeEmbedded(i); });
      card.appendChild(header);
      // xterm container: reuse existing DOM element if available (avoids re-mount)
      let embed = _termContainers.get(s.id);
      if (!embed) {
        embed = document.createElement('div');
        embed.className = 'term-embed';
        _termContainers.set(s.id, embed);
      }
      card.appendChild(embed);
      _sideSection.appendChild(card);
      if (s.expanded && !s._mounted) {
        s.term.open(embed);
        s._mounted = true;
        requestAnimationFrame(() => {
          try { s.fitAddon.fit(); ipcRenderer.send('terminal-resize', { id: s.id, cols: s.term.cols, rows: s.term.rows }); } catch {}
        });
      } else if (s.expanded && s._mounted) {
        // Already mounted — just re-fit after reattach
        requestAnimationFrame(() => {
          try { s.fitAddon.fit(); } catch {}
        });
      }
    });

    const addBtn = document.createElement('div');
    addBtn.className = 'add-btn';
    addBtn.textContent = '+ Console';
    addBtn.addEventListener('click', () => addEmbedded());
    _sideSection.appendChild(addBtn);
  }

  // Attach persistent sections — ドロワーコンテンツに配置
  if (!_sectionsAttached) {
    drawerContent.appendChild(_gridSection);
    drawerContent.appendChild(_memoSection);
    drawerContent.appendChild(_availSection);
    document.getElementById('console-fixed').appendChild(_sideSection);
    _sectionsAttached = true;
  }

  // Show/hide available section
  _availSection.style.display = available.length > 0 ? '' : 'none';

  statusEl.textContent = `${Object.keys(gridSlots).length} grid \u00b7 ${snappedExternals.size} ext \u00b7 ${embeddedTerms.length} console`;

  // \u30b0\u30ea\u30c3\u30c9\u30aa\u30fc\u30d0\u30fc\u30ec\u30a4: \u8907\u6570\u30a2\u30d7\u30ea & \u30b0\u30ea\u30c3\u30c9\u30e2\u30fc\u30c9\u306e\u3068\u304d\u3060\u3051\u8868\u793a
  const totalItems = snappedExternals.size + Object.keys(gridSlots).length;
  const showOverlay = currentViewMode === 'grid' && totalItems >= 2;
  document.body.classList.toggle('show-grid-overlay', showOverlay);
  // 空きスロット常時薄表示: グリッドモードで空きがある時
  const hasEmpty = totalItems < gridCols * gridRows;
  document.body.classList.toggle('show-empty-slots', currentViewMode === 'grid' && hasEmpty);

  // #gp-grid に占有セルの slot 色枠を描く (外部端末を囲む)。gap/padding は
  // getSlotBounds と一致するため、均等グリッドなら枠が端末にほぼ重なる。
  const gpEl = document.getElementById('gp-grid');
  if (gpEl) {
    const ovCells = gpSlotLayout || Array.from({ length: gridCols * gridRows },
      (_, k) => ({ id: k, col: k % gridCols, row: Math.floor(k / gridCols), colSpan: 1, rowSpan: 1 }));
    gpEl.style.gridTemplateColumns = `repeat(${gridCols}, 1fr)`;
    gpEl.style.gridTemplateRows = `repeat(${gridRows}, 1fr)`;
    gpEl.innerHTML = '';
    for (const c of ovCells) {
      const d = document.createElement('div');
      d.className = 'gp-cell';
      d.style.gridColumn = `${c.col + 1} / span ${c.colSpan}`;
      d.style.gridRow = `${c.row + 1} / span ${c.rowSpan}`;
      const ovEntry = slotEntries.get(c.id);
      if (ovEntry) {
        d.classList.add('cell-occupied');
        const cc = colorFor(ovEntry.wn, c.id, ovEntry.info && ovEntry.info.title);
        const ci = stateIntensityFor(ovEntry.wn, c.id);
        d.style.border = `4px solid ${ci === null ? cc : hexA(cc, 0.35 + 0.65 * ci)}`;  // 濃さ=深刻度
        d.style.borderRadius = '6px';
        d.style.boxShadow = `0 0 14px ${cc}, inset 0 0 20px ${cc}55`;
      }
      gpEl.appendChild(d);
    }
  }
}

// ── IPC ──
ipcRenderer.on('terminal-data', (_e, { id, data }) => {
  const s = embeddedTerms.find(s => s.id === id);
  if (s) s.term.write(data);
});
ipcRenderer.on('terminal-exit', (_e, { id }) => {
  const idx = embeddedTerms.findIndex(s => s.id === id);
  if (idx >= 0) { embeddedTerms[idx].term.dispose(); _termContainers.delete(id); embeddedTerms.splice(idx, 1); render(); }
});
ipcRenderer.on('new-terminal', () => addGridTerminal());
ipcRenderer.on('close-current', () => {
  if (embeddedTerms.length > 0) removeEmbedded(embeddedTerms.length - 1);
});
// render を debounce して DOM 再構築頻度を制限 (100ms)
let _renderTimer = null;
let _lastRenderKey = '';

function buildRenderKey() {
  // snapped + grid の変化だけをキーにする (タイトルはドロワー表示分のみ)
  let k = '';
  for (const [wn, info] of snappedExternals) {
    // 状態色(main の status-colorize 由来)も key に含める → 状態が変わると再描画
    k += `${wn}:${info.slot}:${statusColors[wn] || ''},`;
  }
  k += '|';
  for (const slot of Object.keys(gridSlots)) k += `${slot}:${(statusPtyStates[slot] && statusPtyStates[slot].state) || ''},`;
  k += '|' + frontmostWindowNumber;
  k += '|' + externalWindows.length; // ウィンドウ増減は検知
  return k;
}

function scheduleRender() {
  if (_renderTimer) return;
  _renderTimer = setTimeout(() => {
    _renderTimer = null;
    const key = buildRenderKey();
    if (key === _lastRenderKey) return; // 変化なしはスキップ
    _lastRenderKey = key;
    render();
  }, 100);
}

// タイトル変化など細かい変化は Available リストのみ再描画 (全 render より軽量)
function scheduleAvailUpdate() {
  if (_renderTimer) return; // render が pending なら重複不要
  setTimeout(() => updateAvailList(), 150);
}

// Frontmost 更新 — ext snap card のハイライト即反映
ipcRenderer.on('frontmost-update', (_e, wn) => {
  if (wn === frontmostWindowNumber) return;
  frontmostWindowNumber = wn || 0;
  _lastRenderKey = ''; // frontmost 変化は必ず再描画
  render();
});

ipcRenderer.on('external-windows', (_e, windows, otherSnapped, gridInfo, snappedSlots, frontmostWn, snappedList) => {
  const prevLen = externalWindows.length;
  snappedByOther = otherSnapped || {};
  gridSlots = gridInfo || {};
  externalWindows = windows;
  frontmostWindowNumber = frontmostWn || 0;

  // snappedList が届いた場合は authoritative sync (main.js の状態を正とする)
  let snappedChanged = false;
  if (snappedList) {
    const authoritative = new Map(snappedList.map(e => [e.windowNumber, e]));
    for (const [k] of snappedExternals) {
      if (!authoritative.has(k)) { snappedExternals.delete(k); snappedChanged = true; }
    }
    for (const [k, entry] of authoritative) {
      const existing = snappedExternals.get(k);
      if (existing) {
        const live = windows.find(w => w.windowNumber === k);
        if (live && live.title) existing.title = live.title;
        if (live && live.app) existing.app = live.app;
        if (existing.slot !== entry.slot) { existing.slot = entry.slot; snappedChanged = true; }
      } else {
        snappedExternals.set(k, { title: entry.title, app: entry.app, slot: entry.slot });
        snappedChanged = true;
      }
    }
  } else {
    for (const [k, info] of snappedExternals) {
      const live = windows.find(w => w.windowNumber === k);
      if (live) {
        if (live.title) info.title = live.title;
        if (live.app) info.app = live.app;
      }
    }
  }

  if (snappedChanged || windows.length !== prevLen) {
    // スナップ増減・ウィンドウ数変化: グリッドと Available を両方更新
    gpRender(gridCols, gridRows);
    _lastRenderKey = ''; // 強制再描画
    scheduleRender();
  } else {
    // タイトルのみの変化: Available リストだけ軽量更新
    scheduleAvailUpdate();
  }
});

// ── Raise on sidebar click (軽量: mousedown ではなく mouseup + debounce で発火) ──
// titlebar + content のクリックで snapped 全体を前面化。0.8s throttle で多発防止。
let _raiseThrottle = 0;
function triggerRaiseAll() {
  const now = Date.now();
  if (now - _raiseThrottle < 800) return;
  _raiseThrottle = now;
  ipcRenderer.send('raise-all');
}
document.getElementById('titlebar').addEventListener('mousedown', triggerRaiseAll);

document.getElementById('content').addEventListener('mousedown', (e) => {

// ── Grid panel click-through (ウィンドウレベル) ──
// pointer-events:none はCSS内のみ。実際のクリックスルーには setIgnoreMouseEvents が必要。
let gpEditMode = false; // グリッドJSブロックとこのブロックで共有
{
  const gridPanel = document.getElementById('grid-panel');
  let _ctState = false;

  function setClickthrough(on) {
    if (_ctState === on) return;
    _ctState = on;
    ipcRenderer.send('set-win-clickthrough', on);
  }

  // getBoundingClientRect をキャッシュ — 毎 mousemove での reflow を回避
  let _cachedGridRect = gridPanel.getBoundingClientRect();
  new ResizeObserver(() => { _cachedGridRect = gridPanel.getBoundingClientRect(); }).observe(gridPanel);

  // mousemove: rAF throttle 廃止 — overlay フラグで軽量判定、遅延ゼロ
  window.addEventListener('mousemove', (e) => {
    if (gpEditMode || _hasOverlayActive) { setClickthrough(false); return; }
    const gridRect = _cachedGridRect;
    const onGrid = e.clientX >= gridRect.left && e.clientX <= gridRect.right
                && e.clientY >= gridRect.top  && e.clientY <= gridRect.bottom;
    setClickthrough(onGrid);
  });

  window.addEventListener('mouseleave', () => setClickthrough(false));
  // blur で OFF にしない: click-through ON でターミナルをクリックすると blur が発火し、
  // 次クリックを TiN が横取りする原因になる。ヘッダー保護は main の _ctGuardTimer が担当。
}

// overlay/editMode 通知ヘルパー (main の ctGuard 補助用)
// _hasOverlayActive: mousemove で elementsFromPoint を使わずに判定するためのフラグ
let _hasOverlayActive = false;
function notifyOverlay(active) {
  _hasOverlayActive = active;
  ipcRenderer.send('set-overlay-active', active);
}
function notifyEditMode(active) { ipcRenderer.send('set-edit-mode', active); }

// ── キーボードショートカット（TiN フォーカス時） ──
const AVAIL_TABS = ['term', 'finder', 'apps', 'tin'];
document.addEventListener('keydown', (e) => {
  // モーダル/入力欄が開いているときは無視
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  if (e.target.isContentEditable) return;
  const cmd = e.metaKey || e.ctrlKey;

  // Cmd+[ / Cmd+] — Available タブを前後に切り替え
  if (cmd && e.key === ']') {
    e.preventDefault();
    const idx = AVAIL_TABS.indexOf(activeAvailTab);
    activeAvailTab = AVAIL_TABS[(idx + 1) % AVAIL_TABS.length];
    render();
    return;
  }
  if (cmd && e.key === '[') {
    e.preventDefault();
    const idx = AVAIL_TABS.indexOf(activeAvailTab);
    activeAvailTab = AVAIL_TABS[(idx - 1 + AVAIL_TABS.length) % AVAIL_TABS.length];
    render();
    return;
  }
  // Cmd+1..4 — タブを直接選択
  if (cmd && !e.altKey && !e.shiftKey && ['1','2','3','4'].includes(e.key)) {
    e.preventDefault();
    activeAvailTab = AVAIL_TABS[Number(e.key) - 1] || AVAIL_TABS[0];
    render();
    return;
  }
  // ? または Cmd+/ — ホットキー一覧を表示
  if (e.key === '?' || (cmd && e.key === '/')) {
    e.preventDefault();
    showHotkeyHelp();
    return;
  }
});

// ── Grid Layout Editor ──
let gpSlotLayout = null;

// slotLayout から editor 用の cellMap を構築
function glpBuildCellMap(cols, rows, slotLayout) {
  // cellMap[id] = { id, col, row, colSpan, rowSpan }
  const map = new Map();
  if (slotLayout) {
    for (const cell of slotLayout) map.set(cell.id, cell);
  } else {
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++) {
        const id = r * cols + c;
        map.set(id, { id, col: c, row: r, colSpan: 1, rowSpan: 1 });
      }
  }
  return map;
}

// セルIDのグリッド占有情報を返す（どのセルIDがどのグリッド座標を占有するか）
function glpBuildOccupancyGrid(cols, rows, cellMap) {
  // occupancy[r][c] = cellId
  const occ = Array.from({length: rows}, () => Array(cols).fill(-1));
  for (const [id, cell] of cellMap) {
    for (let dr = 0; dr < cell.rowSpan; dr++)
      for (let dc = 0; dc < cell.colSpan; dc++)
        occ[cell.row + dr][cell.col + dc] = id;
  }
  return occ;
}

// 選択範囲（矩形）内のすべてのセルIDを取得
function glpGetCellsInRange(occ, r1, c1, r2, c2) {
  const minR = Math.min(r1, r2), maxR = Math.max(r1, r2);
  const minC = Math.min(c1, c2), maxC = Math.max(c1, c2);
  const ids = new Set();
  for (let r = minR; r <= maxR; r++)
    for (let c = minC; c <= maxC; c++)
      if (occ[r][c] >= 0) ids.add(occ[r][c]);
  return ids;
}

// slotLayout から新しい配列を生成するヘルパー
function glpBuildLayout(cols, rows, cellMap) {
  const layout = [...cellMap.values()].sort((a, b) => a.id - b.id);
  // すべて colSpan=rowSpan=1 ならデフォルト（null）扱い
  if (layout.every(c => c.colSpan === 1 && c.rowSpan === 1) && layout.length === cols * rows)
    return null;
  return layout;
}

function openGridLayoutPopup(anchorEl) {
  const existing = document.getElementById('grid-layout-popup');
  if (existing) { existing.remove(); notifyOverlay(false); return; }

  notifyOverlay(true);
  // ローカル状態（適用前の編集値）
  let editCols = gridCols, editRows = gridRows;
  let currentCellMap = glpBuildCellMap(editCols, editRows, gpSlotLayout);
  let occ = glpBuildOccupancyGrid(editCols, editRows, currentCellMap);
  let selectedRange = null, selectedMergedId = null, dragStart = null;

  const popup = document.createElement('div');
  popup.id = 'grid-layout-popup';

  // ── ① サイズプリセット ──
  const presetSec = document.createElement('div');
  presetSec.style.cssText = 'display:flex;flex-direction:column;gap:4px;';

  const SIZE_PRESETS = [
    ['1×2',1,2],['2×1',2,1],['1×3',1,3],['3×1',3,1],
    ['2×2',2,2],['2×3',2,3],['3×2',3,2],['3×3',3,3],
  ];
  const presetGrid = document.createElement('div');
  presetGrid.style.cssText = 'display:grid;grid-template-columns:repeat(4,1fr);gap:4px;';
  for (const [label, c, r] of SIZE_PRESETS) {
    const btn = document.createElement('button');
    btn.className = 'glp-size-item' + (c===editCols && r===editRows ? ' active' : '');
    btn.innerHTML = makeMiniGridSVG(c, r) + `<span>${label}</span>`;
    btn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      editCols = c; editRows = r;
      currentCellMap = glpBuildCellMap(editCols, editRows, null);
      occ = glpBuildOccupancyGrid(editCols, editRows, currentCellMap);
      selectedRange = null; selectedMergedId = null;
      cIn.value = c; rIn.value = r;
      presetGrid.querySelectorAll('.glp-size-item').forEach((b,i) => b.classList.toggle('active', SIZE_PRESETS[i][1]===c && SIZE_PRESETS[i][2]===r));
      buildLayoutPresets();
      redrawGrid(); updateActions();
    });
    presetGrid.appendChild(btn);
  }
  presetSec.appendChild(presetGrid);

  // カスタムサイズ入力
  const customRow = document.createElement('div');
  customRow.style.cssText = 'display:flex;align-items:center;gap:6px;';
  const cLabel = document.createElement('label'); cLabel.textContent = 'Custom'; cLabel.style.cssText = 'font-size:10px;color:rgba(0,0,0,0.4);flex-shrink:0;';
  const cIn = document.createElement('input'); cIn.type='number'; cIn.min='1'; cIn.max='20'; cIn.value=editCols;
  cIn.style.cssText = 'width:34px;text-align:center;font-size:11px;border:1px solid rgba(0,0,0,0.15);border-radius:4px;padding:2px 3px;';
  const xLbl = document.createElement('span'); xLbl.textContent='×'; xLbl.style.cssText='font-size:11px;color:rgba(0,0,0,0.35);';
  const rIn = document.createElement('input'); rIn.type='number'; rIn.min='1'; rIn.max='20'; rIn.value=editRows;
  rIn.style.cssText = 'width:34px;text-align:center;font-size:11px;border:1px solid rgba(0,0,0,0.15);border-radius:4px;padding:2px 3px;';
  const applyCustom = () => {
    const nc=Math.max(1,Math.min(20,parseInt(cIn.value)||1)), nr=Math.max(1,Math.min(20,parseInt(rIn.value)||1));
    if (nc===editCols && nr===editRows) return;
    editCols=nc; editRows=nr;
    currentCellMap=glpBuildCellMap(nc,nr,null);
    occ=glpBuildOccupancyGrid(nc,nr,currentCellMap);
    selectedRange=null; selectedMergedId=null;
    presetGrid.querySelectorAll('.glp-size-item').forEach((b,i) => b.classList.toggle('active', SIZE_PRESETS[i][1]===nc && SIZE_PRESETS[i][2]===nr));
    buildLayoutPresets();
    redrawGrid(); updateActions();
  };
  [cIn,rIn].forEach(inp => {
    inp.addEventListener('input', applyCustom);
    // ↑↓ で増減 (1〜20。spinner 非表示のためキー操作を明示実装)
    inp.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        e.preventDefault();
        inp.value = Math.max(1, Math.min(20, (parseInt(inp.value, 10) || 1) + (e.key === 'ArrowUp' ? 1 : -1)));
        applyCustom();
      }
      e.stopPropagation();
    });
    inp.addEventListener('click', e => e.stopPropagation());
  });
  customRow.appendChild(cLabel); customRow.appendChild(cIn); customRow.appendChild(xLbl); customRow.appendChild(rIn);
  presetSec.appendChild(customRow);
  popup.appendChild(presetSec);

  // ── ② セパレーター ──
  const sep = document.createElement('div');
  sep.style.cssText = 'border-top:1px solid rgba(0,0,0,0.07);margin:2px 0;';
  popup.appendChild(sep);

  // ── ③ LAYOUT プリセット（左大/右大…） ──
  const layoutPresets = [
    { id:'default', label:'均等', merges:[] },
    ...(editCols>=2&&editRows>=2 ? [
      {id:'left-big',  label:'左大', merges:[{col:0,      row:0,colSpan:1,   rowSpan:editRows}]},
      {id:'right-big', label:'右大', merges:[{col:editCols-1,row:0,colSpan:1,rowSpan:editRows}]},
      {id:'top-big',   label:'上大', merges:[{col:0,      row:0,colSpan:editCols,rowSpan:1}]},
      {id:'bottom-big',label:'下大', merges:[{col:0,row:editRows-1,colSpan:editCols,rowSpan:1}]},
    ]:[]),
  ];
  const makeMiniSVG = (merges, c, r) => {
    const W=28,H=22,gap=2,pad=2;
    const cw=(W-pad*2-gap*(c-1))/c, rh=(H-pad*2-gap*(r-1))/r;
    const covered=new Set(); let rects='';
    for(const m of merges){
      const x=pad+m.col*(cw+gap),y=pad+m.row*(rh+gap);
      const w=m.colSpan*cw+(m.colSpan-1)*gap,h=m.rowSpan*rh+(m.rowSpan-1)*gap;
      rects+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" rx="1.5" fill="rgba(60,120,230,0.6)"/>`;
      for(let dr=0;dr<m.rowSpan;dr++) for(let dc=0;dc<m.colSpan;dc++) covered.add((m.row+dr)*c+(m.col+dc));
    }
    for(let ri=0;ri<r;ri++) for(let ci=0;ci<c;ci++)
      if(!covered.has(ri*c+ci)) rects+=`<rect x="${(pad+ci*(cw+gap)).toFixed(1)}" y="${(pad+ri*(rh+gap)).toFixed(1)}" width="${cw.toFixed(1)}" height="${rh.toFixed(1)}" rx="1.5" fill="rgba(100,140,220,0.3)"/>`;
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">${rects}</svg>`;
  };

  const lPresetBar = document.createElement('div');
  lPresetBar.className = 'glp-presets';
  lPresetBar.id = 'glp-layout-preset-bar';
  const buildLayoutPresets = () => {
    lPresetBar.innerHTML = '';
    const lp = [
      { label:'均等', merges:[] },
      ...(editCols>=2&&editRows>=2 ? [
        {label:'左大', merges:[{col:0,         row:0,colSpan:1,      rowSpan:editRows}]},
        {label:'右大', merges:[{col:editCols-1, row:0,colSpan:1,      rowSpan:editRows}]},
        {label:'上大', merges:[{col:0,          row:0,colSpan:editCols,rowSpan:1}]},
        {label:'下大', merges:[{col:0, row:editRows-1,colSpan:editCols,rowSpan:1}]},
      ]:[]),
    ];
    for (const preset of lp) {
      const btn = document.createElement('button'); btn.className='glp-preset-btn';
      btn.innerHTML = makeMiniSVG(preset.merges, editCols, editRows);
      const lbl=document.createElement('span'); lbl.textContent=preset.label; btn.appendChild(lbl);
      btn.addEventListener('click', () => {
        const covered=new Set(); const newMap=new Map();
        for(const m of preset.merges){
          const id=m.row*editCols+m.col;
          newMap.set(id,{id,col:m.col,row:m.row,colSpan:m.colSpan,rowSpan:m.rowSpan});
          for(let dr=0;dr<m.rowSpan;dr++) for(let dc=0;dc<m.colSpan;dc++) covered.add((m.row+dr)*editCols+(m.col+dc));
        }
        for(let ri=0;ri<editRows;ri++) for(let ci=0;ci<editCols;ci++)
          if(!covered.has(ri*editCols+ci)){const id=ri*editCols+ci; newMap.set(id,{id,col:ci,row:ri,colSpan:1,rowSpan:1});}
        currentCellMap=newMap; occ=glpBuildOccupancyGrid(editCols,editRows,currentCellMap);
        selectedRange=null; selectedMergedId=null; redrawGrid(); updateActions();
      });
      lPresetBar.appendChild(btn);
    }
  };
  buildLayoutPresets();
  popup.appendChild(lPresetBar);

  // ── ④ エディタグリッド ──
  const gridWrap=document.createElement('div'); gridWrap.className='glp-grid-wrap';
  const gridEl=document.createElement('div'); gridEl.className='glp-grid';
  gridWrap.appendChild(gridEl); popup.appendChild(gridWrap);

  // ── ⑤ アクション + フッター ──
  const actionsBar=document.createElement('div'); actionsBar.className='glp-actions';
  const hintEl=document.createElement('span'); hintEl.className='glp-action-hint'; hintEl.textContent='セルをドラッグして選択';
  actionsBar.appendChild(hintEl);
  const mergeBtn=document.createElement('button'); mergeBtn.className='glp-btn primary'; mergeBtn.textContent='結合'; mergeBtn.style.display='none';
  const splitBtn=document.createElement('button'); splitBtn.className='glp-btn danger'; splitBtn.textContent='分割'; splitBtn.style.display='none';
  actionsBar.appendChild(mergeBtn); actionsBar.appendChild(splitBtn);
  popup.appendChild(actionsBar);

  const footer=document.createElement('div'); footer.className='glp-footer';
  const resetBtn=document.createElement('button'); resetBtn.className='glp-btn secondary'; resetBtn.textContent='リセット';
  const doneBtn=document.createElement('button'); doneBtn.className='glp-btn primary'; doneBtn.textContent='Done';
  footer.appendChild(resetBtn); footer.appendChild(doneBtn);
  popup.appendChild(footer);

  document.body.appendChild(popup);

  // 位置
  const ar=anchorEl.getBoundingClientRect();
  popup.style.top=(ar.bottom+4)+'px';
  const left=Math.min(ar.left, window.innerWidth-310-8);
  popup.style.left=Math.max(8,left)+'px';

  // ── グリッド描画 ──
  function redrawGrid() {
    gridEl.style.gridTemplateColumns=`repeat(${editCols},1fr)`;
    gridEl.style.gridTemplateRows=`repeat(${editRows},1fr)`;
    gridEl.innerHTML='';
    occ=glpBuildOccupancyGrid(editCols,editRows,currentCellMap);
    const sorted=[...currentCellMap.values()].sort((a,b)=>a.row!==b.row?a.row-b.row:a.col-b.col);
    for(const cell of sorted){
      const div=document.createElement('div'); div.className='glp-cell';
      div.dataset.r=cell.row; div.dataset.c=cell.col; div.dataset.id=cell.id;
      div.style.gridColumn=`${cell.col+1} / span ${cell.colSpan}`;
      div.style.gridRow=`${cell.row+1} / span ${cell.rowSpan}`;
      const isMerged=cell.colSpan>1||cell.rowSpan>1;
      if(isMerged){
        div.classList.add('merged');
        if(selectedMergedId===cell.id) div.classList.add('selected-merged');
        const lbl=document.createElement('span'); lbl.className='glp-merge-label'; lbl.textContent=`${cell.colSpan}\xd7${cell.rowSpan}`; div.appendChild(lbl);
      } else {
        if(selectedRange){
          const{r1,c1,r2,c2}=selectedRange;
          const minR=Math.min(r1,r2),maxR=Math.max(r1,r2),minC=Math.min(c1,c2),maxC=Math.max(c1,c2);
          if(cell.row>=minR&&cell.row<=maxR&&cell.col>=minC&&cell.col<=maxC) div.classList.add('selecting');
        }
        const lbl=document.createElement('span'); lbl.className='glp-merge-label'; lbl.textContent=cell.id+1; div.appendChild(lbl);
      }
      div.addEventListener('mousedown',(e)=>{
        e.preventDefault();
        if(isMerged){selectedRange=null; selectedMergedId=(selectedMergedId===cell.id)?null:cell.id; redrawGrid(); updateActions(); return;}
        selectedMergedId=null; dragStart={r:cell.row,c:cell.col};
        selectedRange={r1:cell.row,c1:cell.col,r2:cell.row,c2:cell.col};
        redrawGrid(); updateActions();
      });
      div.addEventListener('mouseenter',()=>{
        if(!dragStart) return;
        selectedRange={r1:dragStart.r,c1:dragStart.c,r2:cell.row,c2:cell.col};
        redrawGrid(); updateActions();
      });
      gridEl.appendChild(div);
    }
  }

  function updateActions(){
    mergeBtn.style.display='none'; splitBtn.style.display='none';
    if(selectedRange){
      const{r1,c1,r2,c2}=selectedRange;
      const minR=Math.min(r1,r2),maxR=Math.max(r1,r2),minC=Math.min(c1,c2),maxC=Math.max(c1,c2);
      const cellCount=(maxR-minR+1)*(maxC-minC+1);
      if(cellCount>=2){
        const ids=glpGetCellsInRange(occ,minR,minC,maxR,maxC);
        const hasMerged=[...ids].some(id=>{const c=currentCellMap.get(id);return c&&(c.colSpan>1||c.rowSpan>1);});
        if(!hasMerged){mergeBtn.style.display=''; hintEl.textContent=`${cellCount}セルを結合`;}
        else hintEl.textContent='結合済みセルを含む選択は結合できません';
      } else hintEl.textContent='セルをドラッグして選択';
    } else if(selectedMergedId!==null){
      splitBtn.style.display=''; hintEl.textContent='結合を解除します';
    } else hintEl.textContent='セルをドラッグして選択';
  }

  const _mouseUpHandler=()=>{ dragStart=null; };
  window.addEventListener('mouseup',_mouseUpHandler);

  const _outsideHandler=(e)=>{
    if(popup.contains(e.target)) return;
    popup.remove();
    window.removeEventListener('mousedown',_outsideHandler,true);
    window.removeEventListener('mouseup',_mouseUpHandler);
    notifyOverlay(false);
  };
  setTimeout(()=>window.addEventListener('mousedown',_outsideHandler,true),0);

  mergeBtn.addEventListener('click',()=>{
    if(!selectedRange) return;
    const{r1,c1,r2,c2}=selectedRange;
    const minR=Math.min(r1,r2),maxR=Math.max(r1,r2),minC=Math.min(c1,c2),maxC=Math.max(c1,c2);
    const ids=glpGetCellsInRange(occ,minR,minC,maxR,maxC);
    for(const id of ids) currentCellMap.delete(id);
    const newId=minR*editCols+minC;
    currentCellMap.set(newId,{id:newId,col:minC,row:minR,colSpan:maxC-minC+1,rowSpan:maxR-minR+1});
    selectedRange=null; selectedMergedId=null;
    occ=glpBuildOccupancyGrid(editCols,editRows,currentCellMap);
    redrawGrid(); updateActions();
  });

  splitBtn.addEventListener('click',()=>{
    if(selectedMergedId===null) return;
    const cell=currentCellMap.get(selectedMergedId); if(!cell) return;
    currentCellMap.delete(selectedMergedId);
    for(let dr=0;dr<cell.rowSpan;dr++) for(let dc=0;dc<cell.colSpan;dc++){
      const id=(cell.row+dr)*editCols+(cell.col+dc);
      currentCellMap.set(id,{id,col:cell.col+dc,row:cell.row+dr,colSpan:1,rowSpan:1});
    }
    selectedMergedId=null; selectedRange=null;
    occ=glpBuildOccupancyGrid(editCols,editRows,currentCellMap);
    redrawGrid(); updateActions();
  });

  resetBtn.addEventListener('click',()=>{
    currentCellMap=glpBuildCellMap(editCols,editRows,null);
    occ=glpBuildOccupancyGrid(editCols,editRows,currentCellMap);
    selectedRange=null; selectedMergedId=null; redrawGrid(); updateActions();
  });

  doneBtn.addEventListener('click',()=>{
    const layout=glpBuildLayout(editCols,editRows,currentCellMap);
    // サイズ変更 + レイアウト変更を一括適用
    if(editCols!==gridCols || editRows!==gridRows) {
      setGridSize(editCols, editRows);
    }
    ipcRenderer.invoke('set-slot-layout',{layout}).then(()=>{ gpSlotLayout=layout; render(); });
    popup.remove();
    window.removeEventListener('mouseup',_mouseUpHandler);
    window.removeEventListener('mousedown',_outsideHandler,true);
    notifyOverlay(false);
  });

  redrawGrid(); updateActions();
}
</script>
</body>
</html>
