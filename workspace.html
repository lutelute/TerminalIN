<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TiN</title>
<link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    color: #1a1a2e;
    display: flex; flex-direction: column;  /* Groupy: 縦積み (header + content) */
    background: transparent;
    transition: opacity 0.15s;
  }

  /* ── Groupy ヘッダー (全幅 68px) ── */
  #sidebar {
    width: 100%;
    flex-shrink: 0;
    display: flex; flex-direction: column;
    overflow: visible;   /* ドロワーが下にはみ出るため */
    position: relative;
    background: #ffffff;
    z-index: 100;
  }
  /* サイドバーリスト・コンソール・ステータスは通常は非表示 */
  #content, #console-fixed, #status { display: none !important; }
  /* サイドバー分割線も不要 */
  #sidebar-divider { display: none !important; }

  /* ── ドロワーパネル (サイドバートグル時に表示) ── */
  #drawer-panel {
    position: fixed;
    top: 68px; left: 0;
    width: 280px;
    max-height: calc(100vh - 68px);
    background: #ffffff;
    border-right: 1px solid rgba(0,0,0,0.1);
    border-bottom: 1px solid rgba(0,0,0,0.1);
    border-radius: 0 0 10px 0;
    box-shadow: 4px 4px 16px rgba(0,0,0,0.12);
    z-index: 9000;
    display: none;
    flex-direction: column;
    overflow: hidden;
    transform: translateX(-100%);
    transition: transform 0.18s cubic-bezier(0.4,0,0.2,1);
  }
  body.drawer-open #drawer-panel {
    display: flex;
    transform: translateX(0);
  }
  #drawer-content { flex: 1; min-height: 0; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 5px; }
  #drawer-content::-webkit-scrollbar { width: 5px; }
  #drawer-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
  /* ドロワー外クリックで閉じるオーバーレイ — ヘッダー(68px)の下のみカバー */
  #drawer-overlay {
    position: fixed;
    top: 68px; left: 0; right: 0; bottom: 0;  /* ヘッダーはカバーしない */
    z-index: 8999;
    display: none;
  }
  body.drawer-open #drawer-overlay { display: block; }

  /* ドロワーボタン */
  .drawer-btn {
    width: 26px; height: 26px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: rgba(40,40,80,0.4);
    cursor: pointer; flex-shrink: 0;
    -webkit-app-region: no-drag;
    transition: background 0.12s, color 0.12s;
  }
  .drawer-btn:hover { background: rgba(0,0,0,0.06); color: rgba(40,40,80,0.8); }
  body.drawer-open .drawer-btn { color: rgba(60,120,230,0.7); background: rgba(60,120,230,0.08); }

  /* ── コンテンツエリア (全幅、透明、外部アプリが透けて見える) ── */
  #grid-panel {
    flex: 1;
    width: 100%;
    position: relative;
    overflow: hidden;
    background: transparent;
    pointer-events: none;
  }
  body.gp-edit #grid-panel { pointer-events: auto; }
  #gp-toolbar { pointer-events: auto; }

  /* C案: セルのborderは使わず、コンテナ側に中央線を疑似要素で描く */
  .gp-frame { display: none; }
  .gp-grid-container {
    position: absolute; inset: 0;
    display: grid; pointer-events: none;
    gap: 12px;
    padding: 12px;
    background: transparent;
  }
  .gp-cell {
    background: transparent; /* セルは透明 — スナップウィンドウが透けて見える */
  }
  .gp-cell-empty { background: transparent; }

  /* 分割線なし */
  .gp-divider { display: none; }
  body.gp-edit .gp-cell {
    background: rgba(255,255,255,0.25);
    outline: 1px dashed rgba(0,0,0,0.15);
  }
  body.gp-edit .gp-cell { background: rgba(0,0,0,0.03); }
  .gp-col-line, .gp-row-line {
    position: absolute;
    background: rgba(0,0,0,0.15);
    z-index: 20;
    transition: background 0.15s;
  }
  .gp-col-line {
    top: 2px; bottom: 2px; width: 8px; margin-left: -4px; cursor: ew-resize;
  }
  .gp-row-line {
    left: 2px; right: 2px; height: 8px; margin-top: -4px; cursor: ns-resize;
  }
  .gp-col-line:hover, .gp-row-line:hover { background: rgba(0,0,0,0.3); }
  .gp-col-line.dragging, .gp-row-line.dragging { background: rgba(60,130,230,0.9); }
  #gp-toolbar {
    position: absolute;
    top: 8px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 8px; padding: 6px 10px;
    display: none; gap: 6px; align-items: center;
    z-index: 30; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  body.gp-edit #gp-toolbar { display: flex; }
  #gp-toolbar button {
    padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 600;
    cursor: pointer; border: 1px solid rgba(0,0,0,0.1); background: #f5f5f5;
  }
  #gp-toolbar button.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
  #gp-toolbar button.primary:hover { background: #1d4ed8; }
  #gp-toolbar button:hover { background: #eee; }
  #gp-toolbar span { font-size: 11px; color: #666; margin-right: 4px; }

  /* ── Active / Inactive 状態 ── */
  /* アクティブ: クリアで明るい (vibrancy: active で常時明るい背景)
     非アクティブ: 灰色マスクで少し沈んだ見た目に */
  /* inactive overlay はサイドバーのみに適用 */
  #sidebar::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(120,120,130,0.18);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 9999;
  }
  body.window-inactive #sidebar::after {
    opacity: 1;
  }
  body.window-inactive {
    color: #6a6a7a;
  }

  /* ── Titlebar ── */
  #titlebar {
    height: 68px;
    -webkit-app-region: drag;
    display: flex; flex-direction: column;
    padding: 0 10px 0 72px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(0,0,0,0.1);
  }
  #titlebar-row1 {
    display: flex; align-items: center;
    height: 38px; width: 100%;
  }
  /* ── Groupy タブバー (row2) ── */
  #titlebar-row2 {
    display: flex; align-items: flex-end;
    height: 28px; width: 100%;
    padding: 0 8px 0 4px;
    overflow-x: auto; overflow-y: hidden;
    gap: 2px;
  }
  #titlebar-row2::-webkit-scrollbar { display: none; }

  /* タブアイテム */
  .groupy-tab {
    display: flex; align-items: center; gap: 5px;
    height: 24px; padding: 0 8px 0 7px;
    border-radius: 5px 5px 0 0;
    cursor: pointer;
    -webkit-app-region: no-drag;
    font-size: 11px; font-weight: 500;
    color: rgba(40,40,80,0.55);
    background: rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.07);
    border-bottom: none;
    user-select: none; white-space: nowrap;
    flex-shrink: 0; max-width: 160px;
    overflow: hidden; text-overflow: ellipsis;
    transition: background 0.1s, color 0.1s;
  }
  .groupy-tab:hover { background: rgba(0,0,0,0.08); color: rgba(40,40,80,0.8); }
  .groupy-tab.active {
    background: rgba(255,255,255,0.92);
    color: rgba(20,20,60,0.9);
    border-color: rgba(0,0,0,0.12);
    font-weight: 600;
  }
  body.window-inactive .groupy-tab.active { background: rgba(230,230,240,0.9); }
  .groupy-tab .tab-icon {
    width: 13px; height: 13px; border-radius: 3px;
    font-size: 8px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; opacity: 0.7;
  }
  .groupy-tab .tab-icon.term { background: rgba(40,180,100,0.2); color: #28b464; }
  .groupy-tab .tab-icon.finder { background: rgba(30,120,255,0.15); color: #1e78ff; }
  .groupy-tab .tab-icon.app { background: rgba(120,80,200,0.15); color: #7850c8; }
  .groupy-tab .tab-title { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .groupy-tab .tab-close {
    width: 14px; height: 14px; border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: rgba(0,0,0,0.25); flex-shrink: 0;
    margin-left: 2px; transition: background 0.1s, color 0.1s;
  }
  .groupy-tab .tab-close:hover { background: rgba(220,50,50,0.15); color: rgba(200,40,40,0.8); }
  .groupy-tab-add {
    height: 20px; width: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: rgba(0,0,0,0.25);
    cursor: pointer; flex-shrink: 0;
    -webkit-app-region: no-drag;
    border-radius: 4px; margin-bottom: 2px;
    transition: color 0.1s, background 0.1s;
  }
  .groupy-tab-add:hover { color: rgba(0,0,0,0.6); background: rgba(0,0,0,0.06); }
  #title {
    font-size: 14px; font-weight: 700; color: rgba(30,30,60,0.85);
    cursor: text; user-select: none;
    -webkit-app-region: no-drag;
    letter-spacing: -0.2px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background 0.1s, color 0.15s;
  }
  body.window-inactive #title { color: rgba(80,80,100,0.5); }
  #title:hover { background: rgba(0,0,0,0.04); }
  #title-input {
    font-size: 14px; font-weight: 700; color: rgba(40,40,70,0.85);
    background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.15);
    border-radius: 4px; padding: 2px 6px; outline: none;
    font-family: inherit; width: 100%;
    -webkit-app-region: no-drag;
    display: none;
  }

  #collapse-btn {
    width: 24px; height: 24px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 600;
    color: rgba(40,40,70,0.35); cursor: pointer;
    -webkit-app-region: no-drag;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  #collapse-btn:hover { background: rgba(0,0,0,0.06); color: rgba(40,40,70,0.6); }

  #titlebar-grid {
    display: flex; align-items: flex-end; gap: 2px;
    height: 100%; flex: 1;
    -webkit-app-region: no-drag;
    overflow-x: auto; overflow-y: hidden;
  }
  #titlebar-grid::-webkit-scrollbar { display: none; }
  /* grid-selector をタブの後ろ (右側) に配置 */
  #titlebar-grid .grid-selector { margin-left: auto; display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
  #titlebar-grid .grid-opt {
    -webkit-app-region: no-drag;
    padding: 4px 9px; font-size: 11px; min-width: 26px;
    line-height: 1;
  }
  #titlebar-grid .grid-size-cycle { min-width: 38px; }

  body.collapsed #content, body.collapsed #status { display: none; }
  body.collapsed #sidebar { width: 40px; min-width: 40px; }
  body.collapsed #titlebar {
    flex-direction: column; height: 100%; padding: 42px 0 8px; align-items: center; gap: 6px;
    -webkit-app-region: drag;
  }
  body.collapsed #titlebar-row1, body.collapsed #titlebar-row2 { flex-direction: column; height: auto; width: auto; padding: 0; }
  body.collapsed #title { writing-mode: vertical-rl; font-size: 11px; letter-spacing: 1px; flex: 1; cursor: default; }
  body.collapsed #title:hover { background: transparent; }
  body.collapsed #title-input { display: none !important; }
  body.collapsed #collapse-btn { transform: rotate(180deg); }
  body.collapsed #titlebar-grid { display: none; }

  /* ── Content ── */
  #content { flex: 1; min-height: 0; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 5px; }
  #content::-webkit-scrollbar { width: 5px; }
  #content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
  /* ── Console (sidebar 下部に常時固定、スクロール外) ── */
  #console-fixed {
    flex-shrink: 0;
    border-top: 1px solid rgba(0,0,0,0.08);
    background: rgba(0,0,0,0.015);
    padding: 6px 8px 4px;
    max-height: 40%;
    overflow-y: auto;
    overflow-x: hidden;
  }
  body.collapsed #console-fixed { display: none; }

  /* ── Sections ── */
  .section {
    padding: 6px;
    display: flex; flex-direction: column; gap: 3px;
    border-radius: 6px;
  }
  .section-grid { background: rgba(130,80,220,0.04); }
  .section-available { background: rgba(40,120,210,0.04); }

  .section-title {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
    color: rgba(0,0,0,0.45); padding: 2px 0 3px;
    display: flex; align-items: center; gap: 6px;
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .section-title .section-accent { font-weight: 700; }
  .section-grid .section-accent { color: rgba(120,70,200,0.65); }
  .section-available .section-accent { color: rgba(40,110,200,0.65); }

  .section-title-clickable { cursor: pointer; user-select: none; }
  .section-title-clickable:hover { color: rgba(0,0,0,0.5); }
  .section-toggle { font-size: 9px; }

  /* ── Console fixed to bottom (常時表示) ── */
  .section-console {
    border-top: 1px solid rgba(0,0,0,0.08);
    padding: 6px;
    flex-shrink: 0;
    background: #fff;
  }

  /* ── Grid size selector ── */
  .grid-selector { display: flex; gap: 2px; margin-left: auto; }
  .grid-opt {
    font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 3px; cursor: pointer;
    border: none; color: rgba(0,0,0,0.3); background: transparent;
    font-family: 'SF Mono', 'Menlo', monospace;
    transition: all 0.1s;
  }
  .grid-opt:hover { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.5); }
  .grid-opt.active { background: rgba(0,0,0,0.08); color: rgba(0,0,0,0.6); }

  /* ── Grid size popup ── */
  .grid-size-popup {
    position: fixed; z-index: 9999;
    background: #fff; border: 1px solid rgba(0,0,0,0.12);
    border-radius: 8px; padding: 5px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px;
    min-width: 200px;
  }
  .grid-size-custom-row {
    grid-column: 1 / -1;
    display: flex; flex-direction: row; align-items: center; gap: 5px;
    padding: 6px 4px 3px;
    border-top: 1px solid rgba(0,0,0,0.07);
    margin-top: 2px;
  }
  .grid-size-custom-inputs {
    display: flex; align-items: center; gap: 4px;
  }
  .grid-size-custom-row input {
    width: 38px; text-align: center;
    font-size: 11px; font-family: 'SF Mono','Menlo',monospace;
    border: 1px solid rgba(0,0,0,0.2); border-radius: 4px;
    padding: 3px 4px; outline: none;
    color: rgba(0,0,0,0.75);
  }
  .grid-size-custom-row input:focus { border-color: rgba(60,120,230,0.6); }
  .grid-size-custom-row .sep { font-size: 11px; color: rgba(0,0,0,0.4); }
  .grid-size-custom-btn {
    flex: 1; font-size: 10px; font-weight: 600;
    border: none; border-radius: 4px; padding: 3px 6px;
    background: rgba(60,120,230,0.12); color: rgba(40,90,200,0.85);
    cursor: pointer;
  }
  .grid-size-custom-btn:hover { background: rgba(60,120,230,0.22); }
  /* カスタムプレビュー: SVG グリッドをスクロール可能なエリアに表示 */
  .grid-size-custom-preview {
    width: 100%; overflow-x: auto; overflow-y: hidden;
    display: flex; align-items: center; justify-content: center;
    padding: 3px 0;
    color: rgba(0,0,0,0.5);
  }
  .grid-size-custom-preview svg { flex-shrink: 0; }
  .grid-size-item {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 5px 7px; border: none; background: transparent;
    border-radius: 5px; cursor: pointer;
    font-size: 9px; font-family: 'SF Mono', 'Menlo', monospace;
    color: rgba(0,0,0,0.45); transition: all 0.1s;
    user-select: none;
  }
  .grid-size-item:hover { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.75); }
  .grid-size-item.active { background: rgba(0,0,0,0.08); color: rgba(0,0,0,0.8); font-weight: 700; }
  .grid-size-item svg { opacity: 0.45; transition: opacity 0.1s; }
  .grid-size-item:hover svg, .grid-size-item.active svg { opacity: 1; }

  /* ── Space picker popup ── */
  .space-picker-popup {
    position: fixed; z-index: 9999;
    background: #fff; border: 1px solid rgba(0,0,0,0.12);
    border-radius: 8px; padding: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    min-width: 120px; max-height: 260px; overflow-y: auto;
  }
  .space-picker-item {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 9px; border: none; background: transparent;
    border-radius: 5px; cursor: pointer; width: 100%;
    font-size: 11px; font-family: 'SF Mono','Menlo',monospace;
    color: rgba(0,0,0,0.55); transition: all 0.1s; text-align: left;
    white-space: nowrap;
  }
  .space-picker-item:hover { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.8); }
  .space-picker-item.current { font-weight: 700; color: rgba(0,0,0,0.75); }
  .space-picker-item .sp-num {
    font-size: 9px; opacity: 0.45; min-width: 18px;
  }

  /* ── Terminal card (sidebar embedded) ── */
  .term-card {
    background: rgba(0,0,0,0.025); border: 1px solid rgba(0,0,0,0.07);
    border-radius: 8px; overflow: hidden;
  }
  .term-card .card-header {
    display: flex; align-items: center; gap: 6px; padding: 6px 8px; cursor: pointer;
    transition: background 0.1s;
  }
  .term-card .card-header:hover { background: rgba(0,0,0,0.04); }
  .term-card.expanded .term-embed { display: block; }
  .term-card .term-embed { display: none; height: 200px; }
  .card-title {
    flex: 1; font-size: 12px; font-weight: 500; color: rgba(20,20,40,0.85);
    font-family: 'SF Mono', 'Menlo', monospace;
  }

  /* ── Badges ── */
  .card-badge {
    font-size: 8px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
    letter-spacing: 0.5px;
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .badge-pty { background: rgba(50,170,110,0.1); color: rgba(40,140,90,0.8); }
  .badge-grid { background: rgba(120,70,200,0.1); color: rgba(110,60,190,0.8); }
  .badge-ext { background: rgba(40,120,210,0.1); color: rgba(30,100,190,0.8); }
  .badge-term { background: rgba(40,120,210,0.12); color: rgba(20,90,180,0.85); }
  .badge-finder { background: rgba(255,170,40,0.15); color: rgba(200,120,0,0.9); }
  .badge-tin { background: rgba(130,70,220,0.14); color: rgba(100,50,180,0.9); }
  .badge-app { background: rgba(0,145,80,0.11); color: rgba(0,115,60,0.9); }

  /* ── Segmented Tabs (AVAILABLE) — v1.3.4 B 案 ── */
  .avail-tabs {
    display: flex;
    padding: 0 2px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    margin: 0 -2px 4px;
  }
  .avail-tab {
    flex: 1;
    padding: 7px 3px 6px;
    font-size: 10px; font-weight: 700;
    color: rgba(0,0,0,0.4);
    text-align: center; cursor: pointer;
    border-bottom: 2px solid transparent;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    user-select: none;
    font-family: 'SF Mono', 'Menlo', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: color 0.1s, border-color 0.1s;
  }
  .avail-tab:hover:not(.active) { color: rgba(0,0,0,0.65); }
  .avail-tab .tab-count {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 14px; height: 13px; padding: 0 3px;
    border-radius: 6px;
    background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.5);
    font-size: 9px; font-weight: 700;
    font-feature-settings: "tnum";
  }
  .avail-tab.active { color: rgba(0,0,0,0.9); }
  .avail-tab.term.active { color: rgba(30,100,190,0.95); border-bottom-color: rgba(30,100,190,0.8); }
  .avail-tab.term.active .tab-count { background: rgba(30,100,190,0.12); color: rgba(30,100,190,0.95); }
  .avail-tab.finder.active { color: rgba(200,120,0,0.95); border-bottom-color: rgba(200,120,0,0.85); }
  .avail-tab.finder.active .tab-count { background: rgba(200,120,0,0.15); color: rgba(200,120,0,0.95); }
  .avail-tab.tin.active { color: rgba(100,50,180,0.95); border-bottom-color: rgba(100,50,180,0.85); }

  /* 復元バナー (再起動直後に表示) */

<body>

<!-- ドロワー外クリック用オーバーレイ -->
<div id="drawer-overlay" onclick="toggleDrawer(false)"></div>

<!-- ドロワーパネル (サイドバーリスト) -->
<div id="drawer-panel">
  <div id="drawer-content"></div>
</div>

<div id="sidebar">
  <div id="titlebar">
    <div id="titlebar-row1">
      <!-- ドロワートグルボタン -->
      <div class="drawer-btn" id="drawer-toggle-btn" title="パネルを表示/非表示 (ターミナル・Finder リスト)" onclick="toggleDrawer()">☰</div>
      <span id="title">TiN</span>
      <input id="title-input" type="text" />
      <div style="flex:1"></div>
      <!-- モード切り替えボタン -->
      <div id="view-mode-btn" class="drawer-btn" title="グリッド / フルスクリーンタブ 切り替え" onclick="toggleViewMode()">⊞</div>
      <div id="collapse-btn" title="Collapse sidebar (Cmd+B)" style="display:none">‹</div>
    </div>
    <div id="titlebar-row2">
      <div id="titlebar-grid"></div>
    </div>
  </div>
  <div id="content"></div>
  <div id="console-fixed"></div>
  <div id="status">Starting...</div>
</div>
<div id="sidebar-divider"></div>
<div id="grid-panel">
  <div class="gp-frame"></div>
  <div class="gp-grid-container" id="gp-grid"></div>
  <div id="gp-toolbar">
    <span>Grid Edit</span>
    <button onclick="gpResetRatios()">Reset</button>
    <button class="primary" onclick="gpExitEditMode()">Done</button>
  </div>
</div>

<script>
const { ipcRenderer } = require('electron');
const { Terminal } = require('@xterm/xterm');
const { FitAddon } = require('@xterm/addon-fit');

const content = document.getElementById('content');
const drawerContent = document.getElementById('drawer-content');
const statusEl = document.getElementById('status');
const titleEl = document.getElementById('title');
const titleInput = document.getElementById('title-input');

// ── ドロワー表示/非表示 ──
function toggleDrawer(forceState) {
  const open = forceState !== undefined ? forceState : !document.body.classList.contains('drawer-open');
  document.body.classList.toggle('drawer-open', open);
}

// ── グリッド / Tab モード切り替え ──
let currentViewMode = 'grid';
function toggleViewMode() {
  currentViewMode = currentViewMode === 'grid' ? 'tab' : 'grid';
  const btn = document.getElementById('view-mode-btn');
  if (btn) btn.textContent = currentViewMode === 'tab' ? '⊡' : '⊞';
  ipcRenderer.invoke('set-view-mode', { mode: currentViewMode });
  render();
}

// Tab モードでタブをクリックしてアクティブスロット切り替え
function activateTab(slot) {
  if (currentViewMode !== 'tab') {
    currentViewMode = 'tab';
    const btn = document.getElementById('view-mode-btn');
    if (btn) btn.textContent = '⊡';
  }
  ipcRenderer.invoke('set-active-tab', { slot });
  render();
}

let wsId = null;
let wsName = 'TiN';
let wsColor = null; // { bg, fg, accent }

// State
const embeddedTerms = [];
const snappedExternals = new Map();
let externalWindows = [];
let showTerminals = true;
let showFinders = true;
let showTiNWindows = true;
let snappedByOther = {};
let gridSlots = {};
let gridCols = 2, gridRows = 2;
// B案: AVAILABLE タブ切替 state
let activeAvailTab = 'term'; // 'term' | 'finder' | 'apps' | 'tin'
let availSearchText = '';
// input 要素を render 跨ぎで保持 (focus / 入力値維持)
let _availSearchInput = null;
// 最前面 window の windowNumber (slot card のハイライト用)
let frontmostWindowNumber = 0;

// ── Title renaming (click to edit) ──
titleEl.addEventListener('click', () => {
  titleEl.style.display = 'none';
  titleInput.style.display = 'inline-block';
  titleInput.value = wsName;
  titleInput.focus();
  titleInput.select();
});

function commitRename() {
  const newName = titleInput.value.trim() || wsName;
  wsName = newName;
  titleEl.textContent = wsName;
  titleEl.style.display = '';
  titleInput.style.display = 'none';
  ipcRenderer.send('rename-workspace', { name: wsName });
}
titleInput.addEventListener('blur', commitRename);
titleInput.addEventListener('keydown', (e) => {
  if (e.isComposing || e.keyCode === 229) return; // IME 変換中はスキップ
  if (e.key === 'Enter') commitRename();
  if (e.key === 'Escape') { titleInput.value = wsName; commitRename(); }
});

ipcRenderer.on('workspace-info', (_e, info) => {
  wsId = info.id;
  wsName = info.name;
  wsColor = info.color || null;
  titleEl.textContent = wsName;
  if (wsColor) {
    document.getElementById('titlebar').style.borderBottomColor = wsColor.accent;
  }
});

ipcRenderer.on('set-sidebar-width', (_e, { width }) => {
  document.documentElement.style.setProperty('--sidebar-w', width + 'px');
});

// 復元時の snapped Map 初期化 (main 側で既に配置済みの窓を renderer に知らせる)
ipcRenderer.on('hydrate-snapped', (_e, list) => {
  // 権威リストで同期: _snapPending のものは楽観的状態を保持して除外
  const incoming = new Map((list || []).map(e => [e.windowNumber, e]));
  for (const [k] of snappedExternals) {
    if (!incoming.has(k) && !_snapPending.has(k)) snappedExternals.delete(k);
  }
  for (const [k, entry] of incoming) {
    snappedExternals.set(k, { title: entry.title, app: entry.app, slot: entry.slot });
  }
  render();
});

// 復元結果バナー (再起動時のみ)
let restoreBanner = null;
let lastRestoreReport = null;  // 最新のレポートを保持 (render 後の再描画に使う)

function renderRestoreBanner() {
  if (!lastRestoreReport) return;
  // 既存バナーを削除
  const existing = document.querySelector('.restore-banner');
  if (existing && existing.parentNode) existing.parentNode.removeChild(existing);
  const { restored = [], missing = [] } = lastRestoreReport;
  const total = restored.length + missing.length;
  if (total === 0) return;
  try {
    const banner = document.createElement('div');
    banner.className = 'restore-banner' + (missing.length > 0 ? ' has-missing' : '');
    const title = missing.length > 0
      ? `\u26a0 復元: ${restored.length} 件 / ${missing.length} 件スキップ`
      : `\u2713 復元完了: ${restored.length} 件`;
    const header = document.createElement('div');
    header.className = 'rb-header';
    header.innerHTML = `<span>${title}</span><span class="rb-close" title="Dismiss">\u00d7</span>`;
    banner.appendChild(header);
    if (missing.length > 0) {
      const ul = document.createElement('ul');
      for (const m of missing.slice(0, 5)) {
        const li = document.createElement('li');
        const t = (m.title || 'untitled').substring(0, 35);
        li.textContent = `\u2022 ${m.app}: ${t}`;
        ul.appendChild(li);
      }
      if (missing.length > 5) {
        const li = document.createElement('li');
        li.textContent = `... \u4ed6 ${missing.length - 5} 件`;
        ul.appendChild(li);
      }
      banner.appendChild(ul);
    }
    header.querySelector('.rb-close').addEventListener('click', () => {
      if (banner.parentNode) banner.parentNode.removeChild(banner);
      lastRestoreReport = null;
    });
    // content の直前 (body 内の titlebar と content の間) に挿入
    if (content && content.parentNode) {
      content.parentNode.insertBefore(banner, content);
    }
    restoreBanner = banner;
  } catch (e) {
    console.warn('[tin] renderRestoreBanner failed:', e.message);
  }
}

// ── Preferences modal ──
async function openPreferences() {
  const settings = await ipcRenderer.invoke('get-settings');

// ── Sidebar embedded terminals ──
async function addEmbedded(title) {
  const name = title || `Shell ${embeddedTerms.length + 1}`;
  const { id } = await ipcRenderer.invoke('create-terminal', {});
  const term = new Terminal({
    fontSize: 12, fontFamily: "'SF Mono', 'Fira Code', monospace",
    theme: { background: '#1a1a2e', foreground: '#e0e0e0', cursor: '#80b0ff', selectionBackground: 'rgba(100,140,255,0.3)' },
    cursorBlink: true, scrollback: 3000,
  });
  const fitAddon = new FitAddon();
  term.loadAddon(fitAddon);
  term.onData(data => ipcRenderer.send('terminal-input', { id, data }));
  const session = { id, term, fitAddon, title: name, expanded: false };
  embeddedTerms.push(session);
  render();
  toggleExpand(embeddedTerms.length - 1);
}

function toggleExpand(idx) {
  const s = embeddedTerms[idx];
  s.expanded = !s.expanded;
  render();
  if (s.expanded) {
    requestAnimationFrame(() => requestAnimationFrame(() => {
      try { s.fitAddon.fit(); ipcRenderer.send('terminal-resize', { id: s.id, cols: s.term.cols, rows: s.term.rows }); } catch {}
      s.term.focus();
    }));
  }
}

function removeEmbedded(idx) {
  const s = embeddedTerms[idx];
  s.term.dispose();
  _termContainers.delete(s.id);
  ipcRenderer.invoke('kill-terminal', { id: s.id });
  embeddedTerms.splice(idx, 1);
  render();
}

// renderer 側で空きスロットを推測する (楽観的更新用)
function nextFreeSlotLocal(targetSlot) {
  const total = gridCols * gridRows;
  const used = new Set([
    ...Object.keys(gridSlots).map(Number),
    ...[...snappedExternals.values()].map(i => i.slot).filter(s => typeof s === 'number'),
  ]);
  if (typeof targetSlot === 'number' && targetSlot >= 0 && targetSlot < total && !used.has(targetSlot)) return targetSlot;
  for (let i = 0; i < total; i++) if (!used.has(i)) return i;
  return -1;
}

const _snapPending = new Set(); // 連打防止: 処理中の windowNumber

async function snapExternal(w, targetSlot) {
  if (_snapPending.has(w.windowNumber)) return;
  _snapPending.add(w.windowNumber);

  // 楽観的更新: IPC 完了前に即座に grid に反映
  const optimisticSlot = nextFreeSlotLocal(targetSlot);
  if (optimisticSlot >= 0) {
    snappedExternals.set(w.windowNumber, { title: w.title, app: w.app, slot: optimisticSlot });
    render();
  }

  try {
    const result = await ipcRenderer.invoke('snap-external', {
      windowNumber: w.windowNumber, pid: w.pid, app: w.app, title: w.title,
      x: w.x, y: w.y, width: w.width, height: w.height,
      windowIndex: w.windowIndex,
      targetSlot: (typeof targetSlot === 'number') ? targetSlot : undefined,
    });
    if (result.ok) {
      // 確定した slot で更新
      snappedExternals.set(w.windowNumber, { title: w.title, app: w.app, slot: result.slot });
      render();
    } else {
      // 楽観的更新を取り消し
      snappedExternals.delete(w.windowNumber);
      // no-slot 時: main 側の実態で renderer を同期 (リロード等によるデシンク解消)
      if (result.reason === 'no-slot' && Array.isArray(result.hydrate)) {
        for (const entry of result.hydrate) {
          if (!snappedExternals.has(entry.windowNumber)) {
            snappedExternals.set(entry.windowNumber, { title: entry.title, app: entry.app, slot: entry.slot });
          }
        }
      }
      render();
      if (result.reason === 'no-slot') showToast('空きスロットがありません。Grid を増やすか既存の snap を解除してください。', 'error');
      else if (result.reason === 'snapped-elsewhere') showToast('他の workspace で既に snap されています。', 'error');
      else showToast('snap に失敗しました。', 'error');
    }
  } finally {
    _snapPending.delete(w.windowNumber);
  }
}

// ── Slot picker: Snap ボタンクリック時に浮かぶミニグリッド ──
let _pickerEl = null;
async function openSlotPicker(anchorBtn, w) {
  if (_pickerEl) { _pickerEl.remove(); _pickerEl = null; }
  const state = await ipcRenderer.invoke('get-grid-state');
  if (!state) return;
  const { cols, rows, slots } = state;
  // 空 slot が 1 つしかなければそこへ直接 snap (ピッカー不要)
  const freeSlots = slots.map((s,i)=>s?null:i).filter(i=>i!==null);
  if (freeSlots.length === 1) { snapExternal(w, freeSlots[0]); return; }
  if (freeSlots.length === 0) { snapExternal(w); return; } // no-slot エラーは main 側で処理

  const picker = document.createElement('div');
  _pickerEl = picker;
  picker.className = 'slot-picker';
  picker.style.cssText = `
    position:fixed; z-index:10000;
    background:rgba(28,28,30,0.92); backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.08); border-radius:10px;
    padding:10px; box-shadow:0 16px 40px rgba(0,0,0,0.5);
    opacity:0; transform:scale(0.94); transition:opacity .12s ease,transform .14s ease;
  `;
  const grid = document.createElement('div');
  grid.style.cssText = `display:grid; grid-template-columns:repeat(${cols},1fr); grid-template-rows:repeat(${rows},1fr); gap:5px; width:${cols*52}px; height:${rows*40}px;`;
  for (let i = 0; i < cols * rows; i++) {
    const cell = document.createElement('div');
    const occ = slots[i];
    const isFree = !occ;
    cell.style.cssText = `
      border-radius:6px; position:relative; cursor:${isFree?'pointer':'not-allowed'};
      background:${isFree?'rgba(59,130,246,0.12)':'rgba(255,255,255,0.04)'};
      border:1px solid ${isFree?'rgba(96,165,250,0.45)':'rgba(255,255,255,0.06)'};
      transition:background .12s ease, border-color .12s ease, transform .08s ease;
      display:flex; align-items:center; justify-content:center;
      color:${isFree?'#93c5fd':'rgba(255,255,255,0.35)'};
      font-size:10px; font-weight:600; overflow:hidden;
      padding:2px 4px; text-align:center; line-height:1.15;
    `;
    if (isFree) {
      cell.textContent = String(i + 1);
      cell.addEventListener('mouseenter', () => {
        cell.style.background = 'rgba(59,130,246,0.35)';
        cell.style.borderColor = '#60a5fa';
        cell.style.transform = 'scale(1.04)';
      });
      cell.addEventListener('mouseleave', () => {
        cell.style.background = 'rgba(59,130,246,0.12)';
        cell.style.borderColor = 'rgba(96,165,250,0.45)';
        cell.style.transform = 'scale(1)';
      });
      cell.addEventListener('click', (e) => {
        e.stopPropagation();
        picker.remove(); _pickerEl = null;
        snapExternal(w, i);
      });
    } else {
      const t = (occ.title || '').slice(0, 20);
      cell.textContent = t;
      cell.title = occ.title || occ.type;
    }
    grid.appendChild(cell);
  }
  picker.appendChild(grid);
  document.body.appendChild(picker);

  // viewport 内に必ず収める (ヘッダー68px + margin でクリップ回避)
  const r = anchorBtn.getBoundingClientRect();
  const pw = picker.offsetWidth, ph = picker.offsetHeight;
  const margin = 8;
  const topMin = 68 + margin; // ヘッダー(68px)の下に必ず収める
  // 横: 左側優先、入らなければ右、それでもダメなら画面端に貼る
  let left = r.left - pw - 10;
  if (left < margin) left = r.right + 10;
  if (left + pw + margin > window.innerWidth) left = window.innerWidth - pw - margin;
  if (left < margin) left = margin;
  // 縦: anchor 中央に合わせる → 上下にはみ出たら anchor の下/上へフォールバック
  let top = r.top + r.height / 2 - ph / 2;
  if (top < topMin) {
    top = r.bottom + 6;  // anchor の下に置く
    if (top + ph + margin > window.innerHeight) top = topMin;
  }
  if (top + ph + margin > window.innerHeight) {
    top = r.top - ph - 6;  // anchor の上に置く
    if (top < topMin) top = Math.max(topMin, window.innerHeight - ph - margin);
  }
  picker.style.left = `${left}px`; picker.style.top = `${top}px`;
  requestAnimationFrame(() => { picker.style.opacity = '1'; picker.style.transform = 'scale(1)'; });

  // 外クリックで閉じる
  const closer = (e) => {
    if (!picker.contains(e.target) && e.target !== anchorBtn) {
      picker.remove(); _pickerEl = null;
      document.removeEventListener('mousedown', closer, true);
      document.removeEventListener('keydown', keyCloser);
    }
  };
  const keyCloser = (e) => { if (e.key === 'Escape') { picker.remove(); _pickerEl = null; document.removeEventListener('mousedown', closer, true); document.removeEventListener('keydown', keyCloser); } };
  setTimeout(() => {
    document.addEventListener('mousedown', closer, true);
    document.addEventListener('keydown', keyCloser);
  }, 0);
}

async function unsnapExternal(windowNumber) {
  if (_snapPending.has(windowNumber)) return;
  _snapPending.add(windowNumber);
  // 楽観的更新: 即座に削除して表示
  snappedExternals.delete(windowNumber);
  render();
  try {
    await ipcRenderer.invoke('unsnap-external', { windowNumber });
  } finally {
    _snapPending.delete(windowNumber);
  }
}

// ── Grid size ──
function setGridSize(cols, rows) {
  gridCols = cols; gridRows = rows;
  ipcRenderer.invoke('set-grid-size', { cols, rows });
  render();
}

function makeMiniGridSVG(cols, rows) {
  const W = 26, H = 18, gap = 1;
  const cw = (W - gap * (cols - 1)) / cols;
  const rh = (H - gap * (rows - 1)) / rows;
  let rects = '';
  for (let c = 0; c < cols; c++) {
    for (let r = 0; r < rows; r++) {
      const x = (c * (cw + gap)).toFixed(1);
      const y = (r * (rh + gap)).toFixed(1);
      rects += `<rect x="${x}" y="${y}" width="${cw.toFixed(1)}" height="${rh.toFixed(1)}" rx="1"/>`;
    }
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" fill="currentColor">${rects}</svg>`;
}

function openGridSizePopup(anchorEl) {
  const existing = document.getElementById('grid-size-popup');
  if (existing) { existing.remove(); return; }
  const presets = [
    ['1×2', 1, 2], ['2×1', 2, 1],
    ['1×3', 1, 3], ['3×1', 3, 1],
    ['2×2', 2, 2], ['2×3', 2, 3],
    ['3×2', 3, 2], ['3×3', 3, 3],
  ];
  const popup = document.createElement('div');
  popup.id = 'grid-size-popup';
  popup.className = 'grid-size-popup';
  for (const [label, c, r] of presets) {
    const item = document.createElement('button');
    item.className = 'grid-size-item' + (c === gridCols && r === gridRows ? ' active' : '');
    item.innerHTML = makeMiniGridSVG(c, r) + `<span>${label}</span>`;
    item.addEventListener('click', (ev) => {
      ev.stopPropagation();
      setGridSize(c, r);
      popup.remove();
    });
    popup.appendChild(item);
  }
  // カスタムサイズ入力行
  const customRow = document.createElement('div');
  customRow.className = 'grid-size-custom-row';
  const colInput = document.createElement('input');
  colInput.type = 'number'; colInput.min = '1'; colInput.max = '20';
  colInput.value = gridCols; colInput.placeholder = 'C';
  colInput.title = '列数 (1〜20)';
  const sep = document.createElement('span');
  sep.textContent = '×';
  const rowInput = document.createElement('input');
  rowInput.type = 'number'; rowInput.min = '1'; rowInput.max = '20';
  rowInput.value = gridRows; rowInput.placeholder = 'R';
  rowInput.title = '行数 (1〜20)';
  const applyBtn = document.createElement('button');
  applyBtn.className = 'grid-size-custom-btn';
  applyBtn.textContent = 'OK';
  const applyCustom = (ev) => {
    ev?.stopPropagation?.();
    const c = Math.max(1, Math.min(20, parseInt(colInput.value, 10) || 1));
    const r = Math.max(1, Math.min(20, parseInt(rowInput.value, 10) || 1));
    setGridSize(c, r);
    popup.remove();
    document.removeEventListener('click', closePopup);
  };
  applyBtn.addEventListener('click', applyCustom);
  // Enter で確定
  [colInput, rowInput].forEach(inp => {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') applyCustom();
      e.stopPropagation();
    });
    inp.addEventListener('click', (e) => e.stopPropagation());
  });
  // C-2: 色分けグリッドアイコン（青=列/縦, 橙=行/横）
  const colIcon = document.createElement('span');
  colIcon.title = '列数（縦に何分割）';
  colIcon.innerHTML = `<svg width="20" height="14" viewBox="0 0 20 14" style="display:block"><rect x="0" y="0" width="8" height="14" rx="1.5" fill="rgba(60,120,230,0.75)"/><rect x="10" y="0" width="8" height="14" rx="1.5" fill="rgba(60,120,230,0.22)"/></svg>`;
  const rowIcon = document.createElement('span');
  rowIcon.title = '行数（横に何分割）';
  rowIcon.innerHTML = `<svg width="20" height="14" viewBox="0 0 20 14" style="display:block"><rect x="0" y="0" width="20" height="6" rx="1.5" fill="rgba(230,100,30,0.72)"/><rect x="0" y="8" width="20" height="6" rx="1.5" fill="rgba(230,100,30,0.22)"/></svg>`;

  customRow.appendChild(colIcon);
  customRow.appendChild(colInput);
  customRow.appendChild(sep);
  customRow.appendChild(rowIcon);
  customRow.appendChild(rowInput);
  customRow.appendChild(applyBtn);
  popup.appendChild(customRow);

  // ライブプレビュー
  const previewDiv = document.createElement('div');
  previewDiv.className = 'grid-size-custom-preview';
  const updatePreview = () => {
    const c = Math.max(1, Math.min(20, parseInt(colInput.value, 10) || 1));
    const r = Math.max(1, Math.min(20, parseInt(rowInput.value, 10) || 1));
    const W = 120, H = 80, gap = 2;
    const cw = (W - gap * (c - 1)) / c;
    const rh = (H - gap * (r - 1)) / r;
    let rects = '';
    for (let ci = 0; ci < c; ci++) {
      for (let ri = 0; ri < r; ri++) {
        const x = (ci * (cw + gap)).toFixed(1);
        const y = (ri * (rh + gap)).toFixed(1);
        rects += `<rect x="${x}" y="${y}" width="${cw.toFixed(1)}" height="${rh.toFixed(1)}" rx="2"/>`;
      }
    }
    previewDiv.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" fill="rgba(60,120,230,0.25)" stroke="rgba(60,120,230,0.6)" stroke-width="0.5">${rects}</svg>`;
  };
  [colInput, rowInput].forEach(inp => inp.addEventListener('input', updatePreview));
  updatePreview();
  popup.appendChild(previewDiv);

  const rect = anchorEl.getBoundingClientRect();
  // 右端がはみ出ないよう調整
  popup.style.top = (rect.bottom + 2) + 'px';
  popup.style.left = rect.left + 'px';
  document.body.appendChild(popup);
  // ポップアップ表示後に cols 入力にフォーカス
  setTimeout(() => { colInput.select(); }, 30);

  const closePopup = (ev) => {
    if (!popup.contains(ev.target) && ev.target !== anchorEl) {
      popup.remove();
      document.removeEventListener('click', closePopup);
    }
  };
  document.addEventListener('click', closePopup);
}

// ── Render ──
let sidebarCollapsed = true; // Sidebar terminals collapsed by default

// アプリ種別判定 (Finder / Terminal / TiN)
const FINDER_APPS = new Set(['Finder', 'ファインダー']);
function isFinderApp(appName) {
  return !!appName && FINDER_APPS.has(appName);
}
const TERMINAL_APPS = new Set(['Terminal', 'iTerm2', 'iTerm', 'Alacritty', 'Hyper', 'WezTerm', 'Kitty', 'ターミナル', 'Warp']);
function isTerminalApp(appName) {
  return !!appName && TERMINAL_APPS.has(appName);
}
function isTiNApp(appName) {
  return appName === 'TiN';
}
function appBadgeHtml(appName) {
  if (isTiNApp(appName)) return '<span class="card-badge badge-tin">TiN</span>';
  if (isFinderApp(appName)) return '<span class="card-badge badge-finder">F</span>';
  if (isTerminalApp(appName)) return '<span class="card-badge badge-term">T</span>';
  const label = (appName || '?').charAt(0).toUpperCase();
  return `<span class="card-badge badge-app">${label}</span>`;
}
// GRID 内の snapped バッジ: workspace 固有色を使用
function snappedBadgeHtml(appName) {
  const isF = isFinderApp(appName);
  const isT = isTerminalApp(appName);
  const label = isF ? 'F' : isT ? 'T' : (appName || '?').charAt(0).toUpperCase();
  if (wsColor) {
    return `<span class="card-badge" style="background:${wsColor.bg};color:${wsColor.fg}">${label}</span>`;
  }
  return appBadgeHtml(appName);
}

// ── B案: renderAvailRow + populate/updateAvailList (タブ切替 + search フィルタ) ──
function renderAvailRow(w, type) {
  const row = document.createElement('div');
  row.className = `row ${type}`;
  if (w._self) row.classList.add('current');

  // icon
  const icon = document.createElement('div');
  icon.className = 'row-icon';
  icon.textContent = type === 'term' ? 'T' : type === 'finder' ? 'F' : type === 'apps' ? (w.app || '?').charAt(0).toUpperCase() : '\u25C6';
  row.appendChild(icon);

  // title / subtitle 分割
  const rawTitle = w.title || 'untitled';
  let titleText = rawTitle;
  let subtitleText = w.app || '';
  if (type === 'tin') {
    const m = rawTitle.match(/^TiN\s*[\u2014\u2013\-]\s*(.+)$/);
    if (m) { titleText = m[1].trim(); subtitleText = w._self ? 'Current workspace' : 'Workspace'; }
  } else {
    const m = rawTitle.match(/^(.{1,24}?)\s+[\u2014\u2013]\s+(.+)$/);
    if (m) { titleText = m[1]; subtitleText = m[2]; }
  }
  if (titleText.length > 30) titleText = titleText.substring(0, 27) + '...';
  if (subtitleText && subtitleText.length > 40) subtitleText = subtitleText.substring(0, 37) + '...';

  const info = document.createElement('div');
  info.className = 'row-info';
  const titleDiv = document.createElement('div');
  titleDiv.className = 'row-title';
  titleDiv.textContent = titleText;
  info.appendChild(titleDiv);
  if (subtitleText) {
    const sub = document.createElement('div');
    sub.className = 'row-subtitle';
    sub.textContent = subtitleText;
    info.appendChild(sub);
  }
  row.appendChild(info);

  // 右側: HERE badge (self) / ws-badge (他 workspace 所属) / action ボタン
  if (w._self) {
    const hereBadge = document.createElement('span');
    hereBadge.className = 'row-ws-badge';
    hereBadge.textContent = 'HERE';
    if (wsColor) {
      hereBadge.style.background = wsColor.bg;
      hereBadge.style.color = wsColor.fg;
    }
    hereBadge.style.cursor = 'default';
    row.appendChild(hereBadge);
    row.style.cursor = 'default';
    row.title = '現在の workspace';
    return row;
  }
  const otherWs = snappedByOther[w.windowNumber];
  if (otherWs) {
    const wsBadge = document.createElement('span');
    wsBadge.className = 'row-ws-badge';
    wsBadge.textContent = '\u2192 ' + (otherWs.name || '');
    if (otherWs.color) {
      wsBadge.style.background = otherWs.color.bg;
      wsBadge.style.color = otherWs.color.fg;
    }
    wsBadge.title = 'バッジ: 所属 workspace を前面化';
    wsBadge.addEventListener('click', (e) => {
      e.stopPropagation();
      ipcRenderer.send('switch-to-workspace-of', { windowNumber: w.windowNumber });
    });
    row.appendChild(wsBadge);
  } else {
    const action = document.createElement('button');
    action.className = 'row-action';
    action.textContent = type === 'tin' ? 'Go' : 'Snap';
    action.addEventListener('click', (e) => {
      e.stopPropagation();
      if (type === 'tin') {
        ipcRenderer.send('raise-tin-window', { windowNumber: w.windowNumber });
      } else {
        openSlotPicker(action, w);
      }
    });
    row.appendChild(action);
  }

  // row 本体クリック
  row.addEventListener('click', (e) => {
    if (e.target.classList.contains('row-action') || e.target.classList.contains('row-ws-badge')) return;
    if (type === 'tin') {
      ipcRenderer.send('raise-tin-window', { windowNumber: w.windowNumber });
    } else {
      // 楽観的: wobble (= raise) 前にハイライトを更新
      frontmostWindowNumber = w.windowNumber;
      render();
      ipcRenderer.invoke('wobble-window', {
        windowNumber: w.windowNumber, pid: w.pid, app: w.app, title: w.title,
      });
    }
  });
  return row;
}

function filterAvailByQ(items, q) {
  if (!q) return items;
  const lo = q.toLowerCase();
  return items.filter(w =>
    (w.title || '').toLowerCase().includes(lo) ||
    (w.app || '').toLowerCase().includes(lo)
  );
}

function populateAvailList(container, terminal, finder, apps, tin) {
  container.innerHTML = '';
  let items, type;
  if (activeAvailTab === 'term') { items = terminal; type = 'term'; }
  else if (activeAvailTab === 'finder') { items = finder; type = 'finder'; }
  else if (activeAvailTab === 'apps') { items = apps; type = 'apps'; }
  else { items = tin; type = 'tin'; }
  const filtered = filterAvailByQ(items, availSearchText);
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'avail-empty';
    empty.textContent = availSearchText
      ? `"${availSearchText}" にマッチなし`
      : (items.length === 0 ? '(空)' : '');
    container.appendChild(empty);
    return;
  }
  filtered.forEach(w => container.appendChild(renderAvailRow(w, type)));
}

function updateAvailList() {
  const list = document.querySelector('[data-avail-list="1"]');
  if (!list) return;
  const available = externalWindows.filter(w => !snappedExternals.has(w.windowNumber));
  const terminal = available.filter(w => isTerminalApp(w.app));
  const finder = available.filter(w => isFinderApp(w.app));
  const apps = available.filter(w => !isTerminalApp(w.app) && !isFinderApp(w.app) && !isTiNApp(w.app));
  const tin = available.filter(w =>
    isTiNApp(w.app) && !/ Grid$/.test(w.title) && !/\[\d+\]$/.test(w.title)
  );
  if (wsName) {
    tin.unshift({
      windowNumber: -999,
      app: 'TiN',
      title: `TiN \u2014 ${wsName}`,
      pid: -1,
      _self: true,
    });
  }
  populateAvailList(list, terminal, finder, apps, tin);
}

// 楽観的更新: main への invoke と並行で renderer の slot state を即座に反映
function reorderSlotsLocally(src, dst, before) {
  const items = [];
  for (const [wn, info] of snappedExternals) {
    if (typeof info.slot === 'number') items.push({ type: 'ext', slot: info.slot, wn, info });
  }
  for (const slot of Object.keys(gridSlots)) {
    items.push({ type: 'pty', slot: Number(slot), slotKey: slot });
  }
  items.sort((a, b) => a.slot - b.slot);
  const srcIdx = items.findIndex(i => i.slot === src);
  const dstIdx = items.findIndex(i => i.slot === dst);
  if (srcIdx < 0 || dstIdx < 0) return;
  const srcItem = items[srcIdx];
  items.splice(srcIdx, 1);
  let insertIdx = items.findIndex(i => i.slot === dst);
  if (!before) insertIdx++;
  items.splice(insertIdx, 0, srcItem);
  const oldPty = gridSlots;
  const newPty = {};
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    if (item.type === 'pty') {
      newPty[i] = oldPty[item.slotKey];
    } else {
      item.info.slot = i;
    }
  }
  gridSlots = newPty;
}
function swapSlotsLocally(src, dst) {
  const srcExt = [...snappedExternals.values()].find(i => i.slot === src);
  const dstExt = [...snappedExternals.values()].find(i => i.slot === dst);
  const srcPty = gridSlots[src];
  const dstPty = gridSlots[dst];
  if (srcPty || dstPty) {
    const newPty = { ...gridSlots };
    delete newPty[src]; delete newPty[dst];
    if (srcPty) newPty[dst] = srcPty;
    if (dstPty) newPty[src] = dstPty;
    gridSlots = newPty;
  }
  if (srcExt) srcExt.slot = dst;
  if (dstExt) dstExt.slot = src;
}

  // GRID dots strip — slot 状態を 1 行で可視化 (drag target)

    } else {
      const { wn, info } = entry;
      let t = info.title || '';

      const live = externalWindows.find(w => w.windowNumber === wn);
      const appForBadge = live ? live.app : (info.app || '');
      card.insertAdjacentHTML('beforeend', appBadgeHtml(appForBadge));
      const titleSpan = document.createElement('span');
      titleSpan.className = 'ext-title';
      titleSpan.textContent = t;
      card.appendChild(titleSpan);

      card.addEventListener('click', (e) => {
        if (card._draggingNow) return;
        if (e.target.classList.contains('ext-btn') || e.target.classList.contains('slot-badge')) return;
        // 楽観的: raise 前にハイライトを即移動 (poll 待ちで ~1s 遅延を解消)
        frontmostWindowNumber = wn;
        render();
        const liveNow = externalWindows.find(w => w.windowNumber === wn);
        ipcRenderer.invoke('wobble-window', {
          windowNumber: wn,
          pid: liveNow ? liveNow.pid : undefined,
          app: liveNow ? liveNow.app : undefined,
          title: liveNow ? liveNow.title : (info.title || ''),
        });
      });
      const btn = document.createElement('button');
      btn.className = 'ext-btn release';
      btn.textContent = 'Release';
      btn.addEventListener('click', (e) => { e.stopPropagation(); unsnapExternal(wn); });
      card.appendChild(btn);
    }
    // drag&drop for card — Pointer Events 版 (HTML5 DnD は Electron で drop が届かない症状あり)
    card.draggable = false;
    card.addEventListener('mousedown', (e) => {
      // Release/close ボタン等の上なら通常動作
      if (e.button !== 0) return;
      if (e.target.closest('.ext-btn, .card-close, .slot-badge')) return;
      const srcSlot = entry.slot;
      const startX = e.clientX, startY = e.clientY;
      let dragging = false;
      let dstCard = null;
      let dstBefore = true;
      const clearIndicators = () => {
        document.querySelectorAll('.slot-card').forEach(c => c.classList.remove('drag-over-top', 'drag-over-bottom'));
      };
      const onMove = (ev) => {
        if (!dragging) {
          if (Math.abs(ev.clientX - startX) < 4 && Math.abs(ev.clientY - startY) < 4) return;
          dragging = true;
          card.classList.add('dragging');
          card._draggingNow = true; // click 抑制用
        }
        const el = document.elementFromPoint(ev.clientX, ev.clientY);
        const tc = el && el.closest ? el.closest('.slot-card') : null;
        clearIndicators();
        if (tc && tc !== card) {
          const rect = tc.getBoundingClientRect();
          dstBefore = ev.clientY < rect.top + rect.height / 2;
          tc.classList.add(dstBefore ? 'drag-over-top' : 'drag-over-bottom');
          dstCard = tc;
        } else {
          dstCard = null;
        }
      };
      const onUp = () => {
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
        clearIndicators();
        card.classList.remove('dragging');
        if (dragging && dstCard) {
          const dstSlot = Number(dstCard.dataset.slot);
          if (Number.isFinite(dstSlot) && dstSlot !== srcSlot) {
            // 楽観的更新 — UI を先に反映 (poll 待ちなしで見た目が即動く)
            reorderSlotsLocally(srcSlot, dstSlot, dstBefore);
            render();
            ipcRenderer.invoke('reorder-grid-slot', { src: srcSlot, dst: dstSlot, before: dstBefore });
          }
        }
        // click 抑制をリセット (1 tick 後、click event 後)
        setTimeout(() => { card._draggingNow = false; }, 0);
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });
    _gridSection.appendChild(card);
  }

  if (gridCount < gridCols * gridRows) {
    const addGrid = document.createElement('div');
    addGrid.className = 'add-btn grid-add';
    addGrid.textContent = '+ Grid terminal';
    addGrid.addEventListener('click', addGridTerminal);
    _gridSection.appendChild(addGrid);
  }

  if (snappedExternals.size > 1) {
    const releaseAll = document.createElement('div');
    releaseAll.className = 'release-all-btn';
    releaseAll.textContent = 'Release All';
    releaseAll.addEventListener('click', async () => {
      for (const wn of [...snappedExternals.keys()]) await unsnapExternal(wn);
    });
    _gridSection.appendChild(releaseAll);
  }

  // ━━ AVAILABLE section (B案: Segmented Tabs) ━━
  const available = externalWindows.filter(w => !snappedExternals.has(w.windowNumber));
  _availSection.innerHTML = '';
  if (available.length > 0) {
    const availableTerminal = available.filter(w => isTerminalApp(w.app));
    const availableFinder = available.filter(w => isFinderApp(w.app));
    const availableApps = available.filter(w => !isTerminalApp(w.app) && !isFinderApp(w.app) && !isTiNApp(w.app));
    // TiN Grid overlay と slot terminal は除外、sidebar のみ
    const availableTiN = available.filter(w =>
      isTiNApp(w.app) && !/ Grid$/.test(w.title) && !/\[\d+\]$/.test(w.title)
    );
    // 自己 pseudo-entry を先頭に追加 (HERE 表示)
    if (wsName) {
      availableTiN.unshift({
        windowNumber: -999,
        app: 'TiN',
        title: `TiN \u2014 ${wsName}`,
        pid: -1,
        _self: true,
      });
    }

    // タブバー
    const tabsBar = document.createElement('div');
    tabsBar.className = 'avail-tabs';
    const makeTab = (key, label, count, aiFilter) => {
      const tab = document.createElement('div');
      tab.className = `avail-tab ${key}${activeAvailTab === key ? ' active' : ''}`;
      const labelSpan = document.createElement('span');
      labelSpan.textContent = label;
      const countSpan = document.createElement('span');
      countSpan.className = 'tab-count';
      countSpan.textContent = String(count);
      tab.appendChild(labelSpan);
      tab.appendChild(countSpan);
      if (aiFilter) {
        const ai = document.createElement('span');
        ai.className = 'tab-ai';
        ai.textContent = 'AI';
        ai.title = 'Auto-snap this category';
        ai.addEventListener('click', (e) => {
          e.stopPropagation();
          ipcRenderer.send('trigger-auto-snap', { filter: aiFilter });
        });
        tab.appendChild(ai);
      }
      tab.addEventListener('click', () => {
        if (activeAvailTab === key) return;
        activeAvailTab = key;
        render();
      });
      return tab;
    };
    tabsBar.appendChild(makeTab('term', 'Terminal', availableTerminal.length, 'terminal'));
    tabsBar.appendChild(makeTab('finder', 'Finder', availableFinder.length, 'finder'));
    tabsBar.appendChild(makeTab('apps', 'Apps', availableApps.length, null));
    tabsBar.appendChild(makeTab('tin', 'TiN', availableTiN.length, null));
    _availSection.appendChild(tabsBar);

    // search input (render 跨ぎで input 要素を保持 → focus/値維持)
    const searchWrap = document.createElement('div');
    searchWrap.className = 'avail-search';
    if (!_availSearchInput) {
      _availSearchInput = document.createElement('input');
      _availSearchInput.type = 'text';
      _availSearchInput.spellcheck = false;
      _availSearchInput.addEventListener('input', (e) => {
        availSearchText = e.target.value;
        updateAvailList();
      });
      _availSearchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && availSearchText) {
          _availSearchInput.value = '';
          availSearchText = '';
          updateAvailList();
        }
      });
    }
    _availSearchInput.placeholder = activeAvailTab === 'term'
      ? 'Filter terminals...'
      : activeAvailTab === 'finder'
        ? 'Filter finder windows...'
        : activeAvailTab === 'apps'
          ? 'Filter apps...'
          : 'Filter workspaces...';
    if (_availSearchInput.value !== availSearchText) _availSearchInput.value = availSearchText;
    searchWrap.appendChild(_availSearchInput);
    _availSection.appendChild(searchWrap);

    // list
    const list = document.createElement('div');
    list.className = 'avail-list';
    list.setAttribute('data-avail-list', '1');
    _availSection.appendChild(list);
    populateAvailList(list, availableTerminal, availableFinder, availableApps, availableTiN);
  }

  // ━━ SIDEBAR TERMINALS section (xterm containers are preserved across renders) ━━
  _sideSection.innerHTML = '';
  const sideTitle = document.createElement('div');
  sideTitle.className = 'section-title section-title-clickable';
  sideTitle.innerHTML = `<span class="section-toggle">${sidebarCollapsed ? '\u25b8' : '\u25be'}</span> CONSOLE (${embeddedTerms.length})`;
  sideTitle.addEventListener('click', () => { sidebarCollapsed = !sidebarCollapsed; render(); });
  _sideSection.appendChild(sideTitle);

  if (!sidebarCollapsed) {
    embeddedTerms.forEach((s, i) => {
      const card = document.createElement('div');
      card.className = `term-card${s.expanded ? ' expanded' : ''}`;
      const header = document.createElement('div');
      header.className = 'card-header';
      header.innerHTML = `<span class="card-badge badge-pty">PTY</span><span class="card-title">${s.title}</span><span class="card-close">\u00d7</span>`;
      header.querySelector('.card-title').addEventListener('click', () => toggleExpand(i));
      header.querySelector('.card-close').addEventListener('click', (e) => { e.stopPropagation(); removeEmbedded(i); });
      card.appendChild(header);
      // xterm container: reuse existing DOM element if available (avoids re-mount)
      let embed = _termContainers.get(s.id);
      if (!embed) {
        embed = document.createElement('div');
        embed.className = 'term-embed';
        _termContainers.set(s.id, embed);
      }
      card.appendChild(embed);
      _sideSection.appendChild(card);
      if (s.expanded && !s._mounted) {
        s.term.open(embed);
        s._mounted = true;
        requestAnimationFrame(() => {
          try { s.fitAddon.fit(); ipcRenderer.send('terminal-resize', { id: s.id, cols: s.term.cols, rows: s.term.rows }); } catch {}
        });
      } else if (s.expanded && s._mounted) {
        // Already mounted — just re-fit after reattach
        requestAnimationFrame(() => {
          try { s.fitAddon.fit(); } catch {}
        });
      }
    });

    const addBtn = document.createElement('div');
    addBtn.className = 'add-btn';
    addBtn.textContent = '+ Console';
    addBtn.addEventListener('click', () => addEmbedded());
    _sideSection.appendChild(addBtn);
  }

  // Attach persistent sections — ドロワーコンテンツに配置
  if (!_sectionsAttached) {
    drawerContent.appendChild(_gridSection);
    drawerContent.appendChild(_availSection);
    document.getElementById('console-fixed').appendChild(_sideSection);
    _sectionsAttached = true;
  }

  // Show/hide available section
  _availSection.style.display = available.length > 0 ? '' : 'none';

  statusEl.textContent = `${Object.keys(gridSlots).length} grid \u00b7 ${snappedExternals.size} ext \u00b7 ${embeddedTerms.length} console`;
}

// ── IPC ──
ipcRenderer.on('terminal-data', (_e, { id, data }) => {
  const s = embeddedTerms.find(s => s.id === id);
  if (s) s.term.write(data);
});
ipcRenderer.on('terminal-exit', (_e, { id }) => {
  const idx = embeddedTerms.findIndex(s => s.id === id);
  if (idx >= 0) { embeddedTerms[idx].term.dispose(); _termContainers.delete(id); embeddedTerms.splice(idx, 1); render(); }
});
ipcRenderer.on('new-terminal', () => addGridTerminal());
ipcRenderer.on('close-current', () => {
  if (embeddedTerms.length > 0) removeEmbedded(embeddedTerms.length - 1);
});
// render を debounce して DOM 再構築頻度を制限 (100ms)
let _renderTimer = null;
function scheduleRender() {
  if (_renderTimer) return;
  _renderTimer = setTimeout(() => { _renderTimer = null; render(); }, 100);
}

// Frontmost 更新 (main の軽量 poll から 500ms 以内に届く) — ext snap card のハイライト即反映
ipcRenderer.on('frontmost-update', (_e, wn) => {
  if (wn === frontmostWindowNumber) return;
  frontmostWindowNumber = wn || 0;
  render();
});

ipcRenderer.on('external-windows', (_e, windows, otherSnapped, gridInfo, snappedSlots, frontmostWn, snappedList) => {
  snappedByOther = otherSnapped || {};
  gridSlots = gridInfo || {};
  externalWindows = windows;
  frontmostWindowNumber = frontmostWn || 0;
  gpRender(gridCols, gridRows);

  // snappedList が届いた場合は authoritative sync (main.js の状態を正とする)
  if (snappedList) {
    const authoritative = new Map(snappedList.map(e => [e.windowNumber, e]));
    // main にいないエントリを削除
    for (const [k] of snappedExternals) {
      if (!authoritative.has(k)) snappedExternals.delete(k);
    }
    // main のエントリを追加・更新
    for (const [k, entry] of authoritative) {
      const existing = snappedExternals.get(k);
      if (existing) {
        // live window があればタイトル補完
        const live = windows.find(w => w.windowNumber === k);
        if (live && live.title) existing.title = live.title;
        if (live && live.app) existing.app = live.app;
        existing.slot = entry.slot;
      } else {
        snappedExternals.set(k, { title: entry.title, app: entry.app, slot: entry.slot });
      }
    }
  } else {
    // snappedList なし (旧バージョン互換): live のみでタイトル補完
    for (const [k, info] of snappedExternals) {
      const live = windows.find(w => w.windowNumber === k);
      if (live) {
        if (live.title) info.title = live.title;
        if (live.app) info.app = live.app;
      }
      // 削除しない — main.js が unsnap したタイミングで hydrate-snapped が来る
    }
  }
  scheduleRender();
});

// ── Raise on sidebar click (軽量: mousedown ではなく mouseup + debounce で発火) ──
// titlebar + content のクリックで snapped 全体を前面化。0.8s throttle で多発防止。
let _raiseThrottle = 0;
function triggerRaiseAll() {
  const now = Date.now();
  if (now - _raiseThrottle < 800) return;
  _raiseThrottle = now;
  ipcRenderer.send('raise-all');
}
document.getElementById('titlebar').addEventListener('mousedown', triggerRaiseAll);
// content エリア内クリック (ただしボタン等の個別要素は除く: stopPropagation 済み)
document.getElementById('content').addEventListener('mousedown', (e) => {
  // すでに stopPropagation されてる要素 (Snap ボタン等) はここに届かない
  triggerRaiseAll();
});

// ── Grid panel click-through (ウィンドウレベル) ──
// pointer-events:none はCSS内のみ。実際のクリックスルーには setIgnoreMouseEvents が必要。
let gpEditMode = false; // グリッドJSブロックとこのブロックで共有
{
  const gridPanel = document.getElementById('grid-panel');
  let _ctState = false;

  function setClickthrough(on) {
    if (_ctState === on) return;
    _ctState = on;
    ipcRenderer.send('set-win-clickthrough', on);
  }

  window.addEventListener('mousemove', (e) => {
    if (gpEditMode) { setClickthrough(false); return; }

    // ① カーソル下に z-index > 100 の要素があればポップアップ/ドロワー等の UI
    //   → click-through 無効 (グリッドサイズポップアップ・Space ピッカー等すべてに対応)
    const hasOverlay = document.elementsFromPoint(e.clientX, e.clientY).some(el => {
      const z = parseInt(getComputedStyle(el).zIndex, 10);
      return !isNaN(z) && z > 100;
    });
    if (hasOverlay) { setClickthrough(false); return; }

    // ② ヘッダー (#sidebar) 上か content area (#grid-panel) 上か判定
    const gridRect = gridPanel.getBoundingClientRect();
    const onGrid = e.clientX >= gridRect.left && e.clientX <= gridRect.right
                && e.clientY >= gridRect.top  && e.clientY <= gridRect.bottom;
    setClickthrough(onGrid);
  });

  window.addEventListener('mouseleave', () => setClickthrough(false));
  // ウィンドウがフォーカスを失ったとき（他のアプリが前面に来たとき）は必ず OFF に戻す
  // alwaysOnTop:false の場合、TiN がバックグラウンドになると mousemove が届かなくなるため
  window.addEventListener('blur', () => setClickthrough(false));
}

// ── Collapse ──
let isCollapsed = false;
const collapseBtn = document.getElementById('collapse-btn');
function toggleCollapse() {
  isCollapsed = !isCollapsed;
  document.body.classList.toggle('collapsed', isCollapsed);
  ipcRenderer.send('toggle-collapse', { collapsed: isCollapsed });
}
collapseBtn.addEventListener('click', toggleCollapse);
ipcRenderer.on('toggle-compact', toggleCollapse);

// ── Window active/inactive state ──
window.addEventListener('focus', () => document.body.classList.remove('window-inactive'));
window.addEventListener('blur', () => document.body.classList.add('window-inactive'));

// ── Sidebar divider drag ──
{
  const divider = document.getElementById('sidebar-divider');
  const sidebar = document.getElementById('sidebar');
  let divDragging = false;
  let divStartX = 0, divStartW = 0;
  divider.addEventListener('mousedown', (e) => {
    divDragging = true;
    divStartX = e.screenX;
    divStartW = sidebar.getBoundingClientRect().width;
    divider.classList.add('dragging');
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e) => {
    if (!divDragging) return;
    const newW = Math.max(160, Math.min(500, divStartW + (e.screenX - divStartX)));
    document.documentElement.style.setProperty('--sidebar-w', newW + 'px');
    ipcRenderer.send('sidebar-width-changed', { width: Math.round(newW) });
  });
  window.addEventListener('mouseup', () => {
    if (!divDragging) return;
    divDragging = false;
    divider.classList.remove('dragging');
    const w = Math.round(sidebar.getBoundingClientRect().width);
    ipcRenderer.send('sidebar-width-changed', { width: w });
  });
}

// ── Grid panel (right side) ──
{
  let gpCols = 2, gpRows = 2;
  let gpColRatios = null, gpRowRatios = null;
  // gpEditMode はグローバルスコープで宣言済み

  function gpGetCumulative(ratios, n) {
    const cum = [0];
    if (!ratios || ratios.length !== n) {
      for (let i = 1; i <= n; i++) cum.push(i / n);
    } else {
      let s = 0;
      for (let i = 0; i < n; i++) { s += ratios[i]; cum.push(s); }
    }
    return cum;
  }

  function gpRender(cols, rows) {
    gpCols = cols; gpRows = rows;
    const container = document.getElementById('gp-grid');
    if (!container) return;
    const cumC = gpGetCumulative(gpColRatios, cols);
    const cumR = gpGetCumulative(gpRowRatios, rows);
    const colSizes = [];
    for (let i = 0; i < cols; i++) colSizes.push(`${(cumC[i+1] - cumC[i]) * 100}%`);
    const rowSizes = [];
    for (let i = 0; i < rows; i++) rowSizes.push(`${(cumR[i+1] - cumR[i]) * 100}%`);
    container.style.gridTemplateColumns = colSizes.join(' ');
    container.style.gridTemplateRows = rowSizes.join(' ');
    container.style.gap = '8px';
    container.innerHTML = '';
    const total = cols * rows;
    for (let i = 0; i < total; i++) {
      const cell = document.createElement('div');
      cell.className = 'gp-cell';
      container.appendChild(cell);
    }
    document.querySelectorAll('.gp-divider').forEach(el => el.remove());
    if (gpEditMode) gpRenderEditLines();
  }

  // C案: 内側の分割線のみ — コンテナ内に追加してセル境界と完全一致
  function gpRenderDividers(cols, rows, cumC, cumR) {
    const container = document.getElementById('gp-grid');
    document.querySelectorAll('.gp-divider').forEach(el => el.remove());
    for (let i = 1; i < cols; i++) {
      const line = document.createElement('div');
      line.className = 'gp-divider';
      line.style.cssText = `top:0;bottom:0;left:${cumC[i]*100}%;width:2px;transform:translateX(-1px);`;
      container.appendChild(line);
    }
    for (let i = 1; i < rows; i++) {
      const line = document.createElement('div');
      line.className = 'gp-divider';
      line.style.cssText = `left:0;right:0;top:${cumR[i]*100}%;height:2px;transform:translateY(-1px);`;
      container.appendChild(line);
    }
  }


  function gpRenderEditLines() {
    document.querySelectorAll('.gp-col-line, .gp-row-line').forEach(el => el.remove());
    if (!gpEditMode) return;
    const panel = document.getElementById('grid-panel');
    if (!panel) return;
    const cumC = gpGetCumulative(gpColRatios, gpCols);
    const cumR = gpGetCumulative(gpRowRatios, gpRows);
    for (let i = 1; i < gpCols; i++) {
      const line = document.createElement('div');
      line.className = 'gp-col-line';
      line.style.left = `${cumC[i] * 100}%`;
      line.addEventListener('mousedown', (e) => gpStartLineDrag(e, 'col', i));
      panel.appendChild(line);
    }
    for (let i = 1; i < gpRows; i++) {
      const line = document.createElement('div');
      line.className = 'gp-row-line';
      line.style.top = `${cumR[i] * 100}%`;
      line.addEventListener('mousedown', (e) => gpStartLineDrag(e, 'row', i));
      panel.appendChild(line);
    }
  }

  function gpStartLineDrag(e, type, index) {
    e.preventDefault(); e.stopPropagation();
    const target = e.currentTarget;
    target.classList.add('dragging');
    const panel = document.getElementById('grid-panel');
    const rect = panel.getBoundingClientRect();
    const totalSize = type === 'col' ? rect.width : rect.height;
    const onMove = (ev) => {
      const pos = type === 'col' ? (ev.clientX - rect.left) : (ev.clientY - rect.top);
      const ratio = Math.max(0.05, Math.min(0.95, pos / totalSize));
      const cum = type === 'col' ? gpGetCumulative(gpColRatios, gpCols) : gpGetCumulative(gpRowRatios, gpRows);
      const minR = cum[index - 1] + 0.05;
      const maxR = cum[index + 1] - 0.05;
      const clamped = Math.max(minR, Math.min(maxR, ratio));
      if (!gpColRatios) gpColRatios = Array(gpCols).fill(1/gpCols);
      if (!gpRowRatios) gpRowRatios = Array(gpRows).fill(1/gpRows);
      const arr = type === 'col' ? gpColRatios : gpRowRatios;
      const prev = cum[index - 1]; const next = cum[index + 1];
      arr[index - 1] = clamped - prev;
      arr[index] = next - clamped;
      gpRender(gpCols, gpRows);
      ipcRenderer.send('update-grid-ratios', { colRatios: gpColRatios, rowRatios: gpRowRatios });
    };
    const onUp = () => {
      target.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      ipcRenderer.send('commit-grid-ratios', { colRatios: gpColRatios, rowRatios: gpRowRatios });
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  }

  window.gpResetRatios = function() {
    gpColRatios = null; gpRowRatios = null;
    gpRender(gpCols, gpRows);
    ipcRenderer.send('commit-grid-ratios', { colRatios: null, rowRatios: null });
  };
  window.gpExitEditMode = function() {
    gpEditMode = false;
    document.body.classList.remove('gp-edit');
    document.querySelectorAll('.gp-col-line, .gp-row-line').forEach(el => el.remove());
  };

  ipcRenderer.on('update-grid-panel', (_e, { cols, rows, colRatios: cr, rowRatios: rr }) => {
    gpColRatios = cr || null;
    gpRowRatios = rr || null;
    if (typeof cols === 'number' && typeof rows === 'number') {
      gridCols = cols;
      gridRows = rows;
    }
    gpRender(cols, rows);
    scheduleRender();
  });

  ipcRenderer.on('enter-grid-edit-mode', () => {
    gpEditMode = true;
    document.body.classList.add('gp-edit');
    gpRenderEditLines();
  });

  gpRender(2, 2);
}

// Start with one sidebar terminal
addEmbedded('main');
</script>
