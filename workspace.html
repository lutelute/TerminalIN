<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TerminalIN</title>
<link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    color: #333; display: flex; flex-direction: column; background: transparent;
  }

  #titlebar {
    height: 38px; -webkit-app-region: drag;
    display: flex; align-items: center; padding: 0 10px 0 72px;
    flex-shrink: 0; border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  #title { font-size: 13px; font-weight: 600; color: rgba(60,60,90,0.5); cursor: default; user-select: none; -webkit-app-region: no-drag; }
  #title-input {
    font-size: 13px; font-weight: 600; color: rgba(60,60,90,0.7);
    background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.1);
    border-radius: 4px; padding: 1px 6px; outline: none; font-family: inherit;
    -webkit-app-region: no-drag; display: none;
  }
  .tb-btn {
    width: 22px; height: 22px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-app-region: no-drag;
    transition: background 0.12s, color 0.12s; flex-shrink: 0;
  }
  #raise-btn { font-size: 13px; color: rgba(50,130,220,0.4); margin-right: 4px; }
  #raise-btn:hover { background: rgba(50,130,220,0.1); color: rgba(50,130,220,0.7); }
  #collapse-btn { font-size: 14px; font-weight: 600; color: rgba(60,60,90,0.3); }
  #collapse-btn:hover { background: rgba(0,0,0,0.06); color: rgba(60,60,90,0.5); }

  body.collapsed #content, body.collapsed #status { display: none; }
  body.collapsed #titlebar { flex-direction: column; height: 100%; padding: 42px 0 8px; align-items: center; gap: 6px; }
  body.collapsed #title { writing-mode: vertical-rl; font-size: 10px; letter-spacing: 1px; flex: 1; }
  body.collapsed #title-input { display: none !important; }
  body.collapsed #collapse-btn { transform: rotate(180deg); }

  #content { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 3px; }
  #content::-webkit-scrollbar { width: 4px; }
  #content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

  .sec { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(60,60,90,0.35); padding: 6px 0 2px; display: flex; align-items: center; gap: 6px; }
  .grid-sel { display: flex; gap: 2px; margin-left: auto; }
  .grid-opt {
    font-size: 8px; padding: 1px 5px; border-radius: 3px; cursor: pointer;
    border: 1px solid rgba(0,0,0,0.08); color: rgba(60,60,90,0.4); background: transparent;
    transition: all 0.12s;
  }
  .grid-opt:hover { background: rgba(0,0,0,0.04); }
  .grid-opt.active { background: rgba(50,130,220,0.1); color: rgba(50,130,220,0.7); border-color: rgba(50,130,220,0.2); }

  .item {
    display: flex; align-items: center; gap: 4px; padding: 4px 6px;
    background: rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.05);
    border-radius: 6px; transition: background 0.12s, border-color 0.12s;
  }
  .item:hover { background: rgba(0,0,0,0.04); }
  .item-title { flex: 1; font-size: 10px; color: rgba(40,40,60,0.6); font-family: 'SF Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge { font-size: 8px; padding: 1px 5px; border-radius: 3px; }
  .b-grid { background: rgba(130,80,220,0.1); color: rgba(130,80,220,0.7); }
  .b-ext { background: rgba(50,130,220,0.1); color: rgba(50,130,220,0.7); }
  .b-pty { background: rgba(60,180,120,0.1); color: rgba(60,160,120,0.7); }
  .b-ws { background: rgba(180,120,50,0.12); color: rgba(180,120,50,0.7); white-space: nowrap; }
  .btn {
    padding: 2px 8px; border-radius: 4px; font-size: 9px; cursor: pointer; border: 1px solid;
    transition: background 0.12s;
  }
  .btn-snap { color: rgba(50,130,220,0.7); border-color: rgba(50,130,220,0.2); background: transparent; }
  .btn-snap:hover { background: rgba(50,130,220,0.08); }
  .btn-rel { color: rgba(220,80,50,0.7); border-color: rgba(220,80,50,0.2); background: transparent; }
  .btn-rel:hover { background: rgba(220,80,50,0.08); }
  .x-btn {
    width: 18px; height: 18px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: rgba(0,0,0,0.2); cursor: pointer; transition: all 0.12s;
  }
  .x-btn:hover { background: rgba(255,60,60,0.1); color: rgba(255,60,60,0.7); }

  .term-card { background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.06); border-radius: 8px; overflow: hidden; }
  .term-hdr { display: flex; align-items: center; gap: 4px; padding: 4px 6px; cursor: pointer; transition: background 0.12s; }
  .term-hdr:hover { background: rgba(0,0,0,0.03); }
  .term-card.open .term-body { display: block; }
  .term-body { display: none; height: 200px; }
  .term-title { flex: 1; font-size: 11px; color: rgba(40,40,60,0.7); font-family: 'SF Mono', monospace; }

  .add-btn {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    padding: 6px; border-radius: 6px; border: 1px dashed rgba(0,0,0,0.08);
    cursor: pointer; font-size: 10px; transition: all 0.12s;
  }
  .add-grid { color: rgba(130,80,220,0.5); }
  .add-grid:hover { border-color: rgba(130,80,220,0.3); background: rgba(130,80,220,0.04); }
  .add-pty { color: rgba(60,180,120,0.5); }
  .add-pty:hover { border-color: rgba(60,180,120,0.3); background: rgba(60,180,120,0.04); }

  .rel-all {
    display: flex; align-items: center; justify-content: center;
    padding: 4px; border-radius: 5px; margin-top: 2px;
    border: 1px solid rgba(220,80,50,0.15); cursor: pointer;
    font-size: 9px; color: rgba(220,80,50,0.5); background: transparent; transition: background 0.12s;
  }
  .rel-all:hover { background: rgba(220,80,50,0.06); }

  #status {
    padding: 6px 10px; font-size: 9px; color: rgba(0,0,0,0.25);
    border-top: 1px solid rgba(0,0,0,0.05); flex-shrink: 0;
    font-family: 'SF Mono', monospace;
  }
</style>
</head>
<body>
<div id="titlebar">
  <span id="title">TerminalIN</span>
  <input id="title-input" type="text" />
  <div style="flex:1"></div>
  <div id="raise-btn" class="tb-btn" title="Bring all terminals to front">&#x25A3;</div>
  <div id="collapse-btn" class="tb-btn" title="Collapse (Cmd+B)">&#x2039;</div>
</div>
<div id="content"></div>
<div id="status">Starting...</div>

<script>
const { ipcRenderer } = require('electron');
const { Terminal } = require('@xterm/xterm');
const { FitAddon } = require('@xterm/addon-fit');

const $ = document.getElementById.bind(document);
const content = $('content'), statusEl = $('status'), titleEl = $('title'), titleInput = $('title-input');

let wsId = null, wsName = 'TerminalIN';
const terms = []; // sidebar embedded terminals
const snapped = new Map();
let extWins = [], otherSnapped = {}, gridSlots = {}, lastHash = '';
let gridCols = 2, gridRows = 2;

// ── Title rename ──
titleEl.addEventListener('dblclick', () => { titleEl.style.display = 'none'; titleInput.style.display = 'inline-block'; titleInput.value = wsName; titleInput.focus(); titleInput.select(); });
function commitName() { wsName = titleInput.value.trim() || wsName; titleEl.textContent = wsName; titleEl.style.display = ''; titleInput.style.display = 'none'; ipcRenderer.send('rename-workspace', { name: wsName }); }
titleInput.addEventListener('blur', commitName);
titleInput.addEventListener('keydown', e => { if (e.key === 'Enter') commitName(); if (e.key === 'Escape') { titleInput.value = wsName; commitName(); } });
ipcRenderer.on('workspace-info', (_, i) => { wsId = i.id; wsName = i.name; titleEl.textContent = wsName; });

// ── Sidebar terminals ──
async function addTerm(title) {
  const name = title || `Shell ${terms.length + 1}`;
  const { id } = await ipcRenderer.invoke('create-terminal', {});
  const t = new Terminal({ fontSize: 12, fontFamily: "'SF Mono','Fira Code',monospace", theme: { background: '#1a1a2e', foreground: '#e0e0e0', cursor: '#80b0ff', selectionBackground: 'rgba(100,140,255,0.3)' }, cursorBlink: true, scrollback: 3000 });
  const fa = new FitAddon(); t.loadAddon(fa);
  t.onData(d => ipcRenderer.send('terminal-input', { id, data: d }));
  terms.push({ id, t, fa, title: name, open: false });
  render();
  toggleTerm(terms.length - 1);
}

function toggleTerm(i) {
  terms[i].open = !terms[i].open;
  render();
  if (terms[i].open) requestAnimationFrame(() => requestAnimationFrame(() => { try { terms[i].fa.fit(); ipcRenderer.send('terminal-resize', { id: terms[i].id, cols: terms[i].t.cols, rows: terms[i].t.rows }); } catch {} terms[i].t.focus(); }));
}

function rmTerm(i) { terms[i].t.dispose(); ipcRenderer.invoke('kill-terminal', { id: terms[i].id }); terms.splice(i, 1); render(); }

// ── Grid / Snap ──
async function addGrid() { const r = await ipcRenderer.invoke('add-grid-terminal'); if (!r.ok) statusEl.textContent = r.reason === 'grid-full' ? 'Grid full' : 'Error'; }
async function rmGrid(s) { await ipcRenderer.invoke('remove-grid-terminal', { slot: Number(s) }); }
async function snap(w) { const r = await ipcRenderer.invoke('snap-external', { windowNumber: w.windowNumber, pid: w.pid, app: w.app, title: w.title, x: w.x, y: w.y, width: w.width, height: w.height }); if (r.ok) { snapped.set(w.windowNumber, { title: w.title }); render(); } }
async function unsnap(wn) { await ipcRenderer.invoke('unsnap-external', { windowNumber: wn }); snapped.delete(wn); render(); }
function setGrid(c, r) { gridCols = c; gridRows = r; ipcRenderer.invoke('set-grid-size', { cols: c, rows: r }); render(); }

// ── Render (differential) ──
let renderedHTML = '';
function render() {
  const h = [];
  const gc = Object.keys(gridSlots).length + snapped.size;
  const total = gridCols * gridRows;

  // Grid section
  h.push(`<div class="sec">GRID (${gc}/${total})<div class="grid-sel">`);
  for (const [l,c,r] of [['2×2',2,2],['3×3',3,3],['2×3',2,3]]) h.push(`<button class="grid-opt${c===gridCols&&r===gridRows?' active':''}" data-gc="${c}" data-gr="${r}">${l}</button>`);
  h.push('</div></div>');

  for (const s in gridSlots) h.push(`<div class="item"><span class="badge b-grid">GRID</span><span class="item-title">Terminal #${+s+1}</span><span class="x-btn" data-rmg="${s}">\u00d7</span></div>`);
  for (const [wn, info] of snapped) {
    const t = (info.title||'').length > 35 ? info.title.substring(0, 32) + '...' : info.title||'';
    h.push(`<div class="item"><span class="badge b-ext">EXT</span><span class="item-title">${t}</span><button class="btn btn-rel" data-unsnap="${wn}">Release</button></div>`);
  }
  if (gc < total) h.push('<div class="add-btn add-grid" data-addgrid>+ Grid terminal</div>');
  if (snapped.size > 1) h.push('<div class="rel-all" data-relall>Release All</div>');

  // Sidebar terminals
  h.push(`<div class="sec">SIDEBAR (${terms.length})</div>`);
  terms.forEach((s, i) => {
    h.push(`<div class="term-card${s.open?' open':''}" data-ti="${i}"><div class="term-hdr"><span class="badge b-pty">PTY</span><span class="term-title">${s.title}</span><span class="x-btn" data-rmt="${i}">\u00d7</span></div><div class="term-body" data-tb="${i}"></div></div>`);
  });
  h.push('<div class="add-btn add-pty" data-addpty>+ Sidebar terminal</div>');

  // Available externals
  const avail = extWins.filter(w => !snapped.has(w.windowNumber));
  if (avail.length) {
    h.push(`<div class="sec">AVAILABLE (${avail.length})</div>`);
    avail.forEach(w => {
      const t = (w.title||'untitled').length > 30 ? w.title.substring(0,27)+'...' : w.title||'untitled';
      const o = otherSnapped[w.windowNumber];
      if (o) h.push(`<div class="item"><span class="item-title">${t}</span><span class="badge b-ws">\u2192 ${o}</span></div>`);
      else h.push(`<div class="item"><span class="item-title">${t}</span><button class="btn btn-snap" data-snap="${w.windowNumber}">Snap</button></div>`);
    });
  }

  const html = h.join('');
  if (html === renderedHTML) return; // skip if unchanged
  renderedHTML = html;

  const scrollTop = content.scrollTop;
  content.innerHTML = html;
  content.scrollTop = scrollTop;

  // Re-attach xterm to open terminals
  terms.forEach((s, i) => {
    if (s.open) {
      const el = content.querySelector(`[data-tb="${i}"]`);
      if (el) { s.t.open(el); requestAnimationFrame(() => { try { s.fa.fit(); ipcRenderer.send('terminal-resize', { id: s.id, cols: s.t.cols, rows: s.t.rows }); } catch {} }); }
    }
  });

  statusEl.textContent = `${Object.keys(gridSlots).length} grid \u00b7 ${snapped.size} ext \u00b7 ${terms.length} sidebar`;
}

// ── Event delegation (single listener) ──
content.addEventListener('click', (e) => {
  const t = e.target;
  const d = (attr) => t.closest(`[${attr}]`)?.getAttribute(attr) ?? t.getAttribute(attr);
  if (d('data-gc')) { setGrid(+d('data-gc'), +d('data-gr')); return; }
  if (d('data-rmg') !== null && d('data-rmg') !== undefined) { const v = d('data-rmg'); if (v !== null) rmGrid(v); return; }
  if (d('data-unsnap')) { unsnap(+d('data-unsnap')); return; }
  if (d('data-addgrid') !== null) { addGrid(); return; }
  if (d('data-relall') !== null) { [...snapped.keys()].forEach(wn => unsnap(wn)); return; }
  if (d('data-rmt') !== null && d('data-rmt') !== undefined) { const v = d('data-rmt'); if (v !== null) { e.stopPropagation(); rmTerm(+v); return; } }
  const ti = t.closest('[data-ti]')?.getAttribute('data-ti');
  if (ti !== null && ti !== undefined && !t.closest('.x-btn')) { toggleTerm(+ti); return; }
  if (d('data-addpty') !== null) { addTerm(); return; }
  const snapBtn = t.closest('[data-snap]');
  if (snapBtn) { const wn = +snapBtn.getAttribute('data-snap'); const w = extWins.find(w => w.windowNumber === wn); if (w) snap(w); return; }
});

// ── IPC ──
ipcRenderer.on('terminal-data', (_, { id, data }) => { const s = terms.find(s => s.id === id); if (s) s.t.write(data); });
ipcRenderer.on('terminal-exit', (_, { id }) => { const i = terms.findIndex(s => s.id === id); if (i >= 0) { terms[i].t.dispose(); terms.splice(i, 1); render(); } });
ipcRenderer.on('new-terminal', () => addGrid());
ipcRenderer.on('close-current', () => { if (terms.length) rmTerm(terms.length - 1); });
ipcRenderer.on('external-windows', (_, wins, other, grid) => {
  otherSnapped = other || {};
  gridSlots = grid || {};
  extWins = wins;
  for (const k of snapped.keys()) if (!wins.find(w => w.windowNumber === k)) snapped.delete(k);
  render();
});

// ── Collapse ──
let collapsed = false;
$('collapse-btn').addEventListener('click', () => { collapsed = !collapsed; document.body.classList.toggle('collapsed', collapsed); ipcRenderer.send('toggle-collapse', { collapsed }); });
ipcRenderer.on('toggle-compact', () => { collapsed = !collapsed; document.body.classList.toggle('collapsed', collapsed); ipcRenderer.send('toggle-collapse', { collapsed }); });

// ── Raise ──
$('raise-btn').addEventListener('click', () => ipcRenderer.send('raise-all'));

addTerm('main');
</script>
</body>
</html>
