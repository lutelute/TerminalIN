<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TiN</title>
<link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    color: #1a1a2e;
    display: flex; flex-direction: column;
    background: #ffffff;
    transition: opacity 0.15s;
  }

  /* ── Active / Inactive 状態 ── */
  /* アクティブ: クリアで明るい (vibrancy: active で常時明るい背景)
     非アクティブ: 灰色マスクで少し沈んだ見た目に */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: rgba(120,120,130,0.18);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 9999;
  }
  body.window-inactive::after {
    opacity: 1;
  }
  body.window-inactive {
    color: #6a6a7a;
  }

  /* ── Titlebar ── */
  #titlebar {
    height: 52px;
    -webkit-app-region: drag;
    display: flex; align-items: center;
    padding: 0 10px 0 72px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(0,0,0,0.1);
  }
  #title {
    font-size: 14px; font-weight: 700; color: rgba(30,30,60,0.85);
    cursor: text; user-select: none;
    -webkit-app-region: no-drag;
    letter-spacing: -0.2px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background 0.1s, color 0.15s;
  }
  body.window-inactive #title { color: rgba(80,80,100,0.5); }
  #title:hover { background: rgba(0,0,0,0.04); }
  #title-input {
    font-size: 14px; font-weight: 700; color: rgba(40,40,70,0.85);
    background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.15);
    border-radius: 4px; padding: 2px 6px; outline: none;
    font-family: inherit; width: 100%;
    -webkit-app-region: no-drag;
    display: none;
  }

  #collapse-btn {
    width: 24px; height: 24px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 600;
    color: rgba(40,40,70,0.35); cursor: pointer;
    -webkit-app-region: no-drag;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  #collapse-btn:hover { background: rgba(0,0,0,0.06); color: rgba(40,40,70,0.6); }

  body.collapsed #content, body.collapsed #status { display: none; }
  body.collapsed #titlebar {
    flex-direction: column; height: 100%; padding: 42px 0 8px; align-items: center; gap: 6px;
    -webkit-app-region: drag;
  }
  body.collapsed #title { writing-mode: vertical-rl; font-size: 11px; letter-spacing: 1px; flex: 1; cursor: default; }
  body.collapsed #title:hover { background: transparent; }
  body.collapsed #title-input { display: none !important; }
  body.collapsed #collapse-btn { transform: rotate(180deg); }

  /* ── Content ── */
  #content { flex: 1; min-height: 0; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 5px; }
  #content::-webkit-scrollbar { width: 5px; }
  #content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
  /* ── Console (sidebar 下部に常時固定、スクロール外) ── */
  #console-fixed {
    flex-shrink: 0;
    border-top: 1px solid rgba(0,0,0,0.08);
    background: rgba(0,0,0,0.015);
    padding: 6px 8px 4px;
    max-height: 40%;
    overflow-y: auto;
  }
  body.collapsed #console-fixed { display: none; }

  /* ── Sections ── */
  .section {
    padding: 6px;
    display: flex; flex-direction: column; gap: 3px;
    border-radius: 6px;
  }
  .section-grid { background: rgba(130,80,220,0.04); }
  .section-available { background: rgba(40,120,210,0.04); }

  .section-title {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
    color: rgba(0,0,0,0.45); padding: 2px 0 3px;
    display: flex; align-items: center; gap: 6px;
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .section-title .section-accent { font-weight: 700; }
  .section-grid .section-accent { color: rgba(120,70,200,0.65); }
  .section-available .section-accent { color: rgba(40,110,200,0.65); }

  .section-title-clickable { cursor: pointer; user-select: none; }
  .section-title-clickable:hover { color: rgba(0,0,0,0.5); }
  .section-toggle { font-size: 9px; }

  /* ── Console fixed to bottom (常時表示) ── */
  .section-console {
    border-top: 1px solid rgba(0,0,0,0.08);
    padding: 6px;
    flex-shrink: 0;
    background: #fff;
  }

  /* ── Grid size selector ── */
  .grid-selector { display: flex; gap: 2px; margin-left: auto; }
  .grid-opt {
    font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 3px; cursor: pointer;
    border: none; color: rgba(0,0,0,0.3); background: transparent;
    font-family: 'SF Mono', 'Menlo', monospace;
    transition: all 0.1s;
  }
  .grid-opt:hover { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.5); }
  .grid-opt.active { background: rgba(0,0,0,0.08); color: rgba(0,0,0,0.6); }

  /* ── Terminal card (sidebar embedded) ── */
  .term-card {
    background: rgba(0,0,0,0.025); border: 1px solid rgba(0,0,0,0.07);
    border-radius: 8px; overflow: hidden;
  }
  .term-card .card-header {
    display: flex; align-items: center; gap: 6px; padding: 6px 8px; cursor: pointer;
    transition: background 0.1s;
  }
  .term-card .card-header:hover { background: rgba(0,0,0,0.04); }
  .term-card.expanded .term-embed { display: block; }
  .term-card .term-embed { display: none; height: 200px; }
  .card-title {
    flex: 1; font-size: 12px; font-weight: 500; color: rgba(20,20,40,0.85);
    font-family: 'SF Mono', 'Menlo', monospace;
  }

  /* ── Badges ── */
  .card-badge {
    font-size: 8px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
    letter-spacing: 0.5px;
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .badge-pty { background: rgba(50,170,110,0.1); color: rgba(40,140,90,0.8); }
  .badge-grid { background: rgba(120,70,200,0.1); color: rgba(110,60,190,0.8); }
  .badge-ext { background: rgba(40,120,210,0.1); color: rgba(30,100,190,0.8); }
  .badge-term { background: rgba(40,120,210,0.12); color: rgba(20,90,180,0.85); }
  .badge-finder { background: rgba(255,170,40,0.15); color: rgba(200,120,0,0.9); }
  .badge-tin { background: rgba(130,70,220,0.14); color: rgba(100,50,180,0.9); }

  /* サブセクション見出し (TERMINAL / FINDER) */
  .subsection-title {
    font-size: 9px; font-weight: 600; letter-spacing: 0.8px;
    padding: 6px 8px 3px; color: rgba(0,0,0,0.35);
    display: flex; align-items: center; gap: 5px;
  }
  .subsection-title .subsection-icon { font-size: 11px; }
  .subsection-title.term { color: rgba(30,100,190,0.6); }
  .subsection-title.finder { color: rgba(200,120,0,0.75); }

  .card-close {
    width: 20px; height: 20px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: rgba(0,0,0,0.25); cursor: pointer;
    transition: all 0.12s;
  }
  .card-close:hover { background: rgba(255,50,50,0.1); color: rgba(230,50,50,0.8); }

  /* ── External terminal item ── */
  .ext-item {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 6px;
    background: transparent; border: none; border-bottom: 1px solid rgba(0,0,0,0.04);
    border-radius: 0;
    transition: background 0.1s;
  }
  .ext-item:last-child { border-bottom: none; }
  .ext-item:hover { background: rgba(0,0,0,0.03); }
  .ext-item .ext-title {
    flex: 1; font-size: 11px; font-weight: 500; color: rgba(0,0,0,0.7);
    font-family: 'SF Mono', 'Menlo', monospace;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── Buttons ── */
  .ext-btn {
    padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.1s;
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .ext-btn.snap {
    color: rgba(40,110,200,0.7); background: rgba(40,120,210,0.08);
  }
  .ext-btn.snap:hover { background: rgba(40,120,210,0.16); color: rgba(30,90,180,0.9); }
  .ext-btn.release {
    color: rgba(180,50,30,0.7); background: rgba(180,50,30,0.08);
  }
  .ext-btn.release:hover { background: rgba(180,50,30,0.15); }

  .snapped-badge {
    font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px;
    background: rgba(40,120,210,0.12); color: rgba(30,100,190,0.85);
  }
  .ws-badge {
    font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px;
    background: rgba(180,120,40,0.12); color: rgba(160,100,30,0.85); white-space: nowrap;
  }

  .release-all-btn {
    display: flex; align-items: center; justify-content: center;
    padding: 4px; border-radius: 3px; margin-top: 2px;
    border: none; cursor: pointer;
    font-size: 9px; font-weight: 600; color: rgba(180,50,30,0.5); background: rgba(180,50,30,0.05);
    font-family: 'SF Mono', 'Menlo', monospace;
    transition: all 0.1s;
  }
  .release-all-btn:hover { background: rgba(180,50,30,0.1); color: rgba(180,50,30,0.7); }

  .add-btn {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    padding: 6px; border-radius: 3px;
    border: 1px dashed rgba(0,0,0,0.08); cursor: pointer;
    font-size: 10px; font-weight: 500; color: rgba(0,0,0,0.3);
    font-family: 'SF Mono', 'Menlo', monospace;
    transition: all 0.1s;
  }
  .add-btn:hover { background: rgba(0,0,0,0.04); color: rgba(0,0,0,0.5); border-color: rgba(0,0,0,0.15); }
  .add-btn.grid-add { color: rgba(0,0,0,0.3); }
  .add-btn.grid-add:hover { background: rgba(0,0,0,0.04); color: rgba(0,0,0,0.5); }

  /* ── Status bar ── */
  #status {
    padding: 7px 10px; font-size: 10px; font-weight: 500; color: rgba(0,0,0,0.3);
    border-top: 1px solid rgba(0,0,0,0.06); flex-shrink: 0;
    font-family: 'SF Mono', 'Menlo', monospace;
  }

  /* ── Compact mode ── */
  body.compact #titlebar { height: 34px; padding-left: 64px; }
  body.compact #title { font-size: 12px; }
  body.compact #content { padding: 5px; gap: 3px; }
  body.compact .section-title { display: none; }
  body.compact .term-card .card-header { padding: 4px 6px; }
  body.compact .card-title { font-size: 10px; }
  body.compact .card-badge, body.compact .snapped-badge, body.compact .ws-badge { font-size: 8px; padding: 1px 5px; }
  body.compact .ext-item { padding: 4px 6px; }
  body.compact .ext-title { font-size: 10px; }
  body.compact .ext-btn { font-size: 9px; padding: 2px 8px; }
  body.compact .add-btn { padding: 5px; font-size: 10px; }
  body.compact #status { padding: 4px 8px; font-size: 9px; }
  body.compact .term-embed { height: 150px; }

  /* 復元バナー (再起動直後に表示) */
  .restore-banner {
    margin: 6px 8px 0; padding: 6px 8px;
    font-size: 10px; line-height: 1.4;
    border-radius: 5px;
    background: rgba(60, 160, 90, 0.08);
    border: 1px solid rgba(60, 160, 90, 0.25);
    color: rgba(40, 120, 70, 0.9);
  }
  .restore-banner.has-missing {
    background: rgba(210, 150, 40, 0.09);
    border-color: rgba(210, 150, 40, 0.3);
    color: rgba(170, 110, 30, 0.95);
  }
  .restore-banner .rb-header {
    font-weight: 700; font-size: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .restore-banner .rb-close {
    cursor: pointer; padding: 0 4px; font-size: 12px;
    color: rgba(0,0,0,0.3);
  }
  .restore-banner .rb-close:hover { color: rgba(0,0,0,0.7); }
  .restore-banner ul { list-style: none; padding: 0; margin: 3px 0 0; }
  .restore-banner li { font-size: 9px; padding: 1px 0; color: inherit; opacity: 0.85; }
  body.compact .restore-banner { display: none; }

</style>
</head>
<body>

<div id="titlebar">
  <span id="title">TiN</span>
  <input id="title-input" type="text" />
  <div style="flex:1"></div>
  <div id="collapse-btn" title="Collapse sidebar (Cmd+B)">‹</div>
</div>
<div id="content"></div>
<div id="console-fixed"></div>
<div id="status">Starting...</div>

<script>
const { ipcRenderer } = require('electron');
const { Terminal } = require('@xterm/xterm');
const { FitAddon } = require('@xterm/addon-fit');

const content = document.getElementById('content');
const statusEl = document.getElementById('status');
const titleEl = document.getElementById('title');
const titleInput = document.getElementById('title-input');

let wsId = null;
let wsName = 'TiN';
let wsColor = null; // { bg, fg, accent }

// State
const embeddedTerms = [];
const snappedExternals = new Map();
let externalWindows = [];
let showTerminals = true;
let showFinders = true;
let showTiNWindows = true;
let snappedByOther = {};
let gridSlots = {};
let gridCols = 2, gridRows = 2;

// ── Title renaming (click to edit) ──
titleEl.addEventListener('click', () => {
  titleEl.style.display = 'none';
  titleInput.style.display = 'inline-block';
  titleInput.value = wsName;
  titleInput.focus();
  titleInput.select();
});

function commitRename() {
  const newName = titleInput.value.trim() || wsName;
  wsName = newName;
  titleEl.textContent = wsName;
  titleEl.style.display = '';
  titleInput.style.display = 'none';
  ipcRenderer.send('rename-workspace', { name: wsName });
}
titleInput.addEventListener('blur', commitRename);
titleInput.addEventListener('keydown', (e) => {
  if (e.isComposing || e.keyCode === 229) return; // IME 変換中はスキップ
  if (e.key === 'Enter') commitRename();
  if (e.key === 'Escape') { titleInput.value = wsName; commitRename(); }
});

ipcRenderer.on('workspace-info', (_e, info) => {
  wsId = info.id;
  wsName = info.name;
  wsColor = info.color || null;
  titleEl.textContent = wsName;
  // titlebar にワークスペース色のアクセント線を表示
  if (wsColor) {
    document.getElementById('titlebar').style.borderBottomColor = wsColor.accent;
  }
});

// 復元時の snapped Map 初期化 (main 側で既に配置済みの窓を renderer に知らせる)
ipcRenderer.on('hydrate-snapped', (_e, list) => {
  for (const entry of (list || [])) {
    snappedExternals.set(entry.windowNumber, { title: entry.title, app: entry.app });
  }
  render();
});

// 復元結果バナー (再起動時のみ)
let restoreBanner = null;
let lastRestoreReport = null;  // 最新のレポートを保持 (render 後の再描画に使う)

function renderRestoreBanner() {
  if (!lastRestoreReport) return;
  // 既存バナーを削除
  const existing = document.querySelector('.restore-banner');
  if (existing && existing.parentNode) existing.parentNode.removeChild(existing);
  const { restored = [], missing = [] } = lastRestoreReport;
  const total = restored.length + missing.length;
  if (total === 0) return;
  try {
    const banner = document.createElement('div');
    banner.className = 'restore-banner' + (missing.length > 0 ? ' has-missing' : '');
    const title = missing.length > 0
      ? `\u26a0 復元: ${restored.length} 件 / ${missing.length} 件スキップ`
      : `\u2713 復元完了: ${restored.length} 件`;
    const header = document.createElement('div');
    header.className = 'rb-header';
    header.innerHTML = `<span>${title}</span><span class="rb-close" title="Dismiss">\u00d7</span>`;
    banner.appendChild(header);
    if (missing.length > 0) {
      const ul = document.createElement('ul');
      for (const m of missing.slice(0, 5)) {
        const li = document.createElement('li');
        const t = (m.title || 'untitled').substring(0, 35);
        li.textContent = `\u2022 ${m.app}: ${t}`;
        ul.appendChild(li);
      }
      if (missing.length > 5) {
        const li = document.createElement('li');
        li.textContent = `... \u4ed6 ${missing.length - 5} 件`;
        ul.appendChild(li);
      }
      banner.appendChild(ul);
    }
    header.querySelector('.rb-close').addEventListener('click', () => {
      if (banner.parentNode) banner.parentNode.removeChild(banner);
      lastRestoreReport = null;
    });
    // content の直前 (body 内の titlebar と content の間) に挿入
    if (content && content.parentNode) {
      content.parentNode.insertBefore(banner, content);
    }
    restoreBanner = banner;
  } catch (e) {
    console.warn('[tin] renderRestoreBanner failed:', e.message);
  }
}

// ── Preferences modal ──
async function openPreferences() {
  const settings = await ipcRenderer.invoke('get-settings');
  let backdrop = document.getElementById('tin-prefs-backdrop');
  if (backdrop) backdrop.remove();
  backdrop = document.createElement('div');
  backdrop.id = 'tin-prefs-backdrop';
  backdrop.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:9999;';
  const panel = document.createElement('div');
  panel.style.cssText = 'background:#fafafa;padding:20px 24px;border-radius:10px;min-width:280px;box-shadow:0 10px 30px rgba(0,0,0,0.3);font-size:13px;color:#222;';
  panel.innerHTML = `
    <div style="font-weight:600;font-size:15px;margin-bottom:14px;">Preferences</div>
    <label style="display:block;margin-bottom:10px;">Poll 間隔
      <select id="pref-poll" style="margin-left:8px;">
        <option value="2000">2s (即応)</option>
        <option value="4000">4s (標準)</option>
        <option value="8000">8s (軽量)</option>
      </select>
    </label>
    <label style="display:block;margin-bottom:10px;">Drag 終了時
      <select id="pref-drag" style="margin-left:8px;">
        <option value="position">Position のみ (軽量)</option>
        <option value="full">Position + Size</option>
        <option value="off">追従しない (Retile ボタンで)</option>
      </select>
    </label>
    <label style="display:block;margin-bottom:10px;">新規 Workspace デフォルト Grid
      <select id="pref-grid" style="margin-left:8px;">
        <option value="2,2">2×2</option>
        <option value="3,3">3×3</option>
        <option value="2,3">2×3</option>
      </select>
    </label>
    <label style="display:flex;align-items:center;margin-bottom:16px;">
      <input type="checkbox" id="pref-autolaunch" style="margin-right:8px;">ログイン時に自動起動
    </label>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button id="pref-cancel" style="padding:5px 12px;">Cancel</button>
      <button id="pref-save" style="padding:5px 12px;background:#2563eb;color:#fff;border:1px solid #2563eb;border-radius:4px;">Save</button>
    </div>
  `;
  backdrop.appendChild(panel);
  document.body.appendChild(backdrop);
  panel.querySelector('#pref-poll').value = String(settings.pollIntervalMs || 4000);
  panel.querySelector('#pref-drag').value = settings.dragEndMode || 'position';
  panel.querySelector('#pref-grid').value = `${settings.defaultGridCols||2},${settings.defaultGridRows||2}`;
  panel.querySelector('#pref-autolaunch').checked = !!settings.autoLaunch;
  panel.querySelector('#pref-cancel').onclick = () => backdrop.remove();
  panel.querySelector('#pref-save').onclick = async () => {
    const [c, r] = panel.querySelector('#pref-grid').value.split(',').map(Number);
    await ipcRenderer.invoke('save-settings', {
      pollIntervalMs: Number(panel.querySelector('#pref-poll').value),
      dragEndMode: panel.querySelector('#pref-drag').value,
      defaultGridCols: c,
      defaultGridRows: r,
      autoLaunch: panel.querySelector('#pref-autolaunch').checked,
    });
    backdrop.remove();
  };
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) backdrop.remove(); });
}
ipcRenderer.on('open-preferences', openPreferences);

ipcRenderer.on('restore-report', (_e, report) => {
  lastRestoreReport = report;
  renderRestoreBanner();
  // 自動消去 (missing が無ければ 8 秒後)
  const { missing = [] } = report || {};
  if (missing.length === 0) {
    setTimeout(() => {
      const b = document.querySelector('.restore-banner');
      if (b && b.parentNode) b.parentNode.removeChild(b);
      lastRestoreReport = null;
    }, 8000);
  }
});

// (daemon AX バナー削除済み — Contents/MacOS/ 配置で解決)

// ── Sidebar embedded terminals ──
async function addEmbedded(title) {
  const name = title || `Shell ${embeddedTerms.length + 1}`;
  const { id } = await ipcRenderer.invoke('create-terminal', {});
  const term = new Terminal({
    fontSize: 12, fontFamily: "'SF Mono', 'Fira Code', monospace",
    theme: { background: '#1a1a2e', foreground: '#e0e0e0', cursor: '#80b0ff', selectionBackground: 'rgba(100,140,255,0.3)' },
    cursorBlink: true, scrollback: 3000,
  });
  const fitAddon = new FitAddon();
  term.loadAddon(fitAddon);
  term.onData(data => ipcRenderer.send('terminal-input', { id, data }));
  const session = { id, term, fitAddon, title: name, expanded: false };
  embeddedTerms.push(session);
  render();
  toggleExpand(embeddedTerms.length - 1);
}

function toggleExpand(idx) {
  const s = embeddedTerms[idx];
  s.expanded = !s.expanded;
  render();
  if (s.expanded) {
    requestAnimationFrame(() => requestAnimationFrame(() => {
      try { s.fitAddon.fit(); ipcRenderer.send('terminal-resize', { id: s.id, cols: s.term.cols, rows: s.term.rows }); } catch {}
      s.term.focus();
    }));
  }
}

function removeEmbedded(idx) {
  const s = embeddedTerms[idx];
  s.term.dispose();
  _termContainers.delete(s.id);
  ipcRenderer.invoke('kill-terminal', { id: s.id });
  embeddedTerms.splice(idx, 1);
  render();
}

async function addGridTerminal() {

// ── External terminals ──
function showToast(msg, kind = 'info') {
  const t = document.createElement('div');
  t.textContent = msg;
  const bg = kind === 'error' ? 'rgba(220,38,38,0.92)' : 'rgba(28,28,30,0.92)';
  t.style.cssText = `
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%) translateY(8px);
    background:${bg}; color:#fff; padding:8px 14px; border-radius:8px; font-size:12px;
    z-index:10001; box-shadow:0 8px 24px rgba(0,0,0,0.35); opacity:0;
    transition:opacity .14s ease, transform .18s ease; pointer-events:none;
  `;
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)'; });
  setTimeout(() => {
    t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(8px)';
    setTimeout(() => t.remove(), 250);
  }, 2200);
}

async function snapExternal(w, targetSlot) {
  const result = await ipcRenderer.invoke('snap-external', {
    windowNumber: w.windowNumber, pid: w.pid, app: w.app, title: w.title,
    x: w.x, y: w.y, width: w.width, height: w.height,
    targetSlot: (typeof targetSlot === 'number') ? targetSlot : undefined,
  });
  if (result.ok) { snappedExternals.set(w.windowNumber, { title: w.title, app: w.app }); render(); }
  else if (result.reason === 'no-slot') showToast('空きスロットがありません。Grid を増やすか既存の snap を解除してください。', 'error');
  else if (result.reason === 'snapped-elsewhere') showToast('他の workspace で既に snap されています。', 'error');
  else if (!result.ok) showToast('snap に失敗しました。', 'error');
}

// ── Slot picker: Snap ボタンクリック時に浮かぶミニグリッド ──
let _pickerEl = null;
async function openSlotPicker(anchorBtn, w) {
  if (_pickerEl) { _pickerEl.remove(); _pickerEl = null; }
  const state = await ipcRenderer.invoke('get-grid-state');
  if (!state) return;
  const { cols, rows, slots } = state;
  // 空 slot が 1 つしかなければそこへ直接 snap (ピッカー不要)
  const freeSlots = slots.map((s,i)=>s?null:i).filter(i=>i!==null);
  if (freeSlots.length === 1) { snapExternal(w, freeSlots[0]); return; }
  if (freeSlots.length === 0) { snapExternal(w); return; } // no-slot エラーは main 側で処理

  const picker = document.createElement('div');
  _pickerEl = picker;
  picker.className = 'slot-picker';
  picker.style.cssText = `
    position:fixed; z-index:10000;
    background:rgba(28,28,30,0.92); backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.08); border-radius:10px;
    padding:10px; box-shadow:0 16px 40px rgba(0,0,0,0.5);
    opacity:0; transform:scale(0.94); transition:opacity .12s ease,transform .14s ease;
  `;
  const grid = document.createElement('div');
  grid.style.cssText = `display:grid; grid-template-columns:repeat(${cols},1fr); grid-template-rows:repeat(${rows},1fr); gap:5px; width:${cols*52}px; height:${rows*40}px;`;
  for (let i = 0; i < cols * rows; i++) {
    const cell = document.createElement('div');
    const occ = slots[i];
    const isFree = !occ;
    cell.style.cssText = `
      border-radius:6px; position:relative; cursor:${isFree?'pointer':'not-allowed'};
      background:${isFree?'rgba(59,130,246,0.12)':'rgba(255,255,255,0.04)'};
      border:1px solid ${isFree?'rgba(96,165,250,0.45)':'rgba(255,255,255,0.06)'};
      transition:background .12s ease, border-color .12s ease, transform .08s ease;
      display:flex; align-items:center; justify-content:center;
      color:${isFree?'#93c5fd':'rgba(255,255,255,0.35)'};
      font-size:10px; font-weight:600; overflow:hidden;
      padding:2px 4px; text-align:center; line-height:1.15;
    `;
    if (isFree) {
      cell.textContent = String(i + 1);
      cell.addEventListener('mouseenter', () => {
        cell.style.background = 'rgba(59,130,246,0.35)';
        cell.style.borderColor = '#60a5fa';
        cell.style.transform = 'scale(1.04)';
      });
      cell.addEventListener('mouseleave', () => {
        cell.style.background = 'rgba(59,130,246,0.12)';
        cell.style.borderColor = 'rgba(96,165,250,0.45)';
        cell.style.transform = 'scale(1)';
      });
      cell.addEventListener('click', (e) => {
        e.stopPropagation();
        picker.remove(); _pickerEl = null;
        snapExternal(w, i);
      });
    } else {
      const t = (occ.title || '').slice(0, 20);
      cell.textContent = t;
      cell.title = occ.title || occ.type;
    }
    grid.appendChild(cell);
  }
  picker.appendChild(grid);
  document.body.appendChild(picker);

  // viewport 内に必ず収める (上部アイテム時も menu bar / 端クリップ回避)
  const r = anchorBtn.getBoundingClientRect();
  const pw = picker.offsetWidth, ph = picker.offsetHeight;
  const margin = 12;
  // 横: 左側優先、入らなければ右、それでもダメなら画面端に貼る
  let left = r.left - pw - 10;
  if (left < margin) left = r.right + 10;
  if (left + pw + margin > window.innerWidth) left = window.innerWidth - pw - margin;
  if (left < margin) left = margin;
  // 縦: anchor 中央に合わせる → 上下にはみ出たら anchor の下/上へフォールバック
  let top = r.top + r.height / 2 - ph / 2;
  if (top < margin) {
    top = r.bottom + 6;  // anchor の下に置く
    if (top + ph + margin > window.innerHeight) top = margin;
  }
  if (top + ph + margin > window.innerHeight) {
    top = r.top - ph - 6;  // anchor の上に置く
    if (top < margin) top = Math.max(margin, window.innerHeight - ph - margin);
  }
  picker.style.left = `${left}px`; picker.style.top = `${top}px`;
  requestAnimationFrame(() => { picker.style.opacity = '1'; picker.style.transform = 'scale(1)'; });

  // 外クリックで閉じる
  const closer = (e) => {
    if (!picker.contains(e.target) && e.target !== anchorBtn) {
      picker.remove(); _pickerEl = null;
      document.removeEventListener('mousedown', closer, true);
      document.removeEventListener('keydown', keyCloser);
    }
  };
  const keyCloser = (e) => { if (e.key === 'Escape') { picker.remove(); _pickerEl = null; document.removeEventListener('mousedown', closer, true); document.removeEventListener('keydown', keyCloser); } };
  setTimeout(() => {
    document.addEventListener('mousedown', closer, true);
    document.addEventListener('keydown', keyCloser);
  }, 0);
}

async function unsnapExternal(windowNumber) {
  await ipcRenderer.invoke('unsnap-external', { windowNumber });
  snappedExternals.delete(windowNumber);
  render();
}

// ── Grid size ──
function setGridSize(cols, rows) {
  gridCols = cols; gridRows = rows;
  ipcRenderer.invoke('set-grid-size', { cols, rows });
  render();
}

// ── Render ──
let sidebarCollapsed = true; // Sidebar terminals collapsed by default

// アプリ種別判定 (Finder / Terminal / TiN)
const FINDER_APPS = new Set(['Finder', 'ファインダー']);
function isFinderApp(appName) {
  return !!appName && FINDER_APPS.has(appName);
}
function isTiNApp(appName) {
  return appName === 'TiN';
}
function appBadgeHtml(appName) {
  if (isTiNApp(appName)) return '<span class="card-badge badge-tin">TiN</span>';
  if (isFinderApp(appName)) return '<span class="card-badge badge-finder">FINDER</span>';
  return '<span class="card-badge badge-term">TERM</span>';
}
// GRID 内の snapped バッジ: workspace 固有色を使用
function snappedBadgeHtml(appName) {
  const label = isFinderApp(appName) ? 'FINDER' : 'TERM';
  if (wsColor) {
    return `<span class="card-badge" style="background:${wsColor.bg};color:${wsColor.fg}">${label}</span>`;
  }
  return appBadgeHtml(appName);
}

// ── Persistent DOM sections (created once, updated in-place) ──
const _gridSection = document.createElement('div');
_gridSection.className = 'section section-grid';
const _availSection = document.createElement('div');
_availSection.className = 'section section-available';
const _sideSection = document.createElement('div');
_sideSection.className = 'section section-console';
// xterm container cache: ptyId → DOM element (survives render, avoids re-mount)
const _termContainers = new Map();
let _sectionsAttached = false;

function render() {
  // ━━ GRID section (rebuild children only) ━━
  _gridSection.innerHTML = '';
  const gridCount = Object.keys(gridSlots).length + snappedExternals.size;
  const gridTitle = document.createElement('div');
  gridTitle.className = 'section-title';
  const accentStyle = wsColor ? ` style="color:${wsColor.accent}"` : '';
  gridTitle.innerHTML = `<span class="section-accent"${accentStyle}>GRID</span> (${gridCount}/${gridCols * gridRows})`;
  const selector = document.createElement('div');
  selector.className = 'grid-selector';
  [['2\u00d72', 2, 2], ['3\u00d73', 3, 3], ['2\u00d73', 2, 3]].forEach(([label, c, r]) => {
    const btn = document.createElement('button');
    btn.className = 'grid-opt' + (c === gridCols && r === gridRows ? ' active' : '');
    btn.textContent = label;
    btn.addEventListener('click', () => setGridSize(c, r));
    selector.appendChild(btn);
  });
  // Edit Grid ボタン
  const editBtn = document.createElement('button');
  editBtn.className = 'grid-opt';
  editBtn.textContent = '\u270f\ufe0f';
  editBtn.title = 'Edit Grid Ratios';
  editBtn.addEventListener('click', () => ipcRenderer.send('enter-grid-edit'));
  selector.appendChild(editBtn);
  // Retile ボタン (snapped ウィンドウを slot に揃え直す)
  const retileBtn = document.createElement('button');
  retileBtn.className = 'grid-opt';
  retileBtn.textContent = '\u21bb';
  retileBtn.title = 'Retile (snap 済みウィンドウを grid に揃え直す)';
  retileBtn.addEventListener('click', () => ipcRenderer.invoke('retile-now'));
  selector.appendChild(retileBtn);
  gridTitle.appendChild(selector);
  _gridSection.appendChild(gridTitle);

  for (const [slot] of Object.entries(gridSlots)) {
    const card = document.createElement('div');
    card.className = 'ext-item';
    card.innerHTML = `<span class="card-badge badge-grid">GRID</span><span class="ext-title">Terminal #${Number(slot) + 1}</span>`;
    const closeBtn = document.createElement('span');
    closeBtn.className = 'card-close';
    closeBtn.textContent = '\u00d7';
    closeBtn.addEventListener('click', () => removeGridTerminal(slot));
    card.appendChild(closeBtn);
    _gridSection.appendChild(card);
  }

  for (const [wn, info] of snappedExternals) {
    const item = document.createElement('div');
    item.className = 'ext-item';
    let t = info.title || '';
    if (t.length > 35) t = t.substring(0, 32) + '...';
    const liveForBadge = externalWindows.find(w => w.windowNumber === wn);
    const appForBadge = liveForBadge ? liveForBadge.app : (info.app || '');
    item.innerHTML = `${appBadgeHtml(appForBadge)}<span class="ext-title">${t}</span>`;
    item.style.cursor = 'pointer';
    item.title = 'Click to locate & raise window';
    item.addEventListener('click', (e) => {
      if (e.target && e.target.classList && e.target.classList.contains('ext-btn')) return;
      const live = externalWindows.find(w => w.windowNumber === wn);
      ipcRenderer.invoke('wobble-window', {
        windowNumber: wn,
        pid: live ? live.pid : undefined,
        app: live ? live.app : undefined,
        title: live ? live.title : (info.title || ''),
      });
    });
    const btn = document.createElement('button');
    btn.className = 'ext-btn release';
    btn.textContent = 'Release';
    btn.addEventListener('click', (e) => { e.stopPropagation(); unsnapExternal(wn); });
    item.appendChild(btn);
    _gridSection.appendChild(item);
  }

  if (gridCount < gridCols * gridRows) {
    const addGrid = document.createElement('div');
    addGrid.className = 'add-btn grid-add';
    addGrid.textContent = '+ Grid terminal';
    addGrid.addEventListener('click', addGridTerminal);
    _gridSection.appendChild(addGrid);
  }

  if (snappedExternals.size > 1) {
    const releaseAll = document.createElement('div');
    releaseAll.className = 'release-all-btn';
    releaseAll.textContent = 'Release All';
    releaseAll.addEventListener('click', async () => {
      for (const wn of [...snappedExternals.keys()]) await unsnapExternal(wn);
    });
    _gridSection.appendChild(releaseAll);
  }

  // ━━ AVAILABLE section ━━
  const available = externalWindows.filter(w => !snappedExternals.has(w.windowNumber));
  _availSection.innerHTML = '';
  if (available.length > 0) {
    const availableTerminal = available.filter(w => !isFinderApp(w.app) && !isTiNApp(w.app));
    const availableFinder = available.filter(w => isFinderApp(w.app));
    // TiN Grid overlay と slot terminal は sidebar と同一 workspace を表すので除外、sidebar のみ表示
    const availableTiN = available.filter(w =>
      isTiNApp(w.app) && !/ Grid$/.test(w.title) && !/\[\d+\]$/.test(w.title)
    );

    const extTitle = document.createElement('div');
    extTitle.className = 'section-title';
    extTitle.innerHTML = `<span class="section-accent">AVAILABLE</span> (${available.length})`;
    // (AI ボタンは TERMINAL / FINDER サブセクションに個別配置)
    _availSection.appendChild(extTitle);

    const renderAvailItem = (w) => {
      const item = document.createElement('div');
      item.className = 'ext-item';
      let t = w.title || 'untitled';
      if (t.length > 28) t = t.substring(0, 25) + '...';
      const otherWs = snappedByOther[w.windowNumber];
      if (otherWs) {
        const ownerColor = snappedByOther[w.windowNumber];
        const wsBadgeStyle = ownerColor && ownerColor.color ? `style="background:${ownerColor.color.bg};color:${ownerColor.color.fg};cursor:pointer"` : 'style="cursor:pointer"';
        item.innerHTML = `${appBadgeHtml(w.app)}<span class="ext-title">${t}</span><span class="ws-badge" ${wsBadgeStyle} title="バッジ: 所属 workspace を前面化">\u2192 ${ownerColor.name}</span>`;
        item.style.cursor = 'pointer';
        item.title = 'クリックでこのウィンドウを wobble (場所確認)';
        // item 本体クリック: そのウィンドウだけを wobble (どの workspace 所属でも)
        item.addEventListener('click', (e) => {
          if (e.target && e.target.classList && (e.target.classList.contains('ws-badge') || e.target.classList.contains('ext-btn'))) return;
          if (isTiNApp(w.app)) {
            ipcRenderer.send('raise-tin-window', { windowNumber: w.windowNumber });
          } else {
            ipcRenderer.invoke('wobble-window', { windowNumber: w.windowNumber, pid: w.pid, app: w.app, title: w.title });
          }
        });
        // バッジクリックで所属 workspace 全体を前面化
        item.querySelector('.ws-badge').addEventListener('click', (e) => {
          e.stopPropagation();
          ipcRenderer.send('switch-to-workspace-of', { windowNumber: w.windowNumber });
        });
      } else {
        item.innerHTML = `${appBadgeHtml(w.app)}<span class="ext-title">${t}</span>`;
        item.style.cursor = 'pointer';
        item.title = isTiNApp(w.app) ? 'クリックで前面化' : 'Click title to locate, Snap to dock';
        item.addEventListener('click', (e) => {
          if (e.target && e.target.classList && e.target.classList.contains('ext-btn')) return;
          if (isTiNApp(w.app)) {
            // TiN 自身は wobble しない (自分を揺らしても意味がない)、raise のみ
            ipcRenderer.send('raise-tin-window', { windowNumber: w.windowNumber });
          } else {
            ipcRenderer.invoke('wobble-window', {
              windowNumber: w.windowNumber, pid: w.pid, app: w.app, title: w.title,
            });
          }
        });
        if (!isTiNApp(w.app)) {
          const btn = document.createElement('button');
          btn.className = 'ext-btn snap';
          btn.textContent = 'Snap';
          btn.addEventListener('click', (e) => { e.stopPropagation(); openSlotPicker(btn, w); });
          item.appendChild(btn);
        }
      }
      return item;
    };

    if (availableTerminal.length > 0) {
      const subTitle = document.createElement('div');
      subTitle.className = 'subsection-title term section-title-clickable';
      subTitle.innerHTML = `<span class="section-toggle">${showTerminals ? '\u25be' : '\u25b8'}</span><span class="subsection-icon">\u2328\uFE0F</span>TERMINAL (${availableTerminal.length})`;
      subTitle.addEventListener('click', (e) => { if (e.target.classList.contains('grid-opt')) return; showTerminals = !showTerminals; render(); });
      const tAi = document.createElement('button'); tAi.className = 'grid-opt'; tAi.textContent = 'AI'; tAi.style.marginLeft = 'auto';
      tAi.addEventListener('click', (e) => { e.stopPropagation(); ipcRenderer.send('trigger-auto-snap', { filter: 'terminal' }); });
      subTitle.appendChild(tAi);
      _availSection.appendChild(subTitle);
      if (showTerminals) availableTerminal.forEach(w => _availSection.appendChild(renderAvailItem(w)));
    }
    if (availableFinder.length > 0) {
      const subTitle = document.createElement('div');
      subTitle.className = 'subsection-title finder section-title-clickable';
      subTitle.innerHTML = `<span class="section-toggle">${showFinders ? '\u25be' : '\u25b8'}</span><span class="subsection-icon">\uD83D\uDCC2</span>FINDER (${availableFinder.length})`;
      subTitle.addEventListener('click', (e) => { if (e.target.classList.contains('grid-opt')) return; showFinders = !showFinders; render(); });
      const fAi = document.createElement('button'); fAi.className = 'grid-opt'; fAi.textContent = 'AI'; fAi.style.marginLeft = 'auto';
      fAi.addEventListener('click', (e) => { e.stopPropagation(); ipcRenderer.send('trigger-auto-snap', { filter: 'finder' }); });
      subTitle.appendChild(fAi);
      _availSection.appendChild(subTitle);
      if (showFinders) availableFinder.forEach(w => _availSection.appendChild(renderAvailItem(w)));
    }
    if (availableTiN.length > 0) {
      const subTitle = document.createElement('div');
      subTitle.className = 'subsection-title tin section-title-clickable';
      subTitle.innerHTML = `<span class="section-toggle">${showTiNWindows ? '\u25be' : '\u25b8'}</span><span class="subsection-icon">\u25C6</span>TiN (${availableTiN.length})`;
      subTitle.addEventListener('click', () => { showTiNWindows = !showTiNWindows; render(); });
      _availSection.appendChild(subTitle);
      if (showTiNWindows) availableTiN.forEach(w => _availSection.appendChild(renderAvailItem(w)));
    }
  }

  // ━━ SIDEBAR TERMINALS section (xterm containers are preserved across renders) ━━
  _sideSection.innerHTML = '';
  const sideTitle = document.createElement('div');
  sideTitle.className = 'section-title section-title-clickable';
  sideTitle.innerHTML = `<span class="section-toggle">${sidebarCollapsed ? '\u25b8' : '\u25be'}</span> CONSOLE (${embeddedTerms.length})`;
  sideTitle.addEventListener('click', () => { sidebarCollapsed = !sidebarCollapsed; render(); });
  _sideSection.appendChild(sideTitle);

  if (!sidebarCollapsed) {
    embeddedTerms.forEach((s, i) => {
      const card = document.createElement('div');
      card.className = `term-card${s.expanded ? ' expanded' : ''}`;
      const header = document.createElement('div');
      header.className = 'card-header';
      header.innerHTML = `<span class="card-badge badge-pty">PTY</span><span class="card-title">${s.title}</span><span class="card-close">\u00d7</span>`;
      header.querySelector('.card-title').addEventListener('click', () => toggleExpand(i));
      header.querySelector('.card-close').addEventListener('click', (e) => { e.stopPropagation(); removeEmbedded(i); });
      card.appendChild(header);
      // xterm container: reuse existing DOM element if available (avoids re-mount)
      let embed = _termContainers.get(s.id);
      if (!embed) {
        embed = document.createElement('div');
        embed.className = 'term-embed';
        _termContainers.set(s.id, embed);
      }
      card.appendChild(embed);
      _sideSection.appendChild(card);
      if (s.expanded && !s._mounted) {
        s.term.open(embed);
        s._mounted = true;
        requestAnimationFrame(() => {
          try { s.fitAddon.fit(); ipcRenderer.send('terminal-resize', { id: s.id, cols: s.term.cols, rows: s.term.rows }); } catch {}
        });
      } else if (s.expanded && s._mounted) {
        // Already mounted — just re-fit after reattach
        requestAnimationFrame(() => {
          try { s.fitAddon.fit(); } catch {}
        });
      }
    });

    const addBtn = document.createElement('div');
    addBtn.className = 'add-btn';
    addBtn.textContent = '+ Console';
    addBtn.addEventListener('click', () => addEmbedded());
    _sideSection.appendChild(addBtn);
  }

  // Attach persistent sections (console は content 外の固定領域)
  if (!_sectionsAttached) {
    content.appendChild(_gridSection);
    content.appendChild(_availSection);
    document.getElementById('console-fixed').appendChild(_sideSection);
    _sectionsAttached = true;
  }

  // Show/hide available section
  _availSection.style.display = available.length > 0 ? '' : 'none';

  statusEl.textContent = `${Object.keys(gridSlots).length} grid \u00b7 ${snappedExternals.size} ext \u00b7 ${embeddedTerms.length} console`;
}

// ── IPC ──
ipcRenderer.on('terminal-data', (_e, { id, data }) => {
  const s = embeddedTerms.find(s => s.id === id);
  if (s) s.term.write(data);
});
ipcRenderer.on('terminal-exit', (_e, { id }) => {
  const idx = embeddedTerms.findIndex(s => s.id === id);
  if (idx >= 0) { embeddedTerms[idx].term.dispose(); _termContainers.delete(id); embeddedTerms.splice(idx, 1); render(); }
});
ipcRenderer.on('new-terminal', () => addGridTerminal());
ipcRenderer.on('close-current', () => {
  if (embeddedTerms.length > 0) removeEmbedded(embeddedTerms.length - 1);
});
// render を debounce して DOM 再構築頻度を制限 (100ms)
let _renderTimer = null;
function scheduleRender() {
  if (_renderTimer) return;
  _renderTimer = setTimeout(() => { _renderTimer = null; render(); }, 100);
}

ipcRenderer.on('external-windows', (_e, windows, otherSnapped, gridInfo) => {
  snappedByOther = otherSnapped || {};
  gridSlots = gridInfo || {};
  externalWindows = windows;
  // live window のタイトル/app で snappedExternals を同期更新
  // (復元時やパッケージ版で初期タイトルが空の場合にここで補完される)
  for (const [k, info] of snappedExternals) {
    const live = windows.find(w => w.windowNumber === k);
    if (live) {
      if (live.title) info.title = live.title;
      if (live.app) info.app = live.app;
    } else {
      snappedExternals.delete(k);
    }
  }
  scheduleRender();
});

// ── Raise on sidebar click (軽量: mousedown ではなく mouseup + debounce で発火) ──
// titlebar + content のクリックで snapped 全体を前面化。0.8s throttle で多発防止。
let _raiseThrottle = 0;
function triggerRaiseAll() {
  const now = Date.now();
  if (now - _raiseThrottle < 800) return;
  _raiseThrottle = now;
  ipcRenderer.send('raise-all');
}
document.getElementById('titlebar').addEventListener('mousedown', triggerRaiseAll);
// content エリア内クリック (ただしボタン等の個別要素は除く: stopPropagation 済み)
document.getElementById('content').addEventListener('mousedown', (e) => {
  // すでに stopPropagation されてる要素 (Snap ボタン等) はここに届かない
  triggerRaiseAll();
});

// ── Collapse ──
let isCollapsed = false;
const collapseBtn = document.getElementById('collapse-btn');
function toggleCollapse() {
  isCollapsed = !isCollapsed;
  document.body.classList.toggle('collapsed', isCollapsed);
  ipcRenderer.send('toggle-collapse', { collapsed: isCollapsed });
}
collapseBtn.addEventListener('click', toggleCollapse);
ipcRenderer.on('toggle-compact', toggleCollapse);

// ── Window active/inactive state ──
window.addEventListener('focus', () => document.body.classList.remove('window-inactive'));
window.addEventListener('blur', () => document.body.classList.add('window-inactive'));

// Start with one sidebar terminal
addEmbedded('main');
</script>
</body>
</html>
