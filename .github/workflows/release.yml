name: release

# タグ v* を push すると Windows ビルド(x64/arm64)を作り GitHub Release(draft)へ添付する。
# Windows のウィンドウ操作バックエンドは koffi(FFI, ビルド不要・prebuilt 同梱)で、
# node-pty も prebuilds(N-API)を同梱するため、Windows ではネイティブのコンパイルは一切不要。
# (binding.gyp の ax_helper は OS=='mac' 条件付きで Windows では何もビルドしない)
# macOS 版は手元ビルド(npm run dist)で同 Release へ追加する。
#
# workflow_dispatch(tag 空)で起動するとビルド検証のみ(Release へは上げない)。

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (例 v1.8.0)。空ならビルド検証のみで Release へは上げない'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  win:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --ignore-scripts: ネイティブビルドを走らせない(koffi/node-pty とも prebuilt を使用)。
      - name: Install deps (no native build)
        run: npm install --ignore-scripts

      # npmRebuild:false なので electron-builder は native を再ビルドせず、
      # 同梱の koffi prebuilt と node-pty prebuilds をそのままパッケージする。
      - name: Package with electron-builder
        shell: bash
        run: npx electron-builder --win --${{ matrix.arch }} --publish never

      - name: List dist
        shell: bash
        run: ls -la dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: win-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.zip

  release:
    needs: [win]
    # タグ push、または dispatch で tag を明示したときだけ Release を作る。
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create / update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: true
          fail_on_unmatched_files: true
          files: artifacts/**/*
