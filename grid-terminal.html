<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grid Terminal</title>
<link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
  #t { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="t"></div>
<script>
const { ipcRenderer } = require('electron');
const { Terminal } = require('@xterm/xterm');
const { FitAddon } = require('@xterm/addon-fit');

let pid = null;
const term = new Terminal({
  fontSize: 13, fontFamily: "'SF Mono','Fira Code','Menlo',monospace",
  theme: { background: '#1a1a2e', foreground: '#e0e0e0', cursor: '#80b0ff', selectionBackground: 'rgba(100,140,255,0.3)' },
  cursorBlink: true, scrollback: 5000,
  fastScrollModifier: 'alt',
  smoothScrollDuration: 0,
});
const fa = new FitAddon();
term.loadAddon(fa);
term.open(document.getElementById('t'));
term.onData(d => { if (pid !== null) ipcRenderer.send('gi', { id: pid, d }); });

ipcRenderer.on('init', (_, { id }) => {
  pid = id;
  requestAnimationFrame(() => { fa.fit(); ipcRenderer.send('gr', { id: pid, c: term.cols, r: term.rows }); term.focus(); });
});
ipcRenderer.on('td', (_, { id, d }) => { if (id === pid) term.write(d); });
ipcRenderer.on('te', (_, { id }) => { if (id === pid) term.write('\r\n[Process exited]\r\n'); });

// Debounced resize
let resizeTimer;
const ro = new ResizeObserver(() => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    fa.fit();
    if (pid !== null) ipcRenderer.send('gr', { id: pid, c: term.cols, r: term.rows });
  }, 50);
});
ro.observe(document.getElementById('t'));
</script>
</body>
</html>
