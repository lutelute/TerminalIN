name: release

# タグ v* を push すると Windows ビルド(x64/arm64)を作り GitHub Release(draft)へ添付する。
# Windows のウィンドウ操作バックエンドは koffi(FFI, ビルド不要・prebuilt 同梱)なので
# native addon のコンパイルは不要。node-pty(ConPTY)のみ Electron ABI 向けに再ビルドする。
# macOS 版は手元ビルド(npm run dist)で同 Release へ追加する。
#
# workflow_dispatch(tag 空)で起動するとビルド検証のみ(Release へは上げない)。

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (例 v1.8.0)。空ならビルド検証のみで Release へは上げない'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  win:
    # windows-latest は VS18(プレビュー)を積み node-gyp が認識できないため 2022 に固定。
    # arm64 は x64 ランナー上でクロスコンパイル(amd64_arm64)する(node-pty 用)。
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps (skip native build)
        run: npm install --ignore-scripts

      # koffi はビルド不要(prebuilt バイナリが npm パッケージに同梱)。
      # node-pty のみ C++ のため Electron ABI / 対象 arch で再ビルドする。
      - name: Setup MSVC dev environment (for node-pty)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          # x64 はネイティブ、arm64 は x64 ホストからのクロス(amd64_arm64)
          arch: ${{ matrix.arch == 'arm64' && 'amd64_arm64' || 'x64' }}

      - name: Rebuild node-pty for Electron ABI
        run: npx --yes @electron/rebuild --force --only node-pty --arch ${{ matrix.arch }}

      # npmRebuild:false なので electron-builder は native を再ビルドせず、上で作った
      # node-pty(pty.node)と同梱の koffi prebuilt をそのままパッケージする。
      - name: Package with electron-builder
        shell: bash
        run: npx electron-builder --win --${{ matrix.arch }} --publish never

      - name: List dist
        shell: bash
        run: ls -la dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: win-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.zip

  release:
    needs: [win]
    # タグ push、または dispatch で tag を明示したときだけ Release を作る。
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create / update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: true
          fail_on_unmatched_files: true
          files: artifacts/**/*
