<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TiN</title>
<link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    color: #1a1a2e;
    display: flex; flex-direction: column;  /* Groupy: 縦積み (header + content) */
    background: transparent;
    transition: opacity 0.15s;
  }

  /* ── Groupy ヘッダー (全幅 68px) ── */
  #sidebar {
    width: 100%;
    flex-shrink: 0;
    display: flex; flex-direction: column;
    overflow: visible;   /* ドロワーが下にはみ出るため */
    position: relative;
    background: #ffffff;
    z-index: 100;
  }
  /* サイドバーリスト・コンソール・ステータスは通常は非表示 */
  #content, #console-fixed, #status { display: none !important; }
  /* サイドバー分割線も不要 */
  #sidebar-divider { display: none !important; }

  /* ── ドロワーパネル (サイドバートグル時に表示) ── */
  #drawer-panel {
    position: fixed;
    top: 68px; left: 0;
    width: 280px;
    max-height: calc(100vh - 68px);
    background: #ffffff;
    border-right: 1px solid rgba(0,0,0,0.1);
    border-bottom: 1px solid rgba(0,0,0,0.1);
    border-radius: 0 0 10px 0;
    box-shadow: 4px 4px 16px rgba(0,0,0,0.12);
    z-index: 9000;
    display: none;
    flex-direction: column;
    overflow: hidden;
    transform: translateX(-100%);
    transition: transform 0.18s cubic-bezier(0.4,0,0.2,1);
  }
  body.drawer-open #drawer-panel {
    display: flex;
    transform: translateX(0);
  }
  #drawer-content { flex: 1; min-height: 0; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 5px; }
  #drawer-content::-webkit-scrollbar { width: 5px; }
  #drawer-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
  /* ドロワー外クリックで閉じるオーバーレイ — ヘッダー(68px)の下のみカバー */
  #drawer-overlay {
    position: fixed;
    top: 68px; left: 0; right: 0; bottom: 0;  /* ヘッダーはカバーしない */
    z-index: 8999;
    display: none;
  }
  body.drawer-open #drawer-overlay { display: block; }

  /* ドロワーボタン */
  .drawer-btn {
    width: 26px; height: 26px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: rgba(40,40,80,0.4);
    cursor: pointer; flex-shrink: 0;
    -webkit-app-region: no-drag;
    transition: background 0.12s, color 0.12s;
  }
  .drawer-btn:hover { background: rgba(0,0,0,0.06); color: rgba(40,40,80,0.8); }
  body.drawer-open .drawer-btn { color: rgba(60,120,230,0.7); background: rgba(60,120,230,0.08); }

  /* ── コンテンツエリア (全幅、透明、外部アプリが透けて見える) ── */
  #grid-panel {
    flex: 1;
    width: 100%;
    position: relative;
    overflow: hidden;
    background: transparent;
    pointer-events: none;
  }
  body.gp-edit #grid-panel { pointer-events: auto; }
  #gp-toolbar { pointer-events: auto; }

  /* C案: セルのborderは使わず、コンテナ側に中央線を疑似要素で描く */
  .gp-frame { display: none; }
  .gp-grid-container {
    position: absolute; inset: 0;
    display: grid; pointer-events: none;
    gap: 8px;
    padding: 4px 8px 8px;  /* 上は狭く、左右・下は標準 */
    background: transparent;
  }
  /* グリッドオーバーレイ */
  #gp-grid { opacity: 0; transition: opacity 0.25s; pointer-events: none; }
  body.show-empty-slots #gp-grid,
  body.show-grid-overlay #gp-grid { opacity: 1; }
  /* ポップアップ / ドロワー表示中は非表示 */
  body:has(.grid-size-popup, #tab-ctx-menu, .slot-picker) #gp-grid,
  body.drawer-open #gp-grid { opacity: 0 !important; }

  /* グリッド全体に薄い板 — 空きエリアをひとつの領域として示す */
  body.show-empty-slots .gp-grid-container,
  body.show-grid-overlay .gp-grid-container {
    background: rgba(110,145,230,0.07);
    border-radius: 8px;
  }
  .gp-cell { background: rgba(255,255,255,0.08); border-radius: 4px; }
  .gp-cell-empty { background: transparent; }
  /* スナップ済みスロットは完全透明 — 板の上に何も出ない */
  body.show-empty-slots #gp-grid .gp-cell.cell-active,
  body.show-grid-overlay #gp-grid .gp-cell.cell-active { opacity: 0; }
  /* 占有セルは背景を消して slot 色の枠 (inline border) だけ残す → 外部端末を囲む */
  body.show-empty-slots #gp-grid .gp-cell.cell-occupied,
  body.show-grid-overlay #gp-grid .gp-cell.cell-occupied { background: transparent; }

  /* 分割線なし */
  .gp-divider { display: none; }
  body.gp-edit .gp-cell {
    background: rgba(255,255,255,0.25);
    outline: 1px dashed rgba(0,0,0,0.15);
  }
  body.gp-edit .gp-cell { background: rgba(0,0,0,0.03); }
  .gp-col-line, .gp-row-line {
    position: absolute;
    background: rgba(0,0,0,0.15);
    z-index: 20;
    transition: background 0.15s;
  }
  .gp-col-line {
    top: 2px; bottom: 2px; width: 8px; margin-left: -4px; cursor: ew-resize;
  }
  .gp-row-line {
    left: 2px; right: 2px; height: 8px; margin-top: -4px; cursor: ns-resize;
  }
  .gp-col-line:hover, .gp-row-line:hover { background: rgba(0,0,0,0.3); }
  .gp-col-line.dragging, .gp-row-line.dragging { background: rgba(60,130,230,0.9); }
  #gp-toolbar {
    position: absolute;
    top: 8px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 8px; padding: 6px 10px;
    display: none; gap: 6px; align-items: center;
    z-index: 30; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  body.gp-edit #gp-toolbar { display: flex; }
  #gp-toolbar button {
    padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 600;
    cursor: pointer; border: 1px solid rgba(0,0,0,0.1); background: #f5f5f5;
  }
  #gp-toolbar button.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
  #gp-toolbar button.primary:hover { background: #1d4ed8; }
  #gp-toolbar button:hover { background: #eee; }
  #gp-toolbar span { font-size: 11px; color: #666; margin-right: 4px; }

  /* ── Grid Layout Editor Popup ── */

  .glp-tabs { display:flex; gap:2px; border-bottom:1px solid rgba(0,0,0,0.08); margin-bottom:8px; }
  .glp-tab {
    padding:5px 12px; font-size:10px; font-weight:700; letter-spacing:0.05em;
    color:rgba(0,0,0,0.4); cursor:pointer; border-radius:6px 6px 0 0;
    border:none; background:transparent; transition:all 0.12s;
  }
  .glp-tab:hover { color:rgba(0,0,0,0.6); background:rgba(0,0,0,0.04); }
  .glp-tab.active { color:rgba(60,120,230,0.9); border-bottom:2px solid rgba(60,120,230,0.7); }
  .glp-tab-content { display:none; flex-direction:column; gap:10px; }
  .glp-tab-content.active { display:flex; }
  /* SIZE タブ: サイズプリセット */
  .glp-size-presets { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
  .glp-size-item {
    display:flex; flex-direction:column; align-items:center; gap:2px;
    padding:4px 3px; border-radius:6px; border:1.5px solid transparent;
    background:rgba(0,0,0,0.03); cursor:pointer; transition:all 0.12s;
  }
  .glp-size-item:hover { background:rgba(60,120,230,0.08); border-color:rgba(60,120,230,0.3); }
  .glp-size-item.active { background:rgba(60,120,230,0.12); border-color:rgba(60,120,230,0.6); }
  .glp-size-item span { font-size:9px; color:rgba(0,0,0,0.45); font-weight:600; }
  .glp-size-item.active span { color:rgba(60,120,230,0.9); }
  /* number入力のスピナー(▲▼)が幅を食って2桁が見切れるため非表示にする */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .glp-custom-row { display:flex; align-items:center; gap:6px; padding-top:4px; border-top:1px solid rgba(0,0,0,0.06); }
  .glp-custom-row label { font-size:10px; color:rgba(0,0,0,0.45); }
  .glp-custom-row input { width:34px; text-align:center; font-size:11px; border:1px solid rgba(0,0,0,0.15); border-radius:4px; padding:3px 4px; }
  .glp-custom-row input:focus { outline:none; border-color:rgba(60,120,230,0.6); }
  .glp-size-preview {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:8px 8px 6px; background:rgba(100,140,220,0.05); border-radius:8px;
    border:1px solid rgba(100,140,220,0.12); transition:all 0.15s;
  }
  .glp-size-preview-label { font-size:10px; color:rgba(0,0,0,0.35); font-weight:600; letter-spacing:0.04em; font-family:'SF Mono','Menlo',monospace; }
  #grid-layout-popup {
    position: fixed;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.07);
    padding: 14px;
    z-index: 10002;
    width: 300px;
    display: flex; flex-direction: column; gap: 10px;
    user-select: none;
  }
  #grid-layout-popup h3 {
    font-size: 11px; font-weight: 700; color: rgba(0,0,0,0.5);
    letter-spacing: 0.08em; text-transform: uppercase; margin: 0;
  }
  /* プリセット行 */
  .glp-presets {
    display: flex; gap: 5px; flex-wrap: wrap;
  }
  .glp-preset-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 5px 6px; border-radius: 7px; border: 1.5px solid transparent;
    background: rgba(0,0,0,0.04); cursor: pointer; transition: all 0.12s;
  }
  .glp-preset-btn:hover { background: rgba(60,120,230,0.08); border-color: rgba(60,120,230,0.3); }
  .glp-preset-btn.active { background: rgba(60,120,230,0.12); border-color: rgba(60,120,230,0.6); }
  .glp-preset-btn span { font-size: 9px; color: rgba(0,0,0,0.45); font-weight: 600; }
  .glp-preset-btn.active span { color: rgba(60,120,230,0.9); }

  /* エディタグリッド */
  .glp-grid-wrap {
    position: relative;
  }
  .glp-grid {
    display: grid;
    gap: 6px;
    padding: 6px;
    background: rgba(100,140,220,0.07);
    border-radius: 8px;
    width: 100%; aspect-ratio: 1.6;
    box-sizing: border-box;
    cursor: crosshair;
  }
  .glp-cell {
    background: rgba(255,255,255,0.9);
    border-radius: 5px;
    border: 1.5px solid rgba(100,140,220,0.2);
    transition: background 0.1s, border-color 0.1s;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: rgba(0,0,0,0.25);
    position: relative;
  }
  .glp-cell.selecting {
    background: rgba(60,120,230,0.18);
    border-color: rgba(60,120,230,0.6);
    color: rgba(60,120,230,0.8);
  }
  .glp-cell.merged {
    background: rgba(60,120,230,0.12);
    border: 2px solid rgba(60,120,230,0.5);
    color: rgba(60,120,230,0.75);
    cursor: pointer;
  }
  .glp-cell.merged:hover { background: rgba(60,120,230,0.2); border-color: rgba(60,120,230,0.8); }
  .glp-cell.selected-merged {
    background: rgba(230,100,40,0.15);
    border: 2px solid rgba(220,80,20,0.6);
    color: rgba(200,70,10,0.8);
  }
  .glp-merge-label {
    font-size: 9px; font-weight: 600; pointer-events: none;
  }

  /* アクションバー */
  .glp-actions {
    display: flex; gap: 6px; align-items: center;
    min-height: 28px;
  }
  .glp-action-hint {
    flex: 1; font-size: 10px; color: rgba(0,0,0,0.4); font-style: italic;
  }
  .glp-btn {
    padding: 5px 12px; border-radius: 6px; border: none;
    font-size: 11px; font-weight: 600; cursor: pointer;
  }
  .glp-btn.primary { background: rgba(60,120,230,0.9); color: #fff; }
  .glp-btn.primary:hover { background: rgba(40,100,210,1); }
  .glp-btn.danger { background: rgba(220,60,60,0.1); color: rgba(180,30,30,0.9); }
  .glp-btn.danger:hover { background: rgba(220,60,60,0.2); }
  .glp-btn.secondary { background: rgba(0,0,0,0.07); color: rgba(0,0,0,0.6); }
  .glp-btn.secondary:hover { background: rgba(0,0,0,0.12); }

  /* フッター */
  .glp-footer {
    display: flex; gap: 6px; justify-content: flex-end; padding-top: 2px;
    border-top: 1px solid rgba(0,0,0,0.06);
  }

  /* レイアウトボタン（ヘッダー内） */
  .grid-layout-btn {
    /* 既存の .grid-opt に準拠 */
  }

  /* ── Active / Inactive 状態 ── */
  /* アクティブ: クリアで明るい (vibrancy: active で常時明るい背景)
     非アクティブ: 灰色マスクで少し沈んだ見た目に */
  /* inactive overlay はサイドバーのみに適用 */
  #sidebar::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(120,120,130,0.18);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 9999;
  }
  body.window-inactive #sidebar::after {
    opacity: 1;
  }
  body.window-inactive {
    color: #6a6a7a;
  }

  /* ── Titlebar ── */
  #titlebar {
    height: 68px;
    -webkit-app-region: drag;
    display: flex; flex-direction: column;
    padding: 0 10px 0 72px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(0,0,0,0.1);
  }
  #titlebar-row1 {
    display: flex; align-items: center;
    height: 38px; width: 100%;
  }
  /* ── Groupy タブバー (row2) ── */
  #titlebar-row2 {
    display: flex; align-items: flex-end;
    height: 28px; width: 100%;
    padding: 0 8px 0 4px;
    overflow-x: auto; overflow-y: hidden;
    gap: 2px;
  }
  #titlebar-row2::-webkit-scrollbar { display: none; }

  /* タブアイテム */
  .groupy-tab {
    display: flex; align-items: center; gap: 5px;
    height: 24px; padding: 0 8px 0 7px;
    border-radius: 5px 5px 0 0;
    cursor: pointer;
    -webkit-app-region: no-drag;
    font-size: 11px; font-weight: 500;
    color: rgba(40,40,80,0.55);
    background: rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.07);
    border-bottom: none;
    user-select: none; white-space: nowrap;
    flex-shrink: 0; max-width: 160px;
    overflow: hidden; text-overflow: ellipsis;
    transition: background 0.1s, color 0.1s;
  }
  .groupy-tab:hover { background: rgba(0,0,0,0.08); color: rgba(40,40,80,0.8); }
  .groupy-tab.active {
    background: rgba(255,255,255,0.92);
    color: rgba(20,20,60,0.9);
    border-color: rgba(0,0,0,0.12);
    font-weight: 600;
  }
  body.window-inactive .groupy-tab.active { background: rgba(230,230,240,0.9); }
  .groupy-tab .tab-icon {
    width: 13px; height: 13px; border-radius: 3px;
    font-size: 8px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; opacity: 0.7;
  }
  .groupy-tab .tab-icon.term { background: rgba(40,180,100,0.2); color: #28b464; }
  .groupy-tab .tab-icon.finder { background: rgba(30,120,255,0.15); color: #1e78ff; }
  .groupy-tab .tab-icon.app { background: rgba(120,80,200,0.15); color: #7850c8; }
  .groupy-tab .tab-title { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .groupy-tab .tab-close {
    width: 14px; height: 14px; border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: rgba(0,0,0,0.25); flex-shrink: 0;
    margin-left: 2px; transition: background 0.1s, color 0.1s;
  }
  .groupy-tab .tab-close:hover { background: rgba(220,50,50,0.15); color: rgba(200,40,40,0.8); }
  /* タブ右クリックメニュー */
  #tab-ctx-menu {
    position: fixed; z-index: 99999;
    background: rgb(38,38,40);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
    padding: 4px; min-width: 120px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    animation: ctxFadeIn 0.08s ease;
  }
  @keyframes ctxFadeIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }
  .ctx-item {
    padding: 5px 12px; font-size: 12px; color: rgba(255,255,255,0.85);
    border-radius: 5px; cursor: pointer; display: flex; align-items: center; gap: 8px;
    -webkit-app-region: no-drag; font-weight: 500;
  }
  .ctx-item:hover { background: rgba(255,255,255,0.1); }
  .ctx-item.danger { color: rgba(255,90,90,0.9); }
  .ctx-item.danger:hover { background: rgba(255,60,60,0.12); }
  .ctx-sep { height: 1px; background: rgba(255,255,255,0.1); margin: 3px 4px; }
  .groupy-tab-add {
    height: 20px; width: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: rgba(0,0,0,0.25);
    cursor: pointer; flex-shrink: 0;
    -webkit-app-region: no-drag;
    border-radius: 4px; margin-bottom: 2px;
    transition: color 0.1s, background 0.1s;
  }
  .groupy-tab-add:hover { color: rgba(0,0,0,0.6); background: rgba(0,0,0,0.06); }
  #title {
    font-size: 14px; font-weight: 700; color: rgba(30,30,60,0.85);
    cursor: text; user-select: none;
    -webkit-app-region: no-drag;
    letter-spacing: -0.2px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background 0.1s, color 0.15s;
  }
  body.window-inactive #title { color: rgba(80,80,100,0.5); }
  #title:hover { background: rgba(0,0,0,0.04); }
  #title-input {
    font-size: 14px; font-weight: 700; color: rgba(40,40,70,0.85);
    background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.15);
    border-radius: 4px; padding: 2px 6px; outline: none;
    font-family: inherit; width: 100%;
    -webkit-app-region: no-drag;
    display: none;
  }

  #collapse-btn {
    width: 24px; height: 24px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 600;
    color: rgba(40,40,70,0.35); cursor: pointer;
    -webkit-app-region: no-drag;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  #collapse-btn:hover { background: rgba(0,0,0,0.06); color: rgba(40,40,70,0.6); }

  #titlebar-grid {
    display: flex; align-items: flex-end; gap: 2px;
    height: 100%; flex: 1;
    -webkit-app-region: no-drag;
    overflow-x: auto; overflow-y: hidden;
  }
  #titlebar-grid::-webkit-scrollbar { display: none; }
  /* grid-selector をタブの後ろ (右側) に配置 */
  #titlebar-grid .grid-selector { margin-left: auto; display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
  #titlebar-grid .grid-opt {
    -webkit-app-region: no-drag;
    padding: 4px 9px; font-size: 11px; min-width: 26px;
    line-height: 1;
  }
  #titlebar-grid .grid-size-cycle { min-width: 38px; }

  body.collapsed #content, body.collapsed #status { display: none; }
  body.collapsed #sidebar { width: 40px; min-width: 40px; }
  body.collapsed #titlebar {
    flex-direction: column; height: 100%; padding: 42px 0 8px; align-items: center; gap: 6px;
    -webkit-app-region: drag;
  }
  body.collapsed #titlebar-row1, body.collapsed #titlebar-row2 { flex-direction: column; height: auto; width: auto; padding: 0; }
  body.collapsed #title { writing-mode: vertical-rl; font-size: 11px; letter-spacing: 1px; flex: 1; cursor: default; }
  body.collapsed #title:hover { background: transparent; }
  body.collapsed #title-input { display: none !important; }
  body.collapsed #collapse-btn { transform: rotate(180deg); }
  body.collapsed #titlebar-grid { display: none; }

  /* ── Content ── */
  #content { flex: 1; min-height: 0; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 5px; }
  #content::-webkit-scrollbar { width: 5px; }
  #content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
  /* ── Console (sidebar 下部に常時固定、スクロール外) ── */
  #console-fixed {
    flex-shrink: 0;
    border-top: 1px solid rgba(0,0,0,0.08);
    background: rgba(0,0,0,0.015);
    padding: 6px 8px 4px;
    max-height: 40%;
    overflow-y: auto;
    overflow-x: hidden;
  }
  body.collapsed #console-fixed { display: none; }

  /* ── Sections ── */
  .section {
    padding: 6px;
    display: flex; flex-direction: column; gap: 3px;
    border-radius: 6px;
  }
  .section-grid { background: rgba(130,80,220,0.04); }
  .section-available { background: rgba(40,120,210,0.04); }

  .section-title {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
    color: rgba(0,0,0,0.45); padding: 2px 0 3px;
    display: flex; align-items: center; gap: 6px;
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .section-title .section-accent { font-weight: 700; }
  .section-grid .section-accent { color: rgba(120,70,200,0.65); }
  .section-available .section-accent { color: rgba(40,110,200,0.65); }

  .section-title-clickable { cursor: pointer; user-select: none; }
  .section-title-clickable:hover { color: rgba(0,0,0,0.5); }
  .section-toggle { font-size: 9px; }

  /* ── MEMO section (ワークスペースメモ) ── */
  .section-memo { margin: 4px 0 6px; }
  .memo-area {
    width: 100%; box-sizing: border-box; resize: vertical;
    min-height: 56px; max-height: 220px;
    font-size: 11px; line-height: 1.5; font-family: inherit;
    color: rgba(0,0,0,0.75);
    background: rgba(0,0,0,0.03);
    border: 1px solid rgba(0,0,0,0.1); border-radius: 6px;
    padding: 6px 8px; outline: none;
  }
  .memo-area:focus { border-color: rgba(60,120,230,0.5); background: #fff; }
  .memo-area::placeholder { color: rgba(0,0,0,0.25); }
  body.compact .section-memo { display: none; }

  /* ── Console fixed to bottom (常時表示) ── */
  .section-console {
    border-top: 1px solid rgba(0,0,0,0.08);
    padding: 6px;
    flex-shrink: 0;
    background: #fff;
  }

  /* ── Grid size selector ── */
  .grid-selector { display: flex; gap: 2px; margin-left: auto; }
  .grid-opt {
    font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 3px; cursor: pointer;
    border: none; color: rgba(0,0,0,0.3); background: transparent;
    font-family: 'SF Mono', 'Menlo', monospace;
    transition: all 0.1s;
  }
  .grid-opt:hover { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.5); }
  .grid-opt.active { background: rgba(0,0,0,0.08); color: rgba(0,0,0,0.6); }

  /* ── Grid size popup ── */
  .grid-size-popup {
    position: fixed; z-index: 9999;
    background: #fff; border: 1px solid rgba(0,0,0,0.12);
    border-radius: 8px; padding: 5px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px;
    min-width: 200px;
  }
  .grid-size-custom-row {
    grid-column: 1 / -1;
    display: flex; flex-direction: row; align-items: center; gap: 5px;
    padding: 6px 4px 3px;
    border-top: 1px solid rgba(0,0,0,0.07);
    margin-top: 2px;
  }
  .grid-size-custom-inputs {
    display: flex; align-items: center; gap: 4px;
  }
  .grid-size-custom-row input {
    width: 38px; text-align: center;
    font-size: 11px; font-family: 'SF Mono','Menlo',monospace;
    border: 1px solid rgba(0,0,0,0.2); border-radius: 4px;
    padding: 3px 4px; outline: none;
    color: rgba(0,0,0,0.75);
  }
  .grid-size-custom-row input:focus { border-color: rgba(60,120,230,0.6); }
  .grid-size-custom-row .sep { font-size: 11px; color: rgba(0,0,0,0.4); }
  .grid-size-custom-btn {
    flex: 1; font-size: 10px; font-weight: 600;
    border: none; border-radius: 4px; padding: 3px 6px;
    background: rgba(60,120,230,0.12); color: rgba(40,90,200,0.85);
    cursor: pointer;
  }
  .grid-size-custom-btn:hover { background: rgba(60,120,230,0.22); }
  /* カスタムプレビュー: SVG グリッドをスクロール可能なエリアに表示 */
  .grid-size-custom-preview {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: center;
    padding: 6px 4px 4px;
    border-top: 1px solid rgba(0,0,0,0.06);
    margin-top: 2px;
    overflow: auto;
  }
  .grid-size-custom-preview svg { flex-shrink: 0; }
  .grid-size-item {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 5px 7px; border: none; background: transparent;
    border-radius: 5px; cursor: pointer;
    font-size: 9px; font-family: 'SF Mono', 'Menlo', monospace;
    color: rgba(0,0,0,0.45); transition: all 0.1s;
    user-select: none;
  }
  .grid-size-item:hover { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.75); }
  .grid-size-item.active { background: rgba(0,0,0,0.08); color: rgba(0,0,0,0.8); font-weight: 700; }
  .grid-size-item svg { opacity: 0.45; transition: opacity 0.1s; }
  .grid-size-item:hover svg, .grid-size-item.active svg { opacity: 1; }

  /* ── Space picker popup ── */
  .space-picker-popup {
    position: fixed; z-index: 9999;
    background: #fff; border: 1px solid rgba(0,0,0,0.12);
    border-radius: 8px; padding: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    min-width: 120px; max-height: 260px; overflow-y: auto;
  }
  .space-picker-item {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 9px; border: none; background: transparent;
    border-radius: 5px; cursor: pointer; width: 100%;
    font-size: 11px; font-family: 'SF Mono','Menlo',monospace;
    color: rgba(0,0,0,0.55); transition: all 0.1s; text-align: left;
    white-space: nowrap;
  }
  .space-picker-item:hover { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.8); }
  .space-picker-item.current { font-weight: 700; color: rgba(0,0,0,0.75); }
  .space-picker-item .sp-num {
    font-size: 9px; opacity: 0.45; min-width: 18px;
  }

  /* ── Terminal card (sidebar embedded) ── */
  .term-card {
    background: rgba(0,0,0,0.025); border: 1px solid rgba(0,0,0,0.07);
    border-radius: 8px; overflow: hidden;
  }
  .term-card .card-header {
    display: flex; align-items: center; gap: 6px; padding: 6px 8px; cursor: pointer;
    transition: background 0.1s;
  }
  .term-card .card-header:hover { background: rgba(0,0,0,0.04); }
  .term-card.expanded .term-embed { display: block; }
  .term-card .term-embed { display: none; height: 200px; }
  .card-title {
    flex: 1; font-size: 12px; font-weight: 500; color: rgba(20,20,40,0.85);
    font-family: 'SF Mono', 'Menlo', monospace;
  }

  /* ── Badges ── */
  .card-badge {
    font-size: 8px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
    letter-spacing: 0.5px;
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .badge-pty { background: rgba(50,170,110,0.1); color: rgba(40,140,90,0.8); }
  .badge-grid { background: rgba(120,70,200,0.1); color: rgba(110,60,190,0.8); }
  .badge-ext { background: rgba(40,120,210,0.1); color: rgba(30,100,190,0.8); }
  .badge-term { background: rgba(40,120,210,0.12); color: rgba(20,90,180,0.85); }
  .badge-finder { background: rgba(255,170,40,0.15); color: rgba(200,120,0,0.9); }
  .badge-tin { background: rgba(130,70,220,0.14); color: rgba(100,50,180,0.9); }
  .badge-app { background: rgba(0,145,80,0.11); color: rgba(0,115,60,0.9); }

  /* ── Segmented Tabs (AVAILABLE) — v1.3.4 B 案 ── */
  .avail-tabs {
    display: flex;
    padding: 0 2px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    margin: 0 -2px 4px;
  }
  .avail-tab {
    flex: 1;
    padding: 7px 3px 6px;
    font-size: 10px; font-weight: 700;
    color: rgba(0,0,0,0.4);
    text-align: center; cursor: pointer;
    border-bottom: 2px solid transparent;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    user-select: none;
    font-family: 'SF Mono', 'Menlo', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: color 0.1s, border-color 0.1s;
  }
  .avail-tab:hover:not(.active) { color: rgba(0,0,0,0.65); }
  .avail-tab .tab-count {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 14px; height: 13px; padding: 0 3px;
    border-radius: 6px;
    background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.5);
    font-size: 9px; font-weight: 700;
    font-feature-settings: "tnum";
  }
  .avail-tab.active { color: rgba(0,0,0,0.9); }
  .avail-tab.term.active { color: rgba(30,100,190,0.95); border-bottom-color: rgba(30,100,190,0.8); }
  .avail-tab.term.active .tab-count { background: rgba(30,100,190,0.12); color: rgba(30,100,190,0.95); }
  .avail-tab.finder.active { color: rgba(200,120,0,0.95); border-bottom-color: rgba(200,120,0,0.85); }
  .avail-tab.finder.active .tab-count { background: rgba(200,120,0,0.15); color: rgba(200,120,0,0.95); }
  .avail-tab.tin.active { color: rgba(100,50,180,0.95); border-bottom-color: rgba(100,50,180,0.85); }
  .avail-tab.tin.active .tab-count { background: rgba(100,50,180,0.14); color: rgba(100,50,180,0.95); }
  .avail-tab.apps.active { color: rgba(0,145,80,0.95); border-bottom-color: rgba(0,145,80,0.85); }
  .avail-tab.apps.active .tab-count { background: rgba(0,145,80,0.12); color: rgba(0,145,80,0.95); }
  .avail-tab .tab-ai {
    font-size: 8px; font-weight: 700;
    padding: 1px 4px; border-radius: 3px;
    background: rgba(0,0,0,0.05); color: rgba(0,0,0,0.4);
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .avail-tab .tab-ai:hover { background: rgba(0,0,0,0.1); color: rgba(0,0,0,0.7); }

  /* Search */
  .avail-search { padding: 4px 2px 6px; }
  .avail-search input {
    width: 100%;
    padding: 5px 8px;
    font-size: 11px;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 5px;
    background: rgba(0,0,0,0.025);
    color: rgba(0,0,0,0.85);
    outline: none;
    font-family: inherit;
    transition: border-color 0.1s, background 0.1s;
  }
  .avail-search input::placeholder { color: rgba(0,0,0,0.3); }
  .avail-search input:focus { border-color: rgba(40,110,200,0.5); background: #fff; }

  /* Row */
  .avail-list { display: flex; flex-direction: column; gap: 1px; padding: 0 2px 2px; }
  .row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 6px;
    cursor: pointer;
    border-radius: 5px;
    transition: background 0.1s;
    min-width: 0;
  }
  .row:hover { background: rgba(0,0,0,0.03); }
  .row .row-icon {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 9px;
    font-family: 'SF Mono', 'Menlo', monospace;
    letter-spacing: 0.02em;
    overflow: hidden;
  }
  .row .row-icon img {
    width: 18px; height: 18px;
    object-fit: contain; display: block;
    border-radius: 3px;
  }
  .row .row-icon.has-icon { background: transparent !important; color: transparent !important; }
  .row.term .row-icon { background: rgba(30,100,190,0.1); color: rgba(30,100,190,0.9); }
  .row.finder .row-icon { background: rgba(200,120,0,0.12); color: rgba(200,120,0,0.95); }
  .row.tin .row-icon { background: rgba(100,50,180,0.12); color: rgba(100,50,180,0.95); }
  .row .row-info { flex: 1; min-width: 0; }
  .row .row-title {
    font-size: 11.5px; font-weight: 500; color: rgba(0,0,0,0.85);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .row .row-subtitle {
    font-size: 9.5px; color: rgba(0,0,0,0.42);
    margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .row .row-action {
    flex-shrink: 0;
    font-size: 9.5px; font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    border: none;
    background: rgba(0,0,0,0.04);
    cursor: pointer;
    color: rgba(0,0,0,0.55);
    transition: all 0.1s;
    font-family: 'SF Mono', 'Menlo', monospace;
    opacity: 0.7;
  }
  .row:hover .row-action { opacity: 1; }
  .row.term:hover .row-action { background: rgba(30,100,190,0.9); color: white; }
  .row.finder:hover .row-action { background: rgba(200,120,0,0.9); color: white; }
  .row.tin .row-action { background: rgba(100,50,180,0.1); color: rgba(100,50,180,0.85); }
  .row.tin:hover .row-action { background: rgba(100,50,180,0.9); color: white; }
  .row .row-ws-badge {
    flex-shrink: 0;
    font-size: 9px; font-weight: 600;
    padding: 2px 6px; border-radius: 4px;
    white-space: nowrap; cursor: pointer;
  }
  .row.current {
    background: rgba(100,50,180,0.06);
    position: relative;
  }
  .row.current::before {
    content: ""; position: absolute; left: 0; top: 3px; bottom: 3px;
    width: 2px; border-radius: 1px; background: rgba(100,50,180,0.7);
  }
  body.compact .row { padding: 4px 5px; }
  body.compact .row .row-icon { width: 20px; height: 20px; font-size: 8px; }
  body.compact .row .row-title { font-size: 10.5px; }
  body.compact .row .row-subtitle { font-size: 9px; }
  .avail-empty {
    padding: 18px 10px;
    text-align: center;
    font-size: 10.5px;
    color: rgba(0,0,0,0.3);
    font-family: 'SF Mono', 'Menlo', monospace;
  }

  /* Grid dots strip */
  .grid-dots-strip {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 2px;
  }
  .grid-dots-row {
    display: grid; gap: 3px; flex: 1; min-width: 0;
    /* gridTemplateColumns/Rows は JS で設定 */
  }
  .grid-dot {
    min-height: 18px; min-width: 0;
    border-radius: 4px;
    background: rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.07);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: rgba(0,0,0,0.35);
    cursor: pointer;
    transition: all 0.1s;
    font-weight: 700;
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .grid-dot:hover { background: rgba(0,0,0,0.08); color: rgba(0,0,0,0.6); }
  .grid-dot.filled-pty {
    background: rgba(50,170,110,0.14); border-color: rgba(50,170,110,0.55);
    color: rgba(40,130,85,0.95);
  }
  .grid-dot.filled-ext {
    background: rgba(40,120,210,0.14); border-color: rgba(40,120,210,0.55);
    color: rgba(30,90,180,0.95);
  }
  .grid-dot.filled-ext.filled-ext-finder {
    background: rgba(200,120,0,0.14); border-color: rgba(200,120,0,0.55);
    color: rgba(160,95,0,0.95);
  }
  .grid-dot.filled-pty:hover { background: rgba(50,170,110,0.22); }
  .grid-dot.filled-ext:hover { background: rgba(40,120,210,0.22); }
  .grid-dot.filled-ext.filled-ext-finder:hover { background: rgba(200,120,0,0.22); }
  .grid-count-pill {
    font-size: 9.5px; color: rgba(0,0,0,0.45);
    font-family: 'SF Mono', 'Menlo', monospace;
    font-weight: 600;
    padding: 2px 6px; border-radius: 4px;
    background: rgba(0,0,0,0.04);
    font-feature-settings: "tnum";
  }
  body.compact .grid-dot { min-height: 12px; font-size: 8px; }

  /* Slot card (drag&drop 対応 + slot 番号バッジ) */
  .slot-card { cursor: grab; position: relative; }
  .slot-card:active { cursor: grabbing; }
  .slot-card.dragging { opacity: 0.35; }
  .slot-card.drag-over {
    outline: 2px dashed rgba(40,120,210,0.65);
    outline-offset: -2px;
    background: rgba(40,120,210,0.06) !important;
  }
  /* 結合バッジ (縦×N / 横×N / N×M) */
  .slot-span-badge {
    font-size: 8px; font-weight: 700;
    color: rgba(60,120,230,0.75);
    background: rgba(60,120,230,0.1);
    padding: 1px 5px; border-radius: 3px;
    flex-shrink: 0;
  }
  .slot-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 16px; height: 16px; padding: 0 4px;
    border-radius: 4px;
    background: rgba(0,0,0,0.08);
    color: rgba(0,0,0,0.55);
    font-size: 9px; font-weight: 700;
    font-family: 'SF Mono', 'Menlo', monospace;
    font-feature-settings: "tnum";
    flex-shrink: 0;
    margin-right: 2px;
    user-select: none;
  }
  /* Claude 状態バッジ: タブ用(コンパクト=●+経過時間) / カード用(●+ラベル+経過時間) */
  .tab-state, .state-pill {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 9px; font-weight: 700;
    border-radius: 7px; flex-shrink: 0; white-space: nowrap;
    font-feature-settings: "tnum";
    user-select: none;
  }
  .tab-state { padding: 0 4px; height: 14px; }
  .state-pill { padding: 1px 6px; margin-left: 2px; }
  .tab-state .st-dot, .state-pill .st-dot { font-size: 7px; line-height: 1; }
  /* 許可待ちはパルスで目を引く */
  .tab-state.st-perm, .state-pill.st-perm { animation: perm-pulse 1.2s ease-in-out infinite; }
  @keyframes perm-pulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.45); }
  }
  /* Grid dot: drag state */
  .grid-dot.dragging { opacity: 0.35; cursor: grabbing; }
  .grid-dot.drag-over { outline: 2px dashed rgba(40,120,210,0.6); outline-offset: -1px; }
  .grid-dot[draggable="true"] { cursor: grab; }
  .grid-dot[draggable="true"]:active { cursor: grabbing; }

  /* Focused window ハイライト (最前面の window が属する slot) */
  .slot-card.focused {
    background: rgba(255,220,90,0.18);
    box-shadow: 0 0 0 1px rgba(220,170,30,0.45) inset, 0 0 8px rgba(255,200,60,0.25);
  }
  .slot-card.focused .slot-badge {
    background: rgba(220,170,30,0.35);
    color: rgba(120,85,10,0.95);
  }
  .grid-dot.focused {
    box-shadow: 0 0 0 2px rgba(220,170,30,0.75) inset, 0 0 8px rgba(255,200,60,0.4);
    transform: scale(1.05);
  }

  /* Empty slot placeholder */
  .slot-card.empty-slot {
    cursor: default;
    background: repeating-linear-gradient(
      -45deg,
      transparent, transparent 4px,
      rgba(0,0,0,0.013) 4px, rgba(0,0,0,0.013) 8px
    );
    border: 1px dashed rgba(0,0,0,0.11);
    border-radius: 5px;
    margin: 1px 2px;
    opacity: 0.65;
  }
  .slot-card.empty-slot:hover {
    background: rgba(40,120,210,0.05);
    border-color: rgba(40,120,210,0.3);
    opacity: 1;
  }
  .slot-card.empty-slot .ext-title { color: rgba(0,0,0,0.2); }
  .slot-card.empty-slot .snap-here-btn { visibility: hidden; }
  .slot-card.empty-slot:hover .snap-here-btn { visibility: visible; }

  .card-close {
    width: 20px; height: 20px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: rgba(0,0,0,0.25); cursor: pointer;
    transition: all 0.12s;
  }
  .card-close:hover { background: rgba(255,50,50,0.1); color: rgba(230,50,50,0.8); }

  /* ── External terminal item ── */
  .ext-item {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 6px;
    background: transparent; border: none; border-bottom: 1px solid rgba(0,0,0,0.04);
    border-radius: 0;
    transition: background 0.1s;
  }
  .ext-item:last-child { border-bottom: none; }
  .ext-item:hover { background: rgba(0,0,0,0.03); }
  .ext-item .ext-title {
    flex: 1; font-size: 11px; font-weight: 500; color: rgba(0,0,0,0.7);
    font-family: 'SF Mono', 'Menlo', monospace;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── Buttons ── */
  .ext-btn {
    padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.1s;
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .ext-btn.snap {
    color: rgba(40,110,200,0.7); background: rgba(40,120,210,0.08);
  }

<script>
const { ipcRenderer } = require('electron');
const { Terminal } = require('@xterm/xterm');
const { FitAddon } = require('@xterm/addon-fit');

const content = document.getElementById('content');
const drawerContent = document.getElementById('drawer-content');

const titleEl = document.getElementById('title');
const titleInput = document.getElementById('title-input');

// ── ドロワー表示/非表示 ──
function toggleDrawer(forceState) {
  const open = forceState !== undefined ? forceState : !document.body.classList.contains('drawer-open');
  document.body.classList.toggle('drawer-open', open);
  notifyOverlay(open);
}

// ── グリッド / Tab モード切り替え ──
let currentViewMode = 'grid';
function toggleViewMode() {
  currentViewMode = currentViewMode === 'grid' ? 'tab' : 'grid';
  const btn = document.getElementById('view-mode-btn');
  if (btn) btn.textContent = currentViewMode === 'tab' ? '⊡' : '⊞';
  ipcRenderer.invoke('set-view-mode', { mode: currentViewMode });
  render();
}

// Tab モードでタブをクリックしてアクティブスロット切り替え
function activateTab(slot) {
  if (currentViewMode !== 'tab') {
    currentViewMode = 'tab';
    const btn = document.getElementById('view-mode-btn');
    if (btn) btn.textContent = '⊡';
  }
  ipcRenderer.invoke('set-active-tab', { slot });
  render();
}

let wsId = null;
let wsName = 'TiN';
let wsColor = null; // { bg, fg, accent }

// State
const embeddedTerms = [];
const snappedExternals = new Map();
let externalWindows = [];
let showTerminals = true;
let showFinders = true;
let showTiNWindows = true;
let snappedByOther = {};
let gridSlots = {};
let gridCols = 2, gridRows = 2;
// B案: AVAILABLE タブ切替 state
let activeAvailTab = 'term'; // 'term' | 'finder' | 'apps' | 'tin'
let availSearchText = '';
// input 要素を render 跨ぎで保持 (focus / 入力値維持)
let _availSearchInput = null;
// 最前面 window の windowNumber (slot card のハイライト用)
let frontmostWindowNumber = 0;

// ── Title renaming (click to edit) ──
titleEl.addEventListener('click', () => {
  titleEl.style.display = 'none';
  titleInput.style.display = 'inline-block';
  titleInput.value = wsName;
  titleInput.focus();
  titleInput.select();
});

function commitRename() {
  const newName = titleInput.value.trim() || wsName;
  wsName = newName;
  titleEl.textContent = wsName;
  titleEl.style.display = '';
  titleInput.style.display = 'none';
  ipcRenderer.send('rename-workspace', { name: wsName });
}
titleInput.addEventListener('blur', commitRename);
titleInput.addEventListener('keydown', (e) => {
  if (e.isComposing || e.keyCode === 229) return; // IME 変換中はスキップ
  if (e.key === 'Enter') commitRename();
  if (e.key === 'Escape') { titleInput.value = wsName; commitRename(); }
});

ipcRenderer.on('workspace-info', (_e, info) => {
  wsId = info.id;
  wsName = info.name;
  wsColor = info.color || null;
  titleEl.textContent = wsName;
  if (wsColor) {
    document.getElementById('titlebar').style.borderBottomColor = wsColor.accent;
  }
  setMemoText(info.memo || '');
});

// REST 等の外部経由でメモが更新されたとき UI に反映
ipcRenderer.on('workspace-memo', (_e, { memo }) => setMemoText(memo || ''));

ipcRenderer.on('set-sidebar-width', (_e, { width }) => {
  document.documentElement.style.setProperty('--sidebar-w', width + 'px');
});

// 復元時の snapped Map 初期化 (main 側で既に配置済みの窓を renderer に知らせる)
ipcRenderer.on('hydrate-snapped', (_e, list) => {
  // 権威リストで同期: _snapPending のものは楽観的状態を保持して除外
  const incoming = new Map((list || []).map(e => [e.windowNumber, e]));
  for (const [k] of snappedExternals) {
    if (!incoming.has(k) && !_snapPending.has(k)) snappedExternals.delete(k);
  }
  for (const [k, entry] of incoming) {
    snappedExternals.set(k, { title: entry.title, app: entry.app, slot: entry.slot });
  }
  render();
});

// 復元結果バナー (再起動時のみ)
let restoreBanner = null;
let lastRestoreReport = null;  // 最新のレポートを保持 (render 後の再描画に使う)

function renderRestoreBanner() {
  if (!lastRestoreReport) return;
  // 既存バナーを削除
  const existing = document.querySelector('.restore-banner');
  if (existing && existing.parentNode) existing.parentNode.removeChild(existing);
  const { restored = [], missing = [] } = lastRestoreReport;
  const total = restored.length + missing.length;
  if (total === 0) return;
  try {
    const banner = document.createElement('div');
    banner.className = 'restore-banner' + (missing.length > 0 ? ' has-missing' : '');
    const title = missing.length > 0
      ? `\u26a0 復元: ${restored.length} 件 / ${missing.length} 件スキップ`
      : `\u2713 復元完了: ${restored.length} 件`;
    const header = document.createElement('div');
    header.className = 'rb-header';
    header.innerHTML = `<span>${title}</span><span class="rb-close" title="Dismiss">\u00d7</span>`;
    banner.appendChild(header);
    if (missing.length > 0) {
      const ul = document.createElement('ul');
      for (const m of missing.slice(0, 5)) {
        const li = document.createElement('li');
        const t = (m.title || 'untitled').substring(0, 35);
        li.textContent = `\u2022 ${m.app}: ${t}`;
        ul.appendChild(li);
      }
      if (missing.length > 5) {
        const li = document.createElement('li');
        li.textContent = `... \u4ed6 ${missing.length - 5} 件`;
        ul.appendChild(li);
      }
      banner.appendChild(ul);
    }
    header.querySelector('.rb-close').addEventListener('click', () => {
      if (banner.parentNode) banner.parentNode.removeChild(banner);
      lastRestoreReport = null;
    });
    // content の直前 (body 内の titlebar と content の間) に挿入
    if (content && content.parentNode) {
      content.parentNode.insertBefore(banner, content);
    }
    restoreBanner = banner;
  } catch (e) {
    console.warn('[tin] renderRestoreBanner failed:', e.message);
  }
}

// ── Preferences modal ──
// Electron アクセラレーター → 表示文字列 (⌘⌥S 形式)
function accToDisplay(acc) {
  if (!acc) return '—';
  return acc.replace('CommandOrControl', '⌘').replace('Command', '⌘')
            .replace('Control', '⌃').replace('Option', '⌥').replace('Shift', '⇧')
            .replace(/\+/g, '');
}

// キーダウンイベント → Electron アクセラレーター文字列
function eventToAcc(e) {
  const parts = [];
  if (e.metaKey)  parts.push('Command');
  if (e.ctrlKey)  parts.push('Control');
  if (e.altKey)   parts.push('Option');
  if (e.shiftKey) parts.push('Shift');
  const k = e.key;
  if (['Meta','Control','Alt','Shift'].includes(k)) return null;
  // 特殊キー変換
  const specialMap = { ' ': 'Space', 'ArrowUp':'Up','ArrowDown':'Down','ArrowLeft':'Left','ArrowRight':'Right',
    'Escape':'Escape','Enter':'Return','Backspace':'Backspace','Delete':'Delete',
    'Tab':'Tab','Home':'Home','End':'End','PageUp':'PageUp','PageDown':'PageDown' };
  parts.push(specialMap[k] || k.toUpperCase());
  return parts.join('+');
}

// ホットキーキャプチャ field を作成
function makeHotkeyField(id, currentAcc) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;align-items:center;gap:6px;';
  const field = document.createElement('div');
  field.id = id;
  field.dataset.acc = currentAcc || '';
  field.tabIndex = 0;
  field.style.cssText = 'min-width:90px;padding:3px 8px;border:1px solid rgba(0,0,0,0.2);border-radius:4px;' +
    'font-size:12px;font-family:"SF Mono",monospace;cursor:pointer;text-align:center;background:#fff;' +
    'color:rgba(0,0,0,0.75);user-select:none;';
  field.textContent = accToDisplay(currentAcc);
  const clr = document.createElement('button');
  clr.textContent = '✕';
  clr.style.cssText = 'font-size:10px;border:none;background:none;cursor:pointer;color:rgba(0,0,0,0.4);padding:2px 4px;';

  field.addEventListener('focus', () => {
    field.style.borderColor = 'rgba(37,99,235,0.7)';
    field.textContent = '…キーを押してください';
    field.style.color = 'rgba(0,0,0,0.4)';
  });
  field.addEventListener('blur', () => {
    field.style.borderColor = 'rgba(0,0,0,0.2)';
    field.style.color = 'rgba(0,0,0,0.75)';
    field.textContent = accToDisplay(field.dataset.acc);
  });
  field.addEventListener('keydown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    const acc = eventToAcc(e);
    if (!acc) return;
    field.dataset.acc = acc;
    field.textContent = accToDisplay(acc);
    field.style.color = 'rgba(0,0,0,0.75)';
    field.blur();
  });
  clr.addEventListener('click', () => {
    field.dataset.acc = '';
    field.textContent = '—';
  });
  wrap.appendChild(field);
  wrap.appendChild(clr);
  return wrap;
}

async function addEmbedded(title) {
  const name = title || `Shell ${embeddedTerms.length + 1}`;
  const { id } = await ipcRenderer.invoke('create-terminal', {});
  const term = new Terminal({
    fontSize: 12, fontFamily: "'SF Mono', 'Fira Code', monospace",
    theme: { background: '#1a1a2e', foreground: '#e0e0e0', cursor: '#80b0ff', selectionBackground: 'rgba(100,140,255,0.3)' },
    cursorBlink: true, scrollback: 3000,
  });
  const fitAddon = new FitAddon();
  term.loadAddon(fitAddon);
  term.onData(data => ipcRenderer.send('terminal-input', { id, data }));
  const session = { id, term, fitAddon, title: name, expanded: false };
  embeddedTerms.push(session);
  render();
  toggleExpand(embeddedTerms.length - 1);
}

function toggleExpand(idx) {
  const s = embeddedTerms[idx];
  s.expanded = !s.expanded;
  render();
  if (s.expanded) {
    requestAnimationFrame(() => requestAnimationFrame(() => {
      try { s.fitAddon.fit(); ipcRenderer.send('terminal-resize', { id: s.id, cols: s.term.cols, rows: s.term.rows }); } catch {}
      s.term.focus();
    }));
  }
}

function removeEmbedded(idx) {
  const s = embeddedTerms[idx];
  s.term.dispose();
  _termContainers.delete(s.id);
  ipcRenderer.invoke('kill-terminal', { id: s.id });
  embeddedTerms.splice(idx, 1);
  render();
}

// renderer 側で空きスロットを推測する (楽観的更新用)
function nextFreeSlotLocal(targetSlot) {
  const total = gridCols * gridRows;
  const used = new Set([
    ...Object.keys(gridSlots).map(Number),
    ...[...snappedExternals.values()].map(i => i.slot).filter(s => typeof s === 'number'),
  ]);
  if (typeof targetSlot === 'number' && targetSlot >= 0 && targetSlot < total && !used.has(targetSlot)) return targetSlot;
  for (let i = 0; i < total; i++) if (!used.has(i)) return i;
  return -1;
}

const _snapPending = new Set(); // 連打防止: 処理中の windowNumber

async function snapExternal(w, targetSlot) {
  if (_snapPending.has(w.windowNumber)) return;
  _snapPending.add(w.windowNumber);

  // 楽観的更新: IPC 完了前に即座に grid に反映
  const optimisticSlot = nextFreeSlotLocal(targetSlot);
  if (optimisticSlot >= 0) {
    snappedExternals.set(w.windowNumber, { title: w.title, app: w.app, slot: optimisticSlot });
    render();
  }

  try {
    const result = await ipcRenderer.invoke('snap-external', {
      windowNumber: w.windowNumber, pid: w.pid, app: w.app, title: w.title,
      x: w.x, y: w.y, width: w.width, height: w.height,
      windowIndex: w.windowIndex,
      targetSlot: (typeof targetSlot === 'number') ? targetSlot : undefined,
    });
    if (result.ok) {
      // 確定した slot で更新
      snappedExternals.set(w.windowNumber, { title: w.title, app: w.app, slot: result.slot });
      render();
    } else {
      // 楽観的更新を取り消し
      snappedExternals.delete(w.windowNumber);
      // no-slot 時: main 側の実態で renderer を同期 (リロード等によるデシンク解消)
      if (result.reason === 'no-slot' && Array.isArray(result.hydrate)) {
        for (const entry of result.hydrate) {
          if (!snappedExternals.has(entry.windowNumber)) {
            snappedExternals.set(entry.windowNumber, { title: entry.title, app: entry.app, slot: entry.slot });
          }
        }
      }
      render();
      if (result.reason === 'no-slot') showToast('空きスロットがありません。Grid を増やすか既存の snap を解除してください。', 'error');
      else if (result.reason === 'snapped-elsewhere') showToast('他の workspace で既に snap されています。', 'error');
      else showToast('snap に失敗しました。', 'error');
    }
  } finally {
    _snapPending.delete(w.windowNumber);
  }
}

// ── Slot picker: Snap ボタンクリック時に浮かぶミニグリッド ──
let _pickerEl = null;
async function openSlotPicker(anchorBtn, w) {
  if (_pickerEl) { _pickerEl.remove(); _pickerEl = null; }
  const state = await ipcRenderer.invoke('get-grid-state');
  if (!state) return;
  const { cols, rows, slots } = state;
  // 空 slot が 1 つしかなければそこへ直接 snap (ピッカー不要)
  const freeSlots = slots.map((s,i)=>s?null:i).filter(i=>i!==null);
  if (freeSlots.length === 1) { snapExternal(w, freeSlots[0]); return; }
  if (freeSlots.length === 0) { snapExternal(w); return; } // no-slot エラーは main 側で処理

  const picker = document.createElement('div');
  _pickerEl = picker;
  picker.className = 'slot-picker';
  picker.style.cssText = `
    position:fixed; z-index:10000;
    background:rgb(36,36,38);
    border:1px solid rgba(255,255,255,0.08); border-radius:10px;
    padding:10px; box-shadow:0 16px 40px rgba(0,0,0,0.5);
    opacity:0; transform:scale(0.94); transition:opacity .12s ease,transform .14s ease;
  `;
  const { slotLayout } = state;
  const grid = document.createElement('div');
  grid.style.cssText = `display:grid; grid-template-columns:repeat(${cols},1fr); grid-template-rows:repeat(${rows},1fr); gap:5px; width:${cols*52}px; height:${rows*40}px;`;

  // slotLayout がある場合は結合セルを正確に描画する
  const cells = slotLayout && slotLayout.length > 0
    ? [...slotLayout].sort((a,b) => a.row !== b.row ? a.row - b.row : a.col - b.col)
    : Array.from({length: cols * rows}, (_, i) => ({ id: i, col: i % cols, row: Math.floor(i / cols), colSpan: 1, rowSpan: 1 }));

  for (const cellDef of cells) {
    const i = cellDef.id;
    const occ = slots[i];
    const isFree = !occ;
    const colSpan = cellDef.colSpan || 1;
    const rowSpan = cellDef.rowSpan || 1;
    const isSpanned = colSpan > 1 || rowSpan > 1;
    const cell = document.createElement('div');
    cell.style.cssText = `
      border-radius:6px; position:relative; cursor:${isFree?'pointer':'not-allowed'};
      background:${isFree?'rgba(59,130,246,0.12)':'rgba(255,255,255,0.04)'};
      border:1px solid ${isFree?'rgba(96,165,250,0.45)':'rgba(255,255,255,0.06)'};
      transition:background .12s ease, border-color .12s ease, transform .08s ease;
      display:flex; align-items:center; justify-content:center; flex-direction:column;
      color:${isFree?'#93c5fd':'rgba(255,255,255,0.35)'};
      font-size:10px; font-weight:600; overflow:hidden;
      padding:2px 4px; text-align:center; line-height:1.15;
      grid-column: ${cellDef.col + 1} / span ${colSpan};
      grid-row: ${cellDef.row + 1} / span ${rowSpan};
    `;
    if (isFree) {
      cell.textContent = String(i + 1);
      if (isSpanned) {
        const badge = document.createElement('span');
        badge.style.cssText = 'font-size:8px; opacity:0.6; font-weight:500; margin-top:1px;';
        badge.textContent = colSpan > 1 && rowSpan > 1 ? `${colSpan}×${rowSpan}` : colSpan > 1 ? `横×${colSpan}` : `縦×${rowSpan}`;
        cell.appendChild(badge);
      }
      cell.addEventListener('mouseenter', () => {
        cell.style.background = 'rgba(59,130,246,0.35)';
        cell.style.borderColor = '#60a5fa';
        cell.style.transform = 'scale(1.04)';
      });
      cell.addEventListener('mouseleave', () => {
        cell.style.background = 'rgba(59,130,246,0.12)';
        cell.style.borderColor = 'rgba(96,165,250,0.45)';
        cell.style.transform = 'scale(1)';
      });
      cell.addEventListener('click', (e) => {
        e.stopPropagation();
        picker.remove(); _pickerEl = null;
        snapExternal(w, i);
      });
    } else {
      const t = (occ.title || '').slice(0, 20);
      cell.textContent = t;
      cell.title = occ.title || occ.type;
      // 占有スロット: アプリカラーで薄く色付け
      const occColor = getAppColor(occ.app || '');
      if (occColor) {
        const cs = appColorStyle(occColor);
        cell.style.background = cs.bg;
        cell.style.borderColor = cs.text.replace('0.9)', '0.4)');
        cell.style.color = cs.text;
      }
    }
    grid.appendChild(cell);
  }
  picker.appendChild(grid);
  document.body.appendChild(picker);
  notifyOverlay(true); // slot-picker 表示 → clickthrough OFF

  // viewport 内に必ず収める (ヘッダー68px + margin でクリップ回避)
  const r = anchorBtn.getBoundingClientRect();
  const pw = picker.offsetWidth, ph = picker.offsetHeight;
  const margin = 8;
  const topMin = 68 + margin; // ヘッダー(68px)の下に必ず収める
  // 横: 左側優先、入らなければ右、それでもダメなら画面端に貼る
  let left = r.left - pw - 10;
  if (left < margin) left = r.right + 10;
  if (left + pw + margin > window.innerWidth) left = window.innerWidth - pw - margin;
  if (left < margin) left = margin;
  // 縦: anchor 中央に合わせる → 上下にはみ出たら anchor の下/上へフォールバック
  let top = r.top + r.height / 2 - ph / 2;
  if (top < topMin) {
    top = r.bottom + 6;  // anchor の下に置く
    if (top + ph + margin > window.innerHeight) top = topMin;
  }
  if (top + ph + margin > window.innerHeight) {
    top = r.top - ph - 6;  // anchor の上に置く
    if (top < topMin) top = Math.max(topMin, window.innerHeight - ph - margin);
  }
  picker.style.left = `${left}px`; picker.style.top = `${top}px`;
  requestAnimationFrame(() => { picker.style.opacity = '1'; picker.style.transform = 'scale(1)'; });

  // 外クリックで閉じる
  const closePicker = () => { notifyOverlay(false); };
  const closer = (e) => {
    if (!picker.contains(e.target) && e.target !== anchorBtn) {
      picker.remove(); _pickerEl = null; closePicker();
      document.removeEventListener('mousedown', closer, true);
      document.removeEventListener('keydown', keyCloser);
    }
  };
  const keyCloser = (e) => { if (e.key === 'Escape') { picker.remove(); _pickerEl = null; closePicker(); document.removeEventListener('mousedown', closer, true); document.removeEventListener('keydown', keyCloser); } };
  setTimeout(() => {
    document.addEventListener('mousedown', closer, true);
    document.addEventListener('keydown', keyCloser);
  }, 0);
}

async function unsnapExternal(windowNumber) {

    await ipcRenderer.invoke('unsnap-external', { windowNumber });
  } finally {
    _snapPending.delete(windowNumber);
  }
}

// ── Grid size ──
function setGridSize(cols, rows) {
  gridCols = cols; gridRows = rows;
  ipcRenderer.invoke('set-grid-size', { cols, rows });
  render();
}

function makeMiniGridSVG(cols, rows) {
  const W = 26, H = 18, gap = 1;
  const cw = (W - gap * (cols - 1)) / cols;
  const rh = (H - gap * (rows - 1)) / rows;
  let rects = '';
  for (let c = 0; c < cols; c++) {
    for (let r = 0; r < rows; r++) {
      const x = (c * (cw + gap)).toFixed(1);
      const y = (r * (rh + gap)).toFixed(1);
      rects += `<rect x="${x}" y="${y}" width="${cw.toFixed(1)}" height="${rh.toFixed(1)}" rx="1"/>`;
    }
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" fill="currentColor">${rects}</svg>`;
}

function openGridSizePopup(anchorEl) {
  const existing = document.getElementById('grid-size-popup');
  if (existing) { existing.remove(); notifyOverlay(false); return; }
  const presets = [
    ['1×2', 1, 2], ['2×1', 2, 1],
    ['1×3', 1, 3], ['3×1', 3, 1],
    ['2×2', 2, 2], ['2×3', 2, 3],
    ['3×2', 3, 2], ['3×3', 3, 3],
  ];
  const popup = document.createElement('div');
  popup.id = 'grid-size-popup';
  popup.className = 'grid-size-popup';
  for (const [label, c, r] of presets) {
    const item = document.createElement('button');
    item.className = 'grid-size-item' + (c === gridCols && r === gridRows ? ' active' : '');
    item.innerHTML = makeMiniGridSVG(c, r) + `<span>${label}</span>`;
    item.addEventListener('click', (ev) => {
      ev.stopPropagation();
      setGridSize(c, r);
      popup.remove();
      notifyOverlay(false);
    });
    popup.appendChild(item);
  }
  // カスタムサイズ入力行
  const customRow = document.createElement('div');
  customRow.className = 'grid-size-custom-row';
  const colInput = document.createElement('input');
  colInput.type = 'number'; colInput.min = '1'; colInput.max = '20';
  colInput.value = gridCols; colInput.placeholder = 'C';
  colInput.title = '列数 (1〜20)';
  const sep = document.createElement('span');
  sep.textContent = '×';
  const rowInput = document.createElement('input');
  rowInput.type = 'number'; rowInput.min = '1'; rowInput.max = '20';
  rowInput.value = gridRows; rowInput.placeholder = 'R';
  rowInput.title = '行数 (1〜20)';
  const applyBtn = document.createElement('button');
  applyBtn.className = 'grid-size-custom-btn';
  applyBtn.textContent = 'OK';
  const applyCustom = (ev) => {
    ev?.stopPropagation?.();
    const c = Math.max(1, Math.min(20, parseInt(colInput.value, 10) || 1));
    const r = Math.max(1, Math.min(20, parseInt(rowInput.value, 10) || 1));
    setGridSize(c, r);
    popup.remove();
    notifyOverlay(false);
    document.removeEventListener('click', closePopup);
  };
  applyBtn.addEventListener('click', applyCustom);
  // Enter で確定、↑↓ で増減 (1〜20。spinner 非表示のためキー操作を明示実装)
  [colInput, rowInput].forEach(inp => {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') applyCustom();
      if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        e.preventDefault();
        inp.value = Math.max(1, Math.min(20, (parseInt(inp.value, 10) || 1) + (e.key === 'ArrowUp' ? 1 : -1)));
        inp.dispatchEvent(new Event('input'));  // プレビューを更新
      }
      e.stopPropagation();
    });
    inp.addEventListener('click', (e) => e.stopPropagation());
  });
  // C-2: 色分けグリッドアイコン（青=列/縦, 橙=行/横）
  const colIcon = document.createElement('span');
  colIcon.title = '列数（縦に何分割）';
  colIcon.innerHTML = `<svg width="20" height="14" viewBox="0 0 20 14" style="display:block"><rect x="0" y="0" width="8" height="14" rx="1.5" fill="rgba(60,120,230,0.75)"/><rect x="10" y="0" width="8" height="14" rx="1.5" fill="rgba(60,120,230,0.22)"/></svg>`;
  const rowIcon = document.createElement('span');
  rowIcon.title = '行数（横に何分割）';
  rowIcon.innerHTML = `<svg width="20" height="14" viewBox="0 0 20 14" style="display:block"><rect x="0" y="0" width="20" height="6" rx="1.5" fill="rgba(230,100,30,0.72)"/><rect x="0" y="8" width="20" height="6" rx="1.5" fill="rgba(230,100,30,0.22)"/></svg>`;

  customRow.appendChild(colIcon);
  customRow.appendChild(colInput);
  customRow.appendChild(sep);
  customRow.appendChild(rowIcon);
  customRow.appendChild(rowInput);
  customRow.appendChild(applyBtn);
  popup.appendChild(customRow);

  // ライブプレビュー
  const previewDiv = document.createElement('div');
  previewDiv.className = 'grid-size-custom-preview';
  const updatePreview = () => {
    const c = Math.max(1, Math.min(20, parseInt(colInput.value, 10) || 1));
    const r = Math.max(1, Math.min(20, parseInt(rowInput.value, 10) || 1));
    // 列が多いほど横長、行が多いほど縦長になるようアスペクト比を調整
    const W = Math.max(160, Math.min(220, c * 36));
    const H = Math.max(72,  Math.min(160, r * 36));
    const gap = Math.max(2, Math.min(4, Math.floor(Math.min(W / c, H / r) * 0.1)));
    const cw = (W - gap * (c - 1)) / c;
    const rh = (H - gap * (r - 1)) / r;
    // 列ごとに青の濃さを変えて縦方向を強調、行ごとにオレンジを変えて横方向を強調
    let rects = '';
    for (let ci = 0; ci < c; ci++) {
      for (let ri = 0; ri < r; ri++) {
        const x = (ci * (cw + gap)).toFixed(1);
        const y = (ri * (rh + gap)).toFixed(1);
        // 列の色合い: 青
        const colAlpha = (0.55 - (ci / Math.max(c - 1, 1)) * 0.28).toFixed(2);
        // 行の色合い: オレンジ
        const rowAlpha = (0.38 - (ri / Math.max(r - 1, 1)) * 0.18).toFixed(2);
        // 混合: 青ベースにオレンジをミックス
        const fill = ci === 0 && ri === 0
          ? `rgba(60,120,230,${colAlpha})`
          : `rgba(${Math.round(60 + ri * 12)},${Math.round(120 - ri * 8)},${Math.round(230 - ci * 20)},${(0.32 - ci * 0.02 - ri * 0.015).toFixed(2)})`;
        rects += `<rect x="${x}" y="${y}" width="${cw.toFixed(1)}" height="${rh.toFixed(1)}" rx="3" fill="${fill}" stroke="rgba(60,100,200,0.35)" stroke-width="0.8"/>`;
      }
    }
    // ラベル (例: 5×1)
    const label = `${c}×${r}`;
    previewDiv.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${rects}</svg><span style="font-size:10px;color:rgba(0,0,0,0.35);font-family:'SF Mono','Menlo',monospace;font-weight:600">${label}</span></div>`;
  };
  [colInput, rowInput].forEach(inp => inp.addEventListener('input', updatePreview));
  updatePreview();
  popup.appendChild(previewDiv);

  const rect = anchorEl.getBoundingClientRect();
  // 右端がはみ出ないよう調整
  popup.style.top = (rect.bottom + 2) + 'px';
  popup.style.left = rect.left + 'px';
  document.body.appendChild(popup);
  notifyOverlay(true); // popup 表示 → clickthrough OFF
  setTimeout(() => { colInput.select(); }, 30);

  const closePopup = (ev) => {
    if (!popup.contains(ev.target) && ev.target !== anchorEl) {
      popup.remove();

}

    'Finder': '#FF9F0A', 'ファインダー': '#FF9F0A',
  };
  if (MAP[appName]) return MAP[appName];

  const a = appName.toLowerCase();
  if (a.includes('excel'))       return '#217346';
  if (a.includes('word'))        return '#2B579A';

// スロット識別色: 配置順(スロット番号)で端末に色を自動割当。
// タブ左帯・カード左枠に反映して「どれがどのスロットか」を一目で分かるようにする。
const SLOT_COLORS = ['#3c78e6', '#28b464', '#e6962c', '#c8503c', '#9650dc', '#1aa8a8'];
function slotColor(n) {
  const i = Number(n);
  if (!Number.isFinite(i) || i < 0) return SLOT_COLORS[0];
  return SLOT_COLORS[i % SLOT_COLORS.length];
}

// AI 判定色: windowNumber → 色(hex)。ai-colorize(🎨)で埋まる。
let aiColors = {};
// Claude 状態: main の status-colorize(claude稼働を ps+tty で判定)で定期更新。
// claude 非稼働の窓はどのマップにも入らない（=スロット識別色のまま）。
let statusColors = {};   // windowNumber → 色(hex)
let statusStates = {};   // windowNumber → 'perm' | 'input' | 'busy'
let statusLabels = {};   // windowNumber → '許可待ち' 等
let statusSince  = {};   // windowNumber → その状態になった時刻(ms)。経過時間バッジ用
let statusPtyStates = {}; // slot → {state,color,label}。内蔵 PTY (grid terminal) の状態
let statusPtySince  = {}; // slot → 状態変化時刻(ms)
// 状態の表示順・色・ラベル（main の CLAUDE_STATE_META と同値。凡例とバッジで使用）
const STATE_META = {
  perm:  { color: '#e0443e', label: '許可待ち' },
  input: { color: '#e0a000', label: '入力待ち' },
  busy:  { color: '#3c78e6', label: '処理中' },
};
function hexA(hex, a) {
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${a})`;
}
// 外部由来文字列(ウィンドウタイトル等)を innerHTML に入れる前の HTML エスケープ。
// 端末タイトルはエスケープシーケンス(OSC)でプログラムが任意設定できるため、
// 未エスケープだと nodeIntegration 環境では XSS→RCE 経路になる
function escHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
// 色の設計: 基本色(hue)=状態の種類、濃さ=深刻度。
// perm(赤)は即対応なので常に最大濃度。input(黄)は放置時間が長いほど濃くなる
// (直後は薄く、5分で最大 → 「ずっと待たせている端末」が一目で分かる)。
// busy/状態なしは null → 呼び出し側が従来表示(スロット色)を使う。
function stateIntensityFor(wn, slot) {
  const st = wn ? statusStates[wn] : (statusPtyStates[slot] && statusPtyStates[slot].state);
  if (st !== 'perm' && st !== 'input') return null;
  if (st === 'perm') return 1;
  const since = wn ? statusSince[wn] : statusPtySince[slot];
  const el = since ? (Date.now() - since) / 1000 : 0;
  return Math.min(1, 0.45 + 0.55 * el / 300);
}
// タブ/カードの枠+背景に状態の濃さを適用（状態なしは従来のスロット色表示）
function applyStateStyle(el, wn, slot, title, borderPx, bgBase) {
  const tc = colorFor(wn, slot, title);
  const i = stateIntensityFor(wn, slot);
  el.style.borderLeft = `${borderPx}px solid ${i === null ? tc : hexA(tc, 0.35 + 0.65 * i)}`;
  el.style.background = i === null ? hexA(tc, bgBase) : hexA(tc, 0.04 + 0.16 * i);
}
function colorFor(wn, slot, title) {
  if (wn && aiColors[wn]) return aiColors[wn];          // 🎨 AI色(手動)が最優先
  // 枠を状態色で塗るのは「アクションが必要」(許可待ち/入力待ち)のみ。
  // busy(処理中)はスロット色+バッジで表現 → 「枠に色が付いている＝呼ばれている」の
  // 意味論を保ち、処理中青とスロット識別青(SLOT_COLORS[0])の衝突も避ける。
  // 外部窓は wn、内蔵 PTY は slot の状態を見る。
  const st = wn ? statusStates[wn] : (statusPtyStates[slot] && statusPtyStates[slot].state);
  if (st === 'perm' || st === 'input') {
    const c = wn ? statusColors[wn] : statusPtyStates[slot].color;
    if (c) return c;
  }
  return slotColor(slot);                                // フォールバック: 配置順スロット色
}

// 状態バッジの HTML。compact=タブ用(●+経過時間のみ)、フル=カード用(●+ラベル+経過時間)。
// 経過時間は .st-elapsed[data-since] を1秒タイマーで textContent 更新(再render不要)。
function _statePill(st, labelText, since, compact) {
  if (!st) return '';
  const meta = STATE_META[st] || { color: '#888', label: st };
  const elapsed = since ? fmtElapsed(Date.now() - since) : '';
  // バッジ背景も濃さ=深刻度: input は放置時間で濃くなる、perm は最大
  let bgA = 0.12;
  if (st === 'perm') bgA = 0.28;
  else if (st === 'input' && since) bgA = Math.min(0.28, 0.10 + 0.18 * (Date.now() - since) / 1000 / 300);
  const label = compact ? '' : `<span class="st-label">${labelText || meta.label}</span>`;
  return `<span class="${compact ? 'tab-state' : 'state-pill'} st-${st}" style="color:${meta.color};background:${hexA(meta.color, bgA)}" title="${labelText || meta.label}">`
    + `<span class="st-dot">●</span>${label}<span class="st-elapsed" data-since="${since || ''}">${elapsed}</span></span>`;
}
function statePillHtml(wn, compact) {
  return _statePill(statusStates[wn], statusLabels[wn], statusSince[wn], compact);
}
function statePillHtmlPty(slot, compact) {
  const e = statusPtyStates[slot];
  return e ? _statePill(e.state, e.label, statusPtySince[slot], compact) : '';
}
function fmtElapsed(ms) {
  const s = Math.max(0, Math.floor(ms / 1000));
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm';
  return Math.floor(m / 60) + 'h' + (m % 60) + 'm';
}
function updateElapsedBadges() {
  document.querySelectorAll('.st-elapsed').forEach(e => {
    const since = Number(e.dataset.since);
    e.textContent = since ? fmtElapsed(Date.now() - since) : '';
  });
}
setInterval(updateElapsedBadges, 1000);

function shortNameFor(wn) {
  const info = snappedExternals.get(Number(wn));
  if (!info) return '端末';
  return String(info.title || info.app || '端末').split(' — ')[0].replace(/^[\s✳✶✦✻✴⠀-⣿]+/, '').trim() || '端末';
}

// 状態をプロセスベース(claude稼働を ps+tty、処理中/許可待ちを history で判定)で定期取得。
// 許可待ちが新規発生したらポップアップ通知、処理完了(busy→input)はトーストで知らせる。6秒間隔。
let _prevStates = {};
let _prevPtyStates = {};
let _statusRefreshing = false;   // 並行実行ガード: nudge と 6秒 interval が同時に走ると
let _statusRefreshQueued = false; // 同じ _prevStates を見て通知二重発火・stale 上書きが起きる
let _lastStatusKey = '';
async function refreshStatusColors(fromNudge) {
  if (_statusRefreshing) { _statusRefreshQueued = true; return; }
  _statusRefreshing = true;
  try {
    const r = await ipcRenderer.invoke('status-colorize');
    if (!r || !r.ok) return;
    statusColors = r.colors || {};
    const states = r.states || {}, labels = r.labels || {};
    const now = Date.now();
    for (const wn in states) {
      if (_prevStates[wn] !== states[wn]) statusSince[wn] = now;  // 状態変化時刻を記録
      const st = states[wn];
      if (st === 'perm' && _prevStates[wn] !== st) {              // 新規の許可待ちのみ通知
        notifyAction(shortNameFor(wn), labels[wn] || st, st);
      }
      if (st === 'input' && _prevStates[wn] === 'busy') {         // 処理完了 → 控えめにトーストのみ
        try { showToast(`✅ 完了: ${shortNameFor(wn)}`); } catch {}
      }
    }
    for (const wn in statusSince) { if (!(wn in states)) delete statusSince[wn]; }
    _prevStates = states;
    statusStates = states;
    statusLabels = labels;
    // 内蔵 PTY (grid terminal) も同様に: 状態変化時刻 + 許可待ち通知 + 完了トースト
    const pty = r.ptyStates || {};
    for (const slot in pty) {
      const st = pty[slot].state, prev = _prevPtyStates[slot] && _prevPtyStates[slot].state;
      if (prev !== st) statusPtySince[slot] = now;
      if (st === 'perm' && prev !== st) notifyAction(`Terminal #${Number(slot) + 1}`, pty[slot].label, st);
      if (st === 'input' && prev === 'busy') {
        try { showToast(`✅ 完了: Terminal #${Number(slot) + 1}`); } catch {}
      }
    }
    for (const slot in statusPtySince) { if (!(slot in pty)) delete statusPtySince[slot]; }
    _prevPtyStates = pty;
    statusPtyStates = pty;
    // nudge 連発(ツール連打 ~2回/秒)で全 DOM 再構築 render() を回さない:
    // nudge 経由は状態スナップショットが変わったときのみ render。
    // 6秒 interval は無条件 render(input の濃さ=放置時間は render でしか深まらない)
    const key = JSON.stringify([statusColors, states, labels, pty]);
    if (!fromNudge || key !== _lastStatusKey) render();
    _lastStatusKey = key;
  } catch {} finally {
    _statusRefreshing = false;
    if (_statusRefreshQueued) { _statusRefreshQueued = false; refreshStatusColors(true); }
  }
}
// 要対応をポップアップ(macOS通知 + TiN内トースト)で知らせる
function notifyAction(name, label, st) {
  const icon = '🔴';
  try { new Notification(`TiN ${icon} ${label}`, { body: `${name} が${label}です。対応してください` }); } catch {}
  try { showToast(`${icon} ${label}: ${name}`); } catch {}
}
setInterval(refreshStatusColors, 6000);
setTimeout(refreshStatusColors, 1500);
// hooks 設置時: main が状態ファイル変化を fs.watch で検知して nudge してくる → 即再判定
// (6秒 poll を待たないので、許可待ち通知の遅延が ~1秒未満になる)
ipcRenderer.on('claude-status-nudge', () => refreshStatusColors(true));

// AI 色判定を実行 (haiku が端末の用途を判定して色割当)。もう一度押すと解除。
async function runAiColorize(btn) {
  if (Object.keys(aiColors).length > 0) { aiColors = {}; render(); return; }
  if (btn) btn.textContent = '⏳';
  try {
    const r = await ipcRenderer.invoke('ai-colorize');
    if (r && r.ok) { aiColors = r.colors || {}; render(); }
    else if (statusEl) statusEl.textContent = 'AI色: ' + ((r && r.error) || '失敗');
  } catch (e) {
    if (statusEl) statusEl.textContent = 'AI色エラー: ' + e.message;
  } finally {
    if (btn) btn.textContent = '🎨';
  }
}

// アプリアイコン取得（クライアント側キャッシュ、非同期）
const _iconUrlCache = new Map(); // appName → dataURL | null
async function getAppIconUrl(appName) {
  if (_iconUrlCache.has(appName)) return _iconUrlCache.get(appName);
  const url = await ipcRenderer.invoke('get-app-icon', { appName }).catch(() => null);
  _iconUrlCache.set(appName, url || null);

}
// アイコン取得後に data-app 属性でDOMを再検索して全件に適用
// render()で要素が作り直されても正しく反映される
function applyIconAsync(_iconEl, appName) {

    if (!url) return;
    document.querySelectorAll(`.row-icon[data-app="${appName.replace(/"/g, '\\"')}"]`).forEach(el => {
      if (!el.classList.contains('has-icon')) {
        el.innerHTML = `<img src="${url}" alt="">`;
        el.classList.add('has-icon');
      }

// 16進 / hsl カラーから背景色・テキスト色を生成
function appColorStyle(color) {
  if (!color) return null;
  if (color.startsWith('hsl')) {
    const t = color.replace(/^hsl\(/, '').replace(/\)$/, '');
    return { bg: `hsla(${t},0.14)`, text: color };
  }
  const r = parseInt(color.slice(1, 3), 16);
  const g = parseInt(color.slice(3, 5), 16);
  const b = parseInt(color.slice(5, 7), 16);
  return { bg: `rgba(${r},${g},${b},0.13)`, text: `rgba(${r},${g},${b},0.9)` };
}
function appBadgeHtml(appName) {

  if (isTerminalApp(appName)) return '<span class="card-badge badge-term">T</span>';

  return `<span class="card-badge badge-app">${label}</span>`;

function snappedBadgeHtml(appName) {

// ── B案: renderAvailRow + populate/updateAvailList (タブ切替 + search フィルタ) ──
function renderAvailRow(w, type) {
  const row = document.createElement('div');
  row.className = `row ${type}`;
  if (w._self) row.classList.add('current');

  // icon\uFF08\u982D\u6587\u5B57\u3067\u5373\u6642\u8868\u793A \u2192 \u975E\u540C\u671F\u3067\u30A2\u30D7\u30EA\u30A2\u30A4\u30B3\u30F3\u753B\u50CF\u306B\u5DEE\u3057\u66FF\u3048\uFF09
  const icon = document.createElement('div');
  icon.className = 'row-icon';

  if (type === 'apps') {
    const cs = appColorStyle(getAppColor(w.app));
    if (cs) { icon.style.background = cs.bg; icon.style.color = cs.text; }
  }
  // \u30AD\u30E3\u30C3\u30B7\u30E5\u6E08\u307F\u306A\u3089\u5373\u6642\u8868\u793A
  if (type !== 'tin' && w.app && _iconUrlCache.has(w.app)) {

    if (cached) {
      icon.innerHTML = `<img src="${cached}" alt="">`;
      icon.classList.add('has-icon');
    }
  }
  row.appendChild(icon);
  // \u672A\u30AD\u30E3\u30C3\u30B7\u30E5\u306F\u975E\u540C\u671F\u53D6\u5F97 \u2192 \u53D6\u5F97\u5F8C\u306B data-app \u3067\u73FE\u5728\u306EDOM\u3092\u518D\u691C\u7D22\u3057\u3066\u5168\u4EF6\u9069\u7528
  if (type !== 'tin' && w.app && !_iconUrlCache.has(w.app)) applyIconAsync(icon, w.app);

  // title / subtitle 分割

  } else {
    const m = rawTitle.match(/^(.{1,24}?)\s+[\u2014\u2013]\s+(.+)$/);

  }
  if (titleText.length > 30) titleText = titleText.substring(0, 27) + '...';
  if (subtitleText && subtitleText.length > 40) subtitleText = subtitleText.substring(0, 37) + '...';

  const info = document.createElement('div');
  info.className = 'row-info';
  const titleDiv = document.createElement('div');

  titleDiv.textContent = titleText;
  info.appendChild(titleDiv);
  if (subtitleText) {
    const sub = document.createElement('div');
    sub.className = 'row-subtitle';
    sub.textContent = subtitleText;
    info.appendChild(sub);
  }
  row.appendChild(info);

  // 右側: HERE badge (self) / ws-badge (他 workspace 所属) / action ボタン
  if (w._self) {
    const hereBadge = document.createElement('span');

    hereBadge.textContent = 'HERE';
    if (wsColor) {
      hereBadge.style.background = wsColor.bg;
      hereBadge.style.color = wsColor.fg;

    hereBadge.style.cursor = 'default';
    row.appendChild(hereBadge);
    row.style.cursor = 'default';
    row.title = '現在の workspace';

  }
  const otherWs = snappedByOther[w.windowNumber];
  if (otherWs) {
    const wsBadge = document.createElement('span');
    wsBadge.className = 'row-ws-badge';
    wsBadge.textContent = '\u2192 ' + (otherWs.name || '');

      e.stopPropagation();

      e.stopPropagation();

        openSlotPicker(action, w);

  row.addEventListener('click', (e) => {
    if (e.target.classList.contains('row-action') || e.target.classList.contains('row-ws-badge')) return;
    if (type === 'tin') {
      ipcRenderer.send('raise-tin-window', { windowNumber: w.windowNumber });

function filterAvailByQ(items, q) {
  if (!q) return items;
  const lo = q.toLowerCase();
  return items.filter(w =>
    (w.title || '').toLowerCase().includes(lo) ||
    (w.app || '').toLowerCase().includes(lo)
  );
}

function populateAvailList(container, terminal, finder, apps, tin) {
  container.innerHTML = '';
  let items, type;
  if (activeAvailTab === 'term') { items = terminal; type = 'term'; }
  else if (activeAvailTab === 'finder') { items = finder; type = 'finder'; }
  else if (activeAvailTab === 'apps') { items = apps; type = 'apps'; }
  else { items = tin; type = 'tin'; }
  const filtered = filterAvailByQ(items, availSearchText);
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'avail-empty';
    empty.textContent = availSearchText
      ? `"${availSearchText}" にマッチなし`
      : (items.length === 0 ? '(空)' : '');
    container.appendChild(empty);
    return;
  }
  filtered.forEach(w => container.appendChild(renderAvailRow(w, type)));
}

function updateAvailList() {
  const list = document.querySelector('[data-avail-list="1"]');
  if (!list) return;
  const available = externalWindows.filter(w => !snappedExternals.has(w.windowNumber));
  const terminal = available.filter(w => isTerminalApp(w.app));
  const finder = available.filter(w => isFinderApp(w.app));
  const apps = available.filter(w => !isTerminalApp(w.app) && !isFinderApp(w.app) && !isTiNApp(w.app));
  const tin = available.filter(w =>
    isTiNApp(w.app) && !/ Grid$/.test(w.title) && !/\[\d+\]$/.test(w.title)
  );
  if (wsName) {
    tin.unshift({
      windowNumber: -999,
      app: 'TiN',
      title: `TiN \u2014 ${wsName}`,
      pid: -1,
      _self: true,
    });
  }
  populateAvailList(list, terminal, finder, apps, tin);
}

// 楽観的更新: main への invoke と並行で renderer の slot state を即座に反映
function reorderSlotsLocally(src, dst, before) {
  const items = [];
  for (const [wn, info] of snappedExternals) {
    if (typeof info.slot === 'number') items.push({ type: 'ext', slot: info.slot, wn, info });
  }
  for (const slot of Object.keys(gridSlots)) {
    items.push({ type: 'pty', slot: Number(slot), slotKey: slot });
  }
  items.sort((a, b) => a.slot - b.slot);
  const srcIdx = items.findIndex(i => i.slot === src);
  const dstIdx = items.findIndex(i => i.slot === dst);
  if (srcIdx < 0 || dstIdx < 0) return;
  const srcItem = items[srcIdx];
  items.splice(srcIdx, 1);
  let insertIdx = items.findIndex(i => i.slot === dst);
  if (!before) insertIdx++;
  items.splice(insertIdx, 0, srcItem);
  const oldPty = gridSlots;
  const newPty = {};
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    if (item.type === 'pty') {
      newPty[i] = oldPty[item.slotKey];
    } else {
      item.info.slot = i;
    }
  }
  gridSlots = newPty;
}
function swapSlotsLocally(src, dst) {
  const srcExt = [...snappedExternals.values()].find(i => i.slot === src);
  const dstExt = [...snappedExternals.values()].find(i => i.slot === dst);
  const srcPty = gridSlots[src];
  const dstPty = gridSlots[dst];
  if (srcPty || dstPty) {
    const newPty = { ...gridSlots };
    delete newPty[src]; delete newPty[dst];
    if (srcPty) newPty[dst] = srcPty;
    if (dstPty) newPty[src] = dstPty;
    gridSlots = newPty;
  }
  if (srcExt) srcExt.slot = dst;
  if (dstExt) dstExt.slot = src;
}

function showTabCtxMenu(x, y, { wn, isPty, slotKey }) {
  const existing = document.getElementById('tab-ctx-menu');
  if (existing) existing.remove();
  const menu = document.createElement('div');
  menu.id = 'tab-ctx-menu';

  const mkItem = (icon, label, cls, fn) => {
    const el = document.createElement('div');
    el.className = 'ctx-item' + (cls ? ' ' + cls : '');
    el.innerHTML = `<span>${icon}</span><span>${label}</span>`;
    el.addEventListener('mousedown', (e) => { e.stopPropagation(); menu.remove(); fn(); });
    menu.appendChild(el);
  };

  if (isPty) {
    mkItem('⤢', '前面に表示', '', () => ipcRenderer.invoke('add-grid-terminal'));
    menu.appendChild(Object.assign(document.createElement('div'), { className: 'ctx-sep' }));
    mkItem('✕', 'ターミナルを閉じる', 'danger', () => ipcRenderer.invoke('remove-grid-terminal', { slot: Number(slotKey) }));
  } else {
    mkItem('⤢', '前面に表示', '', () => ipcRenderer.invoke('raise-snapped', { windowNumber: wn }));
    menu.appendChild(Object.assign(document.createElement('div'), { className: 'ctx-sep' }));
    mkItem('⎋', 'Unsnap', 'danger', () => ipcRenderer.invoke('unsnap-external', { windowNumber: wn }));
  }

  // 位置調整（ヘッダー内 + 画面端クリップ）
  menu.style.left = '0'; menu.style.top = '0';
  document.body.appendChild(menu);
  const mw = menu.offsetWidth, mh = menu.offsetHeight;
  menu.style.left = Math.min(x, window.innerWidth - mw - 8) + 'px';
  menu.style.top = Math.max(68 + 4, Math.min(y, window.innerHeight - mh - 8)) + 'px';

  notifyOverlay(true);
  const close = (e) => {
    if (!menu.contains(e.target)) { menu.remove(); notifyOverlay(false); document.removeEventListener('mousedown', close); }
  };
  setTimeout(() => document.addEventListener('mousedown', close), 0);
}
