name: release

# タグ v* を push すると Windows ビルド(x64/arm64)を 1 回の electron-builder 実行で作り、
# GitHub Release(draft)へ添付 + 自動アップデート用メタデータ(latest.yml / *.blockmap)を生成・publish する。
# 両 arch を単一実行で出すことで latest.yml が両インストーラを列挙し、electron-updater(v6)が
# 実行中マシンの arch に合うものを自動選択できる(arch ごとに別実行すると latest.yml が衝突する)。
#
# Windows のウィンドウ操作バックエンドは koffi(FFI, ビルド不要・prebuilt 同梱)で、
# node-pty も prebuilds(N-API)を同梱するため Windows ではネイティブのコンパイルは一切不要。
# macOS 版は手元ビルド(npm run dist)で同 Release(draft)へ追加してから publish する。
#
# 自動更新は「公開済み(draft でない)」Release のみ検知するため、draft を手動 publish した時点で
# 既存ユーザーへ配信される。workflow_dispatch(tag 空)で起動した場合はビルド検証のみ(publish しない)。

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (例 v1.14.0)。空ならビルド検証のみで Release へは上げない'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  win:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --ignore-scripts: ネイティブビルドを走らせない(koffi/node-pty とも prebuilt を使用)。
      - name: Install deps (no native build)
        run: npm install --ignore-scripts

      # publish するか判定: タグ push か、dispatch で tag 指定があれば publish(=draft release へアップロード)。
      - name: Decide publish mode
        id: mode
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* || -n "${{ github.event.inputs.tag }}" ]]; then
            echo "publish=always" >> "$GITHUB_OUTPUT"
          else
            echo "publish=never" >> "$GITHUB_OUTPUT"
          fi

      # npmRebuild:false なので electron-builder は native を再ビルドせず、同梱 prebuilt をそのまま使う。
      # arch を指定せず --win のみ → package.json の win.target(x64+arm64)を 1 実行でまとめてビルドし、
      # 単一の latest.yml(両 arch を列挙)を生成する。publish=always のとき GH_TOKEN で Release へアップロード。
      - name: Package & publish with electron-builder
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish ${{ steps.mode.outputs.publish }}

      - name: List dist
        shell: bash
        run: ls -la dist/ || true

      # 検証用にビルド成果物(更新メタdata含む)を常に artifact 化しておく。
      - uses: actions/upload-artifact@v4
        with:
          name: win-dist
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
