<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TerminalIN</title>
<link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    color: #333;
    display: flex; flex-direction: column;
    background: transparent;
  }

  #titlebar {
    height: 38px;
    -webkit-app-region: drag;
    display: flex; align-items: center;
    padding: 0 10px 0 72px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  #title {
    font-size: 13px; font-weight: 600; color: rgba(60,60,90,0.5);
    cursor: default; user-select: none;
    -webkit-app-region: no-drag;
  }
  #title-input {
    font-size: 13px; font-weight: 600; color: rgba(60,60,90,0.7);
    background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.1);
    border-radius: 4px; padding: 1px 6px; outline: none;
    font-family: inherit;
    -webkit-app-region: no-drag;
    display: none;
  }

  #collapse-btn {
    width: 22px; height: 22px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600;
    color: rgba(60,60,90,0.3); cursor: pointer;
    -webkit-app-region: no-drag;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  #collapse-btn:hover { background: rgba(0,0,0,0.06); color: rgba(60,60,90,0.5); }

  body.collapsed #content, body.collapsed #status { display: none; }
  body.collapsed #titlebar {
    flex-direction: column; height: 100%; padding: 42px 0 8px; align-items: center; gap: 6px;
  }
  body.collapsed #title { writing-mode: vertical-rl; font-size: 10px; letter-spacing: 1px; flex: 1; }
  body.collapsed #title-input { display: none !important; }
  body.collapsed #collapse-btn { transform: rotate(180deg); }

  #content { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 4px; }
  #content::-webkit-scrollbar { width: 4px; }
  #content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

  .section-title {
    font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px;
    color: rgba(60,60,90,0.35); padding: 6px 0 2px;
    display: flex; align-items: center; gap: 6px;
  }

  /* Grid size selector */
  .grid-selector { display: flex; gap: 2px; margin-left: auto; }
  .grid-opt {
    font-size: 8px; padding: 1px 5px; border-radius: 3px; cursor: pointer;
    border: 1px solid rgba(0,0,0,0.08); color: rgba(60,60,90,0.4); background: transparent;
  }
  .grid-opt:hover { background: rgba(0,0,0,0.04); }
  .grid-opt.active { background: rgba(50,130,220,0.1); color: rgba(50,130,220,0.7); border-color: rgba(50,130,220,0.2); }

  /* Embedded terminal card */
  .term-card {
    background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.06);
    border-radius: 8px; overflow: hidden;
  }
  .term-card .card-header {
    display: flex; align-items: center; gap: 4px; padding: 4px 6px; cursor: pointer;
  }
  .term-card .card-header:hover { background: rgba(0,0,0,0.03); }
  .term-card.expanded .term-embed { display: block; }
  .term-card .term-embed { display: none; height: 200px; }
  .card-title { flex: 1; font-size: 11px; color: rgba(40,40,60,0.7); font-family: 'SF Mono', monospace; }
  .card-badge { font-size: 8px; padding: 1px 5px; border-radius: 3px; }
  .badge-pty { background: rgba(60,180,120,0.1); color: rgba(60,160,120,0.7); }
  .badge-grid { background: rgba(130,80,220,0.1); color: rgba(130,80,220,0.7); }
  .badge-ext { background: rgba(50,130,220,0.1); color: rgba(50,130,220,0.7); }
  .card-close {
    width: 18px; height: 18px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: rgba(0,0,0,0.2); cursor: pointer;
  }
  .card-close:hover { background: rgba(255,60,60,0.1); color: rgba(255,60,60,0.7); }

  /* External terminal item */
  .ext-item {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 6px;
    background: rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.05);
    border-radius: 6px;
  }
  .ext-item .ext-title {
    flex: 1; font-size: 10px; color: rgba(40,40,60,0.6);
    font-family: 'SF Mono', monospace;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ext-btn {
    padding: 2px 8px; border-radius: 4px; font-size: 9px;
    cursor: pointer; border: 1px solid;
  }
  .ext-btn.snap { color: rgba(50,130,220,0.7); border-color: rgba(50,130,220,0.2); background: transparent; }
  .ext-btn.snap:hover { background: rgba(50,130,220,0.08); }
  .ext-btn.release { color: rgba(220,80,50,0.7); border-color: rgba(220,80,50,0.2); background: transparent; }
  .ext-btn.release:hover { background: rgba(220,80,50,0.08); }

  .snapped-badge { font-size: 8px; padding: 1px 5px; border-radius: 3px; background: rgba(50,130,220,0.1); color: rgba(50,130,220,0.7); }
  .ws-badge { font-size: 8px; padding: 1px 5px; border-radius: 3px; background: rgba(180,120,50,0.12); color: rgba(180,120,50,0.7); white-space: nowrap; }

  .release-all-btn {
    display: flex; align-items: center; justify-content: center;
    padding: 4px; border-radius: 5px; margin-top: 2px;
    border: 1px solid rgba(220,80,50,0.15); cursor: pointer;
    font-size: 9px; color: rgba(220,80,50,0.5); background: transparent;
  }
  .release-all-btn:hover { background: rgba(220,80,50,0.06); }

  .add-btn {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    padding: 6px; border-radius: 6px;
    border: 1px dashed rgba(0,0,0,0.08); cursor: pointer;
    font-size: 10px; color: rgba(60,180,120,0.5);
  }
  .add-btn:hover { border-color: rgba(60,180,120,0.3); background: rgba(60,180,120,0.04); }
  .add-btn.grid-add { color: rgba(130,80,220,0.5); }
  .add-btn.grid-add:hover { border-color: rgba(130,80,220,0.3); background: rgba(130,80,220,0.04); }

  #status {
    padding: 6px 10px; font-size: 9px; color: rgba(0,0,0,0.25);
    border-top: 1px solid rgba(0,0,0,0.05); flex-shrink: 0;
    font-family: 'SF Mono', monospace;
  }

  body.compact #titlebar { height: 32px; padding-left: 64px; }
  body.compact #title { font-size: 11px; }
  body.compact #content { padding: 4px; gap: 2px; }
  body.compact .section-title { display: none; }
  body.compact .term-card .card-header { padding: 3px 5px; }
  body.compact .card-title { font-size: 10px; }
  body.compact .card-badge, body.compact .snapped-badge, body.compact .ws-badge { font-size: 7px; padding: 0 4px; }
  body.compact .ext-item { padding: 3px 5px; }
  body.compact .ext-title { font-size: 9px; }
  body.compact .ext-btn { font-size: 8px; padding: 1px 6px; }
  body.compact .add-btn { padding: 4px; font-size: 9px; }
  body.compact #status { padding: 3px 6px; font-size: 8px; }
  body.compact .term-embed { height: 150px; }

  /* Raise button */
  #raise-btn {
    width: 22px; height: 22px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    color: rgba(50,130,220,0.4); cursor: pointer;
    -webkit-app-region: no-drag;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0; margin-right: 4px;
  }
  #raise-btn:hover { background: rgba(50,130,220,0.1); color: rgba(50,130,220,0.7); }
</style>
</head>
<body>

<div id="titlebar">
  <span id="title">TerminalIN</span>
  <input id="title-input" type="text" />
  <div style="flex:1"></div>
  <div id="raise-btn" title="Bring all terminals to front">&#x25A3;</div>
  <div id="collapse-btn" title="Collapse sidebar (Cmd+B)">‹</div>
</div>
<div id="content"></div>
<div id="status">Starting...</div>

<script>
const { ipcRenderer } = require('electron');
const { Terminal } = require('@xterm/xterm');
const { FitAddon } = require('@xterm/addon-fit');

const content = document.getElementById('content');
const statusEl = document.getElementById('status');
const titleEl = document.getElementById('title');
const titleInput = document.getElementById('title-input');

let wsId = null;
let wsName = 'TerminalIN';

// State
const embeddedTerms = [];
const snappedExternals = new Map();
let externalWindows = [];
let snappedByOther = {};
let gridSlots = {};
let lastExtIdentity = '';
let gridCols = 2, gridRows = 2;

// ── Title renaming ──
titleEl.addEventListener('dblclick', () => {
  titleEl.style.display = 'none';
  titleInput.style.display = 'inline-block';
  titleInput.value = wsName;
  titleInput.focus();
  titleInput.select();
});

function commitRename() {
  const newName = titleInput.value.trim() || wsName;
  wsName = newName;
  titleEl.textContent = wsName;
  titleEl.style.display = '';
  titleInput.style.display = 'none';
  ipcRenderer.send('rename-workspace', { name: wsName });
}
titleInput.addEventListener('blur', commitRename);
titleInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') commitRename();
  if (e.key === 'Escape') { titleInput.value = wsName; commitRename(); }
});

ipcRenderer.on('workspace-info', (_e, info) => {
  wsId = info.id;
  wsName = info.name;
  titleEl.textContent = wsName;
});

// ── Sidebar embedded terminals ──
async function addEmbedded(title) {
  const name = title || `Shell ${embeddedTerms.length + 1}`;
  const { id } = await ipcRenderer.invoke('create-terminal', {});
  const term = new Terminal({
    fontSize: 12, fontFamily: "'SF Mono', 'Fira Code', monospace",
    theme: { background: '#1a1a2e', foreground: '#e0e0e0', cursor: '#80b0ff', selectionBackground: 'rgba(100,140,255,0.3)' },
    cursorBlink: true, scrollback: 3000,
  });
  const fitAddon = new FitAddon();
  term.loadAddon(fitAddon);
  term.onData(data => ipcRenderer.send('terminal-input', { id, data }));
  const session = { id, term, fitAddon, title: name, expanded: false };
  embeddedTerms.push(session);
  render();
  toggleExpand(embeddedTerms.length - 1);
}

function toggleExpand(idx) {
  const s = embeddedTerms[idx];
  s.expanded = !s.expanded;
  render();
  if (s.expanded) {
    requestAnimationFrame(() => requestAnimationFrame(() => {
      try { s.fitAddon.fit(); ipcRenderer.send('terminal-resize', { id: s.id, cols: s.term.cols, rows: s.term.rows }); } catch {}
      s.term.focus();
    }));
  }
}

function removeEmbedded(idx) {
  const s = embeddedTerms[idx];
  s.term.dispose();
  ipcRenderer.invoke('kill-terminal', { id: s.id });
  embeddedTerms.splice(idx, 1);
  render();
}

// ── Grid terminals ──
async function addGridTerminal() {
  const result = await ipcRenderer.invoke('add-grid-terminal');
  if (!result.ok) { statusEl.textContent = result.reason === 'grid-full' ? 'Grid is full' : 'Error'; }
}

async function removeGridTerminal(slot) {
  await ipcRenderer.invoke('remove-grid-terminal', { slot: Number(slot) });
}

// ── External terminals ──
async function snapExternal(w) {
  const result = await ipcRenderer.invoke('snap-external', {
    windowNumber: w.windowNumber, pid: w.pid, app: w.app, title: w.title,
    x: w.x, y: w.y, width: w.width, height: w.height,
  });
  if (result.ok) { snappedExternals.set(w.windowNumber, { title: w.title }); render(); }
}

async function unsnapExternal(windowNumber) {
  await ipcRenderer.invoke('unsnap-external', { windowNumber });
  snappedExternals.delete(windowNumber);
  render();
}

// ── Grid size ──
function setGridSize(cols, rows) {
  gridCols = cols; gridRows = rows;
  ipcRenderer.invoke('set-grid-size', { cols, rows });
  render();
}

// ── Render ──
function render() {
  content.innerHTML = '';

  // Grid section
  const gridTitle = document.createElement('div');
  gridTitle.className = 'section-title';
  const gridCount = Object.keys(gridSlots).length + snappedExternals.size;
  gridTitle.innerHTML = `GRID (${gridCount}/${gridCols * gridRows})`;

  const selector = document.createElement('div');
  selector.className = 'grid-selector';
  [['2×2', 2, 2], ['3×3', 3, 3], ['2×3', 2, 3]].forEach(([label, c, r]) => {
    const btn = document.createElement('button');
    btn.className = 'grid-opt' + (c === gridCols && r === gridRows ? ' active' : '');
    btn.textContent = label;
    btn.addEventListener('click', () => setGridSize(c, r));
    selector.appendChild(btn);
  });
  gridTitle.appendChild(selector);
  content.appendChild(gridTitle);

  // Grid terminal entries
  for (const [slot, info] of Object.entries(gridSlots)) {
    const card = document.createElement('div');
    card.className = 'ext-item';
    card.innerHTML = `
      <span class="card-badge badge-grid">GRID</span>
      <span class="ext-title">Terminal #${Number(slot) + 1}</span>
    `;
    const closeBtn = document.createElement('span');
    closeBtn.className = 'card-close';
    closeBtn.textContent = '\u00d7';
    closeBtn.addEventListener('click', () => removeGridTerminal(slot));
    card.appendChild(closeBtn);
    content.appendChild(card);
  }

  // Snapped externals
  for (const [wn, info] of snappedExternals) {
    const item = document.createElement('div');
    item.className = 'ext-item';
    let t = info.title || '';
    if (t.length > 35) t = t.substring(0, 32) + '...';
    item.innerHTML = `<span class="card-badge badge-ext">EXT</span><span class="ext-title">${t}</span>`;
    const btn = document.createElement('button');
    btn.className = 'ext-btn release';
    btn.textContent = 'Release';
    btn.addEventListener('click', () => unsnapExternal(wn));
    item.appendChild(btn);
    content.appendChild(item);
  }

  // Add grid terminal button
  if (gridCount < gridCols * gridRows) {
    const addGrid = document.createElement('div');
    addGrid.className = 'add-btn grid-add';
    addGrid.textContent = '+ Grid terminal';
    addGrid.addEventListener('click', addGridTerminal);
    content.appendChild(addGrid);
  }

  // Release all
  if (snappedExternals.size > 1) {
    const releaseAll = document.createElement('div');
    releaseAll.className = 'release-all-btn';
    releaseAll.textContent = 'Release All';
    releaseAll.addEventListener('click', async () => {
      for (const wn of [...snappedExternals.keys()]) await unsnapExternal(wn);
    });
    content.appendChild(releaseAll);
  }

  // Sidebar embedded terminals
  const embTitle = document.createElement('div');
  embTitle.className = 'section-title';
  embTitle.textContent = `SIDEBAR TERMINALS (${embeddedTerms.length})`;
  content.appendChild(embTitle);

  embeddedTerms.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = `term-card${s.expanded ? ' expanded' : ''}`;
    const header = document.createElement('div');
    header.className = 'card-header';
    header.innerHTML = `<span class="card-badge badge-pty">PTY</span><span class="card-title">${s.title}</span><span class="card-close">\u00d7</span>`;
    header.querySelector('.card-title').addEventListener('click', () => toggleExpand(i));
    header.querySelector('.card-close').addEventListener('click', (e) => { e.stopPropagation(); removeEmbedded(i); });
    card.appendChild(header);
    const embed = document.createElement('div');
    embed.className = 'term-embed';
    card.appendChild(embed);
    content.appendChild(card);
    if (s.expanded) {
      s.term.open(embed);
      requestAnimationFrame(() => {
        try { s.fitAddon.fit(); ipcRenderer.send('terminal-resize', { id: s.id, cols: s.term.cols, rows: s.term.rows }); } catch {}
      });
    }
  });

  const addBtn = document.createElement('div');
  addBtn.className = 'add-btn';
  addBtn.textContent = '+ Sidebar terminal';
  addBtn.addEventListener('click', () => addEmbedded());
  content.appendChild(addBtn);

  // Available externals
  const available = externalWindows.filter(w => !snappedExternals.has(w.windowNumber));
  if (available.length > 0) {
    const extTitle = document.createElement('div');
    extTitle.className = 'section-title';
    extTitle.textContent = `AVAILABLE TERMINALS (${available.length})`;
    content.appendChild(extTitle);

    available.forEach(w => {
      const item = document.createElement('div');
      item.className = 'ext-item';
      let t = w.title || 'untitled';
      if (t.length > 30) t = t.substring(0, 27) + '...';
      const otherWs = snappedByOther[w.windowNumber];
      if (otherWs) {
        item.innerHTML = `<span class="ext-title">${t}</span><span class="ws-badge">\u2192 ${otherWs}</span>`;
      } else {
        item.innerHTML = `<span class="ext-title">${t}</span>`;
        const btn = document.createElement('button');
        btn.className = 'ext-btn snap';
        btn.textContent = 'Snap';
        btn.addEventListener('click', () => snapExternal(w));
        item.appendChild(btn);
      }
      content.appendChild(item);
    });
  }

  statusEl.textContent = `${Object.keys(gridSlots).length} grid \u00b7 ${snappedExternals.size} ext \u00b7 ${embeddedTerms.length} sidebar`;
}

// ── IPC ──
ipcRenderer.on('terminal-data', (_e, { id, data }) => {
  const s = embeddedTerms.find(s => s.id === id);
  if (s) s.term.write(data);
});
ipcRenderer.on('terminal-exit', (_e, { id }) => {
  const idx = embeddedTerms.findIndex(s => s.id === id);
  if (idx >= 0) { embeddedTerms[idx].term.dispose(); embeddedTerms.splice(idx, 1); render(); }
});
ipcRenderer.on('new-terminal', () => addGridTerminal());
ipcRenderer.on('close-current', () => {
  if (embeddedTerms.length > 0) removeEmbedded(embeddedTerms.length - 1);
});
ipcRenderer.on('external-windows', (_e, windows, otherSnapped, gridInfo) => {
  snappedByOther = otherSnapped || {};
  gridSlots = gridInfo || {};
  const id = JSON.stringify(windows.map(w => `${w.windowNumber}:${w.title}`)) + JSON.stringify(snappedByOther) + JSON.stringify(gridSlots);
  if (id === lastExtIdentity) return;
  lastExtIdentity = id;
  externalWindows = windows;
  for (const k of snappedExternals.keys()) {
    if (!windows.find(w => w.windowNumber === k)) snappedExternals.delete(k);
  }
  render();
});

// ── Raise button ──
document.getElementById('raise-btn').addEventListener('click', () => {
  ipcRenderer.send('raise-all');
});

// ── Collapse ──
let isCollapsed = false;
const collapseBtn = document.getElementById('collapse-btn');
function toggleCollapse() {
  isCollapsed = !isCollapsed;
  document.body.classList.toggle('collapsed', isCollapsed);
  ipcRenderer.send('toggle-collapse', { collapsed: isCollapsed });
}
collapseBtn.addEventListener('click', toggleCollapse);
ipcRenderer.on('toggle-compact', toggleCollapse);

// Start with one sidebar terminal
addEmbedded('main');
</script>
</body>
</html>
